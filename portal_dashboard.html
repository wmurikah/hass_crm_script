<script>
Router.register('portal-dashboard', function (el, params) {
  var me = (params && params.me) || {};
  el.innerHTML =
    '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Welcome, ' + esc(me.first_name || 'Customer') + '</h2>' +
    '<div class="stat-grid" id="pDashStats"></div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">' +
      '<div class="card"><div class="card-header"><span class="card-title">Recent Orders</span></div>' +
        '<div class="card-body" id="pDashOrders"></div></div>' +
      '<div class="card"><div class="card-header"><span class="card-title">Open Tickets</span></div>' +
        '<div class="card-body" id="pDashTickets"></div></div>' +
    '</div>';

  API.call('orders', 'list', { limit: 5 }).then(function (rows) {
    var el2 = document.getElementById('pDashStats');
    var pending   = rows.filter(function (r) { return ['SUBMITTED','APPROVED'].indexOf(r.status) !== -1; }).length;
    var delivered = rows.filter(function (r) { return r.status === 'DELIVERED'; }).length;
    el2.innerHTML =
      '<div class="stat-card primary"><div class="stat-label">Pending Orders</div><div class="stat-value">' + pending + '</div></div>' +
      '<div class="stat-card success"><div class="stat-label">Delivered</div><div class="stat-value">' + delivered + '</div></div>';

    var ordEl = document.getElementById('pDashOrders');
    if (!rows.length) { ordEl.innerHTML = '<p style="color:#9ca3af;font-size:13px">No orders.</p>'; return; }
    ordEl.innerHTML = rows.slice(0,5).map(function (r) {
      return '<div style="padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:13px;display:flex;justify-content:space-between">' +
             '<span>' + esc(r.order_number) + '</span>' + statusBadge(r.status) + '</div>';
    }).join('');
  }).catch(function () {});

  API.call('tickets', 'list', { status: 'OPEN', limit: 5 }).then(function (rows) {
    var el2 = document.getElementById('pDashTickets');
    if (!rows.length) { el2.innerHTML = '<p style="color:#9ca3af;font-size:13px">No open tickets.</p>'; return; }
    el2.innerHTML = rows.map(function (r) {
      return '<div style="padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:13px">' +
             '<div style="display:flex;justify-content:space-between">' +
               '<span>' + esc(r.ticket_number) + '</span>' + statusBadge(r.priority) + '</div>' +
             '<div style="font-size:12px;color:#6b7280">' + esc(r.subject) + '</div></div>';
    }).join('');
  }).catch(function () {});
});
</script>
