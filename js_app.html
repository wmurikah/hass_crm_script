<script>
// ─────────────────────────────────────────────────────────────────
//  js_app.html  — Hass CMS app framework (Stage 6)
//  Router, Toast, Modal, and global event bus.
// ─────────────────────────────────────────────────────────────────

/* ── Toast ─────────────────────────────────────────────────────── */
var Toast = (function () {
  var _container;
  function _ensure() {
    if (!_container) {
      _container = document.createElement('div');
      _container.className = 'toast-container';
      document.body.appendChild(_container);
    }
  }
  function show(msg, type, duration) {
    _ensure();
    var el = document.createElement('div');
    el.className = 'toast ' + (type || '');
    el.textContent = msg;
    _container.appendChild(el);
    setTimeout(function () {
      el.style.opacity = '0';
      el.style.transition = 'opacity .3s';
      setTimeout(function () { el.remove(); }, 300);
    }, duration || 3500);
  }
  return {
    success: function (m) { show(m, 'success'); },
    error:   function (m) { show(m, 'error'); },
    warning: function (m) { show(m, 'warning'); },
    info:    function (m) { show(m, ''); },
  };
})();

/* ── Modal ─────────────────────────────────────────────────────── */
var Modal = (function () {
  var _current;
  function open(opts) {
    close();
    var backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop open';
    backdrop.innerHTML =
      '<div class="modal">' +
        '<div class="modal-header">' +
          '<span class="modal-title">' + (opts.title || '') + '</span>' +
          '<button class="modal-close" title="Close">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' + (opts.body || '') + '</div>' +
        (opts.footer
          ? '<div class="modal-footer">' + opts.footer + '</div>'
          : '') +
      '</div>';
    backdrop.querySelector('.modal-close').onclick = close;
    backdrop.addEventListener('click', function (e) {
      if (e.target === backdrop) close();
    });
    document.body.appendChild(backdrop);
    _current = backdrop;
    if (opts.onOpen) opts.onOpen(backdrop);
  }
  function close() {
    if (_current) { _current.remove(); _current = null; }
  }
  function confirm(msg, onYes, onNo) {
    open({
      title: 'Confirm',
      body: '<p style="margin:0 0 16px">' + msg + '</p>',
      footer: '<button class="btn btn-secondary" id="_mno">Cancel</button>' +
              '<button class="btn btn-danger" id="_myes">Confirm</button>',
      onOpen: function (bd) {
        bd.querySelector('#_mno').onclick  = function () { close(); if (onNo)  onNo(); };
        bd.querySelector('#_myes').onclick = function () { close(); if (onYes) onYes(); };
      },
    });
  }
  return { open: open, close: close, confirm: confirm };
})();

/* ── Loading overlay ────────────────────────────────────────────── */
var Loader = (function () {
  function show(parent) {
    var p = parent || document.body;
    p.style.position = 'relative';
    var el = document.createElement('div');
    el.className = 'loading-overlay';
    el.innerHTML = '<span class="spinner dark"></span>';
    p.appendChild(el);
    return el;
  }
  function hide(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
  return { show: show, hide: hide };
})();

/* ── Badge helper ───────────────────────────────────────────────── */
function statusBadge(status) {
  var map = {
    ACTIVE: 'success', APPROVED: 'success', DELIVERED: 'success', CLOSED: 'success', PUBLISHED: 'success',
    PENDING: 'warning', SUBMITTED: 'warning', PENDING_REVIEW: 'warning', DRAFT: 'neutral', NEW: 'neutral',
    REJECTED: 'danger',  CANCELLED: 'danger',  FAILED: 'danger',
    OPEN: 'primary', DISPATCHED: 'primary', ISSUED: 'primary',
    INACTIVE: 'neutral', ARCHIVED: 'neutral',
  };
  var cls = map[String(status).toUpperCase()] || 'neutral';
  return '<span class="badge badge-' + cls + '">' + status + '</span>';
}

/* ── Format helpers ─────────────────────────────────────────────── */
function fmtDate(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return isNaN(d) ? ts : d.toLocaleDateString();
}
function fmtDateTime(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return isNaN(d) ? ts : d.toLocaleString();
}
function fmtMoney(v, ccy) {
  var n = parseFloat(v);
  if (isNaN(n)) return '—';
  return (ccy || 'KES') + ' ' + n.toLocaleString(undefined, { minimumFractionDigits: 2 });
}

/* ── Pagination helper ──────────────────────────────────────────── */
function renderPagination(container, page, total, perPage, onPage) {
  var pages = Math.ceil(total / perPage) || 1;
  var html = '';
  html += '<button class="page-btn"' + (page<=1?' disabled':'') + ' data-p="' + (page-1) + '">&laquo;</button>';
  var start = Math.max(1, page-2), end = Math.min(pages, page+2);
  for (var i=start; i<=end; i++) {
    html += '<button class="page-btn' + (i===page?' active':'') + '" data-p="' + i + '">' + i + '</button>';
  }
  html += '<button class="page-btn"' + (page>=pages?' disabled':'') + ' data-p="' + (page+1) + '">&raquo;</button>';
  container.innerHTML = html;
  container.querySelectorAll('.page-btn:not([disabled])').forEach(function (btn) {
    btn.onclick = function () { onPage(parseInt(btn.dataset.p, 10)); };
  });
}

/* ── Simple SPA router ──────────────────────────────────────────── */
var Router = (function () {
  var _routes = {};
  var _active  = null;
  var _content = null;
  var _navItems = null;

  function init(contentEl, navItemsSelector) {
    _content  = contentEl;
    _navItems = navItemsSelector;
  }

  function register(id, fn) { _routes[id] = fn; }

  function navigate(id, params) {
    if (!_routes[id]) { console.warn('Unknown route:', id); return; }
    _active = id;
    if (_content) _content.innerHTML = '';
    // Update active nav item.
    if (_navItems) {
      document.querySelectorAll(_navItems).forEach(function (el) {
        el.classList.toggle('active', el.dataset.route === id);
      });
    }
    try {
      _routes[id](_content, params || {});
    } catch (e) {
      console.error('Router: route "' + id + '" threw during render:', e);
      if (_content) {
        _content.innerHTML = errorCard(e, function () { navigate(id, params || {}); });
      }
    }
  }

  return { init: init, register: register, navigate: navigate, current: function () { return _active; } };
})();

/* ── Global logout handler ──────────────────────────────────────── */
window.addEventListener('hass:logout', function () {
  Toast.error('Session expired. Please log in again.');
  // window.location is blocked in the GAS sandbox iframe; swap the document
  // with the freshly-rendered login page instead. _hassLoadLoginPage is
  // defined by the host page (e.g. Staffdashboard).
  setTimeout(function () {
    if (typeof window._hassLoadLoginPage === 'function') {
      window._hassLoadLoginPage();
    } else {
      google.script.run
        .withSuccessHandler(function (html) {
          document.open(); document.write(html); document.close();
        })
        .getLoginPage();
    }
  }, 1500);
});

/* ── Escape HTML ────────────────────────────────────────────────── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Safe DOM write ─────────────────────────────────────────────────
 * setHTML(idOrEl, html) writes innerHTML to a target, but NO-OPS safely if
 * the target is missing (and warns). This is the guard against the
 * "Cannot set properties of null (setting 'innerHTML')" error, which happens
 * when an async API callback resolves after the user has navigated away and
 * the element it wanted to write into has been removed from the DOM. */
function setHTML(idOrEl, html) {
  var el = (typeof idOrEl === 'string') ? document.getElementById(idOrEl) : idOrEl;
  if (!el) { console.warn('setHTML: target not found (stale render?):', idOrEl); return null; }
  el.innerHTML = html;
  return el;
}
window.setHTML = setHTML;

/* ── Navigate + sync header/active state ─────────────────────────────
 * Used by drill-downs (dashboard cards, customer→contacts) so the page
 * title and active sidebar item stay in sync, matching a sidebar click. */
function goRoute(route, params) {
  var item = document.querySelector('.nav-item[data-route="' + route + '"]');
  if (item) {
    var t = document.getElementById('pageTitle');
    var span = item.querySelector('span');
    if (t && span) t.textContent = span.textContent;
  }
  Router.navigate(route, params || {});
}
window.goRoute = goRoute;

/* ── Loading / empty / error state helpers ───────────────────────────
 * Consistent markup reused by every list/detail render. The *Row helpers
 * return a single <tr> for use inside a <tbody>; spinnerHTML/errorCard
 * return block markup for card/panel containers. Retry callbacks are wired
 * after insertion via a unique id (works regardless of how the HTML is
 * injected). */
function spinnerHTML(pad) {
  return '<div style="display:flex;justify-content:center;padding:' +
    (pad || 40) + 'px"><span class="spinner dark"></span></div>';
}
function loadingRow(colspan) {
  return '<tr><td colspan="' + colspan +
    '" style="text-align:center;padding:28px"><span class="spinner dark"></span></td></tr>';
}
function emptyRow(colspan, msg) {
  return '<tr><td colspan="' + colspan + '"><div class="empty-state">' +
    esc(msg || 'Nothing here yet.') + '</div></td></tr>';
}
function _wireRetry(id, retryFn) {
  if (!retryFn) return;
  setTimeout(function () {
    var b = document.getElementById(id);
    if (b) b.onclick = function () { retryFn(); };
  }, 0);
}
function errorRow(colspan, err, retryFn) {
  var msg = (err && err.message) ? err.message : (typeof err === 'string' ? err : 'Something went wrong.');
  var id  = '_er' + Math.random().toString(36).slice(2);
  _wireRetry(id, retryFn);
  return '<tr><td colspan="' + colspan + '"><div class="empty-state">' +
    '<p style="margin:0 0 12px;color:var(--clr-danger)">' + esc(msg) + '</p>' +
    (retryFn ? '<button class="btn btn-primary btn-sm" id="' + id + '">Retry</button>' : '') +
    '</div></td></tr>';
}
function errorCard(err, retryFn) {
  var msg = (err && err.message) ? err.message : (typeof err === 'string' ? err : 'Something went wrong.');
  var id  = '_ec' + Math.random().toString(36).slice(2);
  _wireRetry(id, retryFn);
  return '<div class="card"><div class="card-body"><div class="empty-state">' +
    '<div style="font-weight:600;margin-bottom:6px">Couldn’t load this view</div>' +
    '<p style="margin:0 0 14px">' + esc(msg) + '</p>' +
    (retryFn ? '<button class="btn btn-primary btn-sm" id="' + id + '">Retry</button>' : '') +
    '</div></div></div>';
}

/* ── Branding ───────────────────────────────────────────────────── */
function applyBranding(b) {
  if (!b) return;
  var r = document.documentElement.style;
  if (b.primary_color)   r.setProperty('--clr-primary', b.primary_color);
  if (b.secondary_color) r.setProperty('--clr-gold',    b.secondary_color);
  if (b.accent_color)    r.setProperty('--clr-accent',  b.accent_color);
  if (b.app_name) {
    document.querySelectorAll('.sidebar-logo, .login-title')
      .forEach(function(el){ el.textContent = b.app_name; });
  }
}
window.applyBranding = applyBranding;

/* ── Floating Assistant chat widget ──────────────────────────────────
 * Fixed bottom-right launcher → toggles a chat panel. Talks to
 * bot.chat with the user's session (RBAC + read-only guards stay
 * server-side; no keys client-side). Keeps the last ~6 turns of history
 * client-side for context. Renders navigate:{route,params} as an
 * "Open <route>" button via Router.navigate. */
var ChatWidget = (function () {
  'use strict';
  var HISTORY_TURNS = 6;          // turns (user+assistant) kept for context
  var _mounted = false;
  var _open    = false;
  var _busy    = false;
  var _history = [];              // [{role:'user'|'assistant', content}]
  var _els     = {};

  function _injectStyles() {
    if (document.getElementById('hassChatStyles')) return;
    var css =
      '.hass-chat-launcher{position:fixed;right:24px;bottom:24px;width:56px;height:56px;' +
        'border-radius:50%;background:var(--clr-primary);color:var(--clr-gold);border:none;cursor:pointer;' +
        'box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;z-index:800;' +
        'transition:transform .15s ease, background .15s ease;}' +
      '.hass-chat-launcher:hover{background:var(--clr-primary-d);transform:translateY(-2px);}' +
      '.hass-chat-launcher svg{width:26px;height:26px;}' +
      '.hass-chat-panel{position:fixed;right:24px;bottom:92px;width:360px;height:520px;max-width:calc(100vw - 32px);' +
        'max-height:calc(100vh - 120px);background:var(--clr-surface);border:1px solid var(--clr-border);' +
        'border-radius:12px;box-shadow:var(--shadow-md);display:none;flex-direction:column;overflow:hidden;z-index:800;}' +
      '.hass-chat-panel.open{display:flex;animation:hassChatIn .18s ease;}' +
      '@keyframes hassChatIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}' +
      '.hass-chat-head{background:var(--clr-primary);color:#fff;padding:12px 14px;display:flex;align-items:center;' +
        'justify-content:space-between;flex-shrink:0;}' +
      '.hass-chat-head .ttl{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;}' +
      '.hass-chat-head .ttl .dot{width:8px;height:8px;border-radius:50%;background:var(--clr-gold);}' +
      '.hass-chat-head button{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:20px;line-height:1;}' +
      '.hass-chat-head button:hover{color:#fff;}' +
      '.hass-chat-body{flex:1;overflow-y:auto;padding:14px;background:var(--clr-bg);display:flex;flex-direction:column;gap:10px;}' +
      '.hass-msg{max-width:82%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word;}' +
      '.hass-msg.user{align-self:flex-end;background:var(--clr-primary);color:#fff;border-bottom-right-radius:3px;}' +
      '.hass-msg.bot{align-self:flex-start;background:var(--clr-surface);border:1px solid var(--clr-border);color:var(--clr-text);border-bottom-left-radius:3px;}' +
      '.hass-msg.err{align-self:flex-start;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;}' +
      '.hass-msg .nav-btn{margin-top:8px;}' +
      '.hass-msg .retry-btn{margin-top:8px;}' +
      '.hass-typing{align-self:flex-start;display:flex;gap:4px;padding:10px 12px;background:var(--clr-surface);' +
        'border:1px solid var(--clr-border);border-radius:12px;border-bottom-left-radius:3px;}' +
      '.hass-typing span{width:6px;height:6px;border-radius:50%;background:var(--clr-muted);opacity:.5;' +
        'animation:hassBlink 1.2s infinite;}' +
      '.hass-typing span:nth-child(2){animation-delay:.2s;}.hass-typing span:nth-child(3){animation-delay:.4s;}' +
      '@keyframes hassBlink{0%,80%,100%{opacity:.3;}40%{opacity:1;}}' +
      '.hass-chat-foot{flex-shrink:0;border-top:1px solid var(--clr-border);padding:10px;display:flex;gap:8px;background:var(--clr-surface);}' +
      '.hass-chat-foot textarea{flex:1;resize:none;border:1px solid var(--clr-border);border-radius:var(--radius);' +
        'padding:8px 10px;font-family:var(--font);font-size:13px;max-height:90px;line-height:1.4;}' +
      '.hass-chat-foot textarea:focus{outline:none;border-color:var(--clr-primary);box-shadow:0 0 0 3px rgba(31,42,68,.15);}' +
      '.hass-chat-foot button{flex-shrink:0;}' +
      '.hass-chat-empty{margin:auto;text-align:center;color:var(--clr-text-light);font-size:13px;padding:0 18px;}';
    var s = document.createElement('style');
    s.id = 'hassChatStyles';
    s.textContent = css;
    document.head.appendChild(s);
  }

  function _build() {
    _injectStyles();

    var launcher = document.createElement('button');
    launcher.className = 'hass-chat-launcher';
    launcher.title = 'Hass Assistant';
    launcher.setAttribute('aria-label', 'Open assistant');
    launcher.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>';

    var panel = document.createElement('div');
    panel.className = 'hass-chat-panel';
    panel.innerHTML =
      '<div class="hass-chat-head">' +
        '<span class="ttl"><span class="dot"></span>Hass Assistant</span>' +
        '<button type="button" title="Close" aria-label="Close">&times;</button>' +
      '</div>' +
      '<div class="hass-chat-body"></div>' +
      '<div class="hass-chat-foot">' +
        '<textarea rows="1" placeholder="Ask me anything…"></textarea>' +
        '<button class="btn btn-primary btn-sm">Send</button>' +
      '</div>';

    document.body.appendChild(launcher);
    document.body.appendChild(panel);

    _els.launcher = launcher;
    _els.panel    = panel;
    _els.body     = panel.querySelector('.hass-chat-body');
    _els.input    = panel.querySelector('textarea');
    _els.send     = panel.querySelector('.hass-chat-foot button');
    _els.close    = panel.querySelector('.hass-chat-head button');

    launcher.onclick  = toggle;
    _els.close.onclick = function () { setOpen(false); };
    _els.send.onclick  = _onSend;
    _els.input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); _onSend(); }
    });

    _renderEmpty();
  }

  function _renderEmpty() {
    _els.body.innerHTML =
      '<div class="hass-chat-empty">Hi! I can look up customers, orders, invoices and more — ' +
      'all read-only and scoped to your access. What do you need?</div>';
  }

  function _scroll() { _els.body.scrollTop = _els.body.scrollHeight; }

  function _addBubble(cls, text) {
    var d = document.createElement('div');
    d.className = 'hass-msg ' + cls;
    d.textContent = text;
    _els.body.appendChild(d);
    _scroll();
    return d;
  }

  function _showTyping() {
    var t = document.createElement('div');
    t.className = 'hass-typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    _els.body.appendChild(t);
    _scroll();
    return t;
  }

  function _onSend() {
    if (_busy) return;
    var msg = (_els.input.value || '').trim();
    if (!msg) return;

    // Clear the intro on first message.
    if (_els.body.querySelector('.hass-chat-empty')) _els.body.innerHTML = '';

    _els.input.value = '';
    _addBubble('user', msg);
    _send(msg);
  }

  function _send(msg) {
    _busy = true;
    _els.send.disabled = true;
    var typing = _showTyping();
    var historySnapshot = _history.slice(-HISTORY_TURNS * 2);

    API.call('bot', 'chat', { message: msg, history: historySnapshot }, { retries: 1 })
      .then(function (res) {
        if (typing.parentNode) typing.remove();
        _busy = false; _els.send.disabled = false;
        _renderAnswer(msg, res);
      })
      .catch(function (err) {
        if (typing.parentNode) typing.remove();
        _busy = false; _els.send.disabled = false;
        _renderError(msg, err);
      });
  }

  function _renderAnswer(userMsg, res) {
    var answer = (res && res.answer) ? res.answer : 'I could not produce an answer.';

    // Graceful "not configured" state with a hint for admins.
    if (res && res.turnId == null && /not configured/i.test(answer)) {
      var b = _addBubble('bot', answer);
      var hint = document.createElement('div');
      hint.style.cssText = 'margin-top:6px;font-size:12px;color:var(--clr-text-light)';
      hint.textContent = 'Admins can set this up under Admin → Bot Assistant.';
      b.appendChild(hint);
      return; // do not record an un-answered turn in history
    }

    var bubble = _addBubble('bot', answer);

    // Navigation directive → "Open <route>" button.
    var nav = res && res.navigate;
    if (nav && nav.route) {
      var btn = document.createElement('button');
      btn.className = 'btn btn-secondary btn-sm nav-btn';
      btn.textContent = 'Open ' + nav.route;
      btn.onclick = function () {
        try {
          if (typeof goRoute === 'function') goRoute(nav.route, nav.params || {});
          else Router.navigate(nav.route, nav.params || {});
        } catch (e) { Toast && Toast.error('Could not open ' + nav.route); }
        setOpen(false);
      };
      bubble.appendChild(btn);
    }

    // Record the turn for follow-up context.
    _history.push({ role: 'user', content: userMsg });
    _history.push({ role: 'assistant', content: answer });
    if (_history.length > HISTORY_TURNS * 2) _history = _history.slice(-HISTORY_TURNS * 2);
  }

  function _renderError(userMsg, err) {
    var msg = (err && err.message) ? err.message : 'Something went wrong. Please try again.';
    var bubble = _addBubble('err', msg);
    var retry = document.createElement('button');
    retry.className = 'btn btn-secondary btn-sm retry-btn';
    retry.textContent = 'Retry';
    retry.onclick = function () { bubble.remove(); _send(userMsg); };
    bubble.appendChild(retry);
  }

  function setOpen(open) {
    _open = open;
    _els.panel.classList.toggle('open', open);
    if (open) setTimeout(function () { _els.input.focus(); }, 50);
  }
  function toggle() { setOpen(!_open); }

  function mount() {
    if (_mounted) return;
    _mounted = true;
    _build();
  }

  return { mount: mount, open: function () { setOpen(true); }, close: function () { setOpen(false); } };
})();
window.ChatWidget = ChatWidget;
</script>
