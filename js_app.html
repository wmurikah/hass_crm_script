<script>
// ─────────────────────────────────────────────────────────────────
//  js_app.html  — Hass CMS app framework (Stage 6)
//  Router, Toast, Modal, and global event bus.
// ─────────────────────────────────────────────────────────────────

/* ── HassCache: sessionStorage-first cache (stale-while-revalidate) ──
 * For data that does not change per-load (reference lists, branding, menu,
 * profile, role/permission flags). Two layers: an in-memory map (instant,
 * survives route changes) backed by sessionStorage (survives full reloads
 * within the tab). Each entry carries an expiry so callers can choose between
 * "fresh only" and "last-known" reads.
 *
 *   HassCache.fresh(key)        → value if present AND not past its TTL, else null
 *   HassCache.any(key)          → last-known value ignoring TTL (instant paint), else null
 *   HassCache.set(key, v, ttlS) → store with a TTL in seconds
 *   HassCache.remove(key)       → drop one key
 *   HassCache.clearAll()        → drop everything (called on logout / session loss)
 *
 * DO NOT cache live transactional data (orders, tickets, payments, invoices)
 * beyond a short TTL — those must reflect the current backend state. This cache
 * is for slow-moving reference/identity data only. */
var HassCache = (function () {
  'use strict';
  var PREFIX = 'hc_';
  var _mem = {};
  function _now() { return Date.now(); }
  function _read(key) {
    if (_mem[key] !== undefined) return _mem[key];
    try {
      var raw = sessionStorage.getItem(PREFIX + key);
      if (raw) { var o = JSON.parse(raw); _mem[key] = o; return o; }
    } catch (_) {}
    return null;
  }
  return {
    set: function (key, value, ttlSec) {
      var o = { v: value, exp: _now() + (ttlSec || 300) * 1000 };
      _mem[key] = o;
      try { sessionStorage.setItem(PREFIX + key, JSON.stringify(o)); } catch (_) {}
    },
    fresh: function (key) { var o = _read(key); return (o && o.exp > _now()) ? o.v : null; },
    any:   function (key) { var o = _read(key); return o ? o.v : null; },
    remove: function (key) {
      delete _mem[key];
      try { sessionStorage.removeItem(PREFIX + key); } catch (_) {}
    },
    clearAll: function () {
      _mem = {};
      try {
        var kill = [];
        for (var i = 0; i < sessionStorage.length; i++) {
          var k = sessionStorage.key(i);
          if (k && k.indexOf(PREFIX) === 0) kill.push(k);
        }
        kill.forEach(function (k) { sessionStorage.removeItem(k); });
      } catch (_) {}
    },
  };
})();
window.HassCache = HassCache;

/* ── Perms: the current user's resolved permission set ───────────────
 * auth.me delivers the union of permission codes across all of the signed-in
 * user's roles (SUPER_ADMIN resolves to ['*']). The shell loads it once after
 * the auth guard passes; menu/section/action gating reads it through has().
 * This is the client mirror of Rbac.userHasPermission on the server: '*' grants
 * everything, otherwise an exact code match is required. It is a convenience for
 * the UI only; every action is still enforced server-side by the dispatcher. */
var Perms = (function () {
  'use strict';
  var _set = {};
  return {
    load: function (list) {
      _set = {};
      (list || []).forEach(function (c) { if (c) _set[String(c)] = 1; });
    },
    has: function (code) { return !!(_set['*'] || (code && _set[String(code)])); },
    list: function () { return Object.keys(_set); },
    isSuperAdmin: function () { return !!_set['*']; },
  };
})();
window.HassPerms = Perms;

/* ── can(code): permission-driven affordance gate ────────────────────
 * Thin convenience over Perms.has, used by every section to decide whether
 * to RENDER an action affordance (create, edit, delete, status change,
 * assign). The delivered set comes from auth.me; the SUPER_ADMIN wildcard
 * '*' grants all, so a super admin sees every management control across
 * every entity while other roles see only the actions their permissions
 * allow. This is presentation only: the dispatcher and Rbac still enforce
 * the same code server-side on every call, so hiding a button is never the
 * security boundary. Gate each affordance on the SAME permission code its
 * server action is registered with, so what shows always matches what the
 * server will accept. */
function can(code) { return !!(window.HassPerms && window.HassPerms.has(code)); }
window.can = can;

/* ── Toast ─────────────────────────────────────────────────────── */
var Toast = (function () {
  var _container;
  function _ensure() {
    if (!_container) {
      _container = document.createElement('div');
      _container.className = 'toast-container';
      document.body.appendChild(_container);
    }
  }
  function show(msg, type, duration) {
    _ensure();
    var el = document.createElement('div');
    el.className = 'toast ' + (type || '');
    el.textContent = msg;
    _container.appendChild(el);
    setTimeout(function () {
      el.style.opacity = '0';
      el.style.transition = 'opacity .3s';
      setTimeout(function () { el.remove(); }, 300);
    }, duration || 3500);
  }
  return {
    success: function (m) { show(m, 'success'); },
    error:   function (m) { show(m, 'error'); },
    warning: function (m) { show(m, 'warning'); },
    info:    function (m) { show(m, ''); },
  };
})();

/* ── Modal ─────────────────────────────────────────────────────── */
var Modal = (function () {
  var _current;
  function open(opts) {
    close();
    var backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop open';
    backdrop.innerHTML =
      '<div class="modal">' +
        '<div class="modal-header">' +
          '<span class="modal-title">' + (opts.title || '') + '</span>' +
          '<button class="modal-close" title="Close">&times;</button>' +
        '</div>' +
        '<div class="modal-body">' + (opts.body || '') + '</div>' +
        (opts.footer
          ? '<div class="modal-footer">' + opts.footer + '</div>'
          : '') +
      '</div>';
    backdrop.querySelector('.modal-close').onclick = close;
    backdrop.addEventListener('click', function (e) {
      if (e.target === backdrop) close();
    });
    document.body.appendChild(backdrop);
    _current = backdrop;
    if (opts.onOpen) opts.onOpen(backdrop);
  }
  function close() {
    if (_current) { _current.remove(); _current = null; }
  }
  function confirm(msg, onYes, onNo) {
    open({
      title: 'Confirm',
      body: '<p style="margin:0 0 16px">' + msg + '</p>',
      footer: '<button class="btn btn-secondary" id="_mno">Cancel</button>' +
              '<button class="btn btn-danger" id="_myes">Confirm</button>',
      onOpen: function (bd) {
        bd.querySelector('#_mno').onclick  = function () { close(); if (onNo)  onNo(); };
        bd.querySelector('#_myes').onclick = function () { close(); if (onYes) onYes(); };
      },
    });
  }
  return { open: open, close: close, confirm: confirm };
})();

/* ── Loading overlay ────────────────────────────────────────────── */
var Loader = (function () {
  function show(parent) {
    var p = parent || document.body;
    p.style.position = 'relative';
    var el = document.createElement('div');
    el.className = 'loading-overlay';
    el.innerHTML = '<span class="spinner dark"></span>';
    p.appendChild(el);
    return el;
  }
  function hide(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
  return { show: show, hide: hide };
})();

/* ── Badge helper ───────────────────────────────────────────────── */
function statusBadge(status) {
  var map = {
    ACTIVE: 'success', APPROVED: 'success', DELIVERED: 'success', CLOSED: 'success', PUBLISHED: 'success',
    PENDING: 'warning', SUBMITTED: 'warning', PENDING_REVIEW: 'warning', DRAFT: 'neutral', NEW: 'neutral',
    REJECTED: 'danger',  CANCELLED: 'danger',  FAILED: 'danger',
    OPEN: 'primary', DISPATCHED: 'primary', ISSUED: 'primary',
    INACTIVE: 'neutral', ARCHIVED: 'neutral',
  };
  var cls = map[String(status).toUpperCase()] || 'neutral';
  return '<span class="badge badge-' + cls + '">' + status + '</span>';
}

/* ── Format helpers ─────────────────────────────────────────────── */
function fmtDate(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return isNaN(d) ? ts : d.toLocaleDateString();
}
function fmtDateTime(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return isNaN(d) ? ts : d.toLocaleString();
}
function fmtMoney(v, ccy) {
  var n = parseFloat(v);
  if (isNaN(n)) return '—';
  return (ccy || 'KES') + ' ' + n.toLocaleString(undefined, { minimumFractionDigits: 2 });
}

/* ── Pagination helper ──────────────────────────────────────────── */
function renderPagination(container, page, total, perPage, onPage) {
  var pages = Math.ceil(total / perPage) || 1;
  var html = '';
  html += '<button class="page-btn"' + (page<=1?' disabled':'') + ' data-p="' + (page-1) + '">&laquo;</button>';
  var start = Math.max(1, page-2), end = Math.min(pages, page+2);
  for (var i=start; i<=end; i++) {
    html += '<button class="page-btn' + (i===page?' active':'') + '" data-p="' + i + '">' + i + '</button>';
  }
  html += '<button class="page-btn"' + (page>=pages?' disabled':'') + ' data-p="' + (page+1) + '">&raquo;</button>';
  container.innerHTML = html;
  container.querySelectorAll('.page-btn:not([disabled])').forEach(function (btn) {
    btn.onclick = function () { onPage(parseInt(btn.dataset.p, 10)); };
  });
}

/* ── Simple SPA router ──────────────────────────────────────────── */
var Router = (function () {
  var _routes = {};
  var _active  = null;
  var _content = null;
  var _navItems = null;

  function init(contentEl, navItemsSelector) {
    _content  = contentEl;
    _navItems = navItemsSelector;
  }

  function register(id, fn) { _routes[id] = fn; }

  function navigate(id, params) {
    if (!_routes[id]) { console.warn('Unknown route:', id); return; }
    _active = id;
    if (_content) _content.innerHTML = '';
    // Update active nav item (visual highlight + aria-current for wayfinding).
    if (_navItems) {
      document.querySelectorAll(_navItems).forEach(function (el) {
        var isActive = el.dataset.route === id;
        el.classList.toggle('active', isActive);
        if (isActive) el.setAttribute('aria-current', 'page');
        else          el.removeAttribute('aria-current');
      });
    }
    try {
      _routes[id](_content, params || {});
    } catch (e) {
      console.error('Router: route "' + id + '" threw during render:', e);
      if (_content) {
        _content.innerHTML = errorCard(e, function () { navigate(id, params || {}); });
      }
    }
    // Notify listeners (e.g. the assistant) so page-aware features can react.
    try { window.dispatchEvent(new CustomEvent('hass:route', { detail: { route: id, params: params || {} } })); } catch (_) {}
  }

  return { init: init, register: register, navigate: navigate, current: function () { return _active; } };
})();

/* ── Global logout handler ──────────────────────────────────────── */
window.addEventListener('hass:logout', function () {
  // Drop any cached reference/identity data so a different user signing in on
  // this tab never sees the previous user's menu/branding/profile.
  try { HassCache.clearAll(); } catch (_) {}
  Toast.error('Session expired. Please log in again.');
  // window.location is blocked in the GAS sandbox iframe; swap the document
  // with the freshly-rendered login page instead. _hassLoadLoginPage is
  // defined by the host page (e.g. Staffdashboard).
  setTimeout(function () {
    if (typeof window._hassLoadLoginPage === 'function') {
      window._hassLoadLoginPage();
    } else {
      google.script.run
        .withSuccessHandler(function (html) {
          document.open(); document.write(html); document.close();
        })
        .getLoginPage();
    }
  }, 1500);
});

/* ── Escape HTML ────────────────────────────────────────────────── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Safe DOM write ─────────────────────────────────────────────────
 * setHTML(idOrEl, html) writes innerHTML to a target, but NO-OPS safely if
 * the target is missing (and warns). This is the guard against the
 * "Cannot set properties of null (setting 'innerHTML')" error, which happens
 * when an async API callback resolves after the user has navigated away and
 * the element it wanted to write into has been removed from the DOM. */
function setHTML(idOrEl, html) {
  var el = (typeof idOrEl === 'string') ? document.getElementById(idOrEl) : idOrEl;
  if (!el) { console.warn('setHTML: target not found (stale render?):', idOrEl); return null; }
  el.innerHTML = html;
  return el;
}
window.setHTML = setHTML;

/* ── Navigate + sync header/active state ─────────────────────────────
 * Used by drill-downs (dashboard cards, customer→contacts) so the page
 * title and active sidebar item stay in sync, matching a sidebar click. */
function goRoute(route, params) {
  // Reveal the sidebar group that owns this route (it may be collapsed when
  // arriving via a drill-down). No-op outside the staff shell.
  if (typeof window._hassOpenNavGroup === 'function') window._hassOpenNavGroup(route);
  var item = document.querySelector('.nav-item[data-route="' + route + '"]');
  if (item) {
    var t = document.getElementById('pageTitle');
    var labelEl = item.querySelector('.nav-label') || item.querySelector('span');
    if (t && labelEl) t.textContent = labelEl.textContent;
  }
  Router.navigate(route, params || {});
}
window.goRoute = goRoute;

/* ── Loading / empty / error state helpers ───────────────────────────
 * Consistent markup reused by every list/detail render. The *Row helpers
 * return a single <tr> for use inside a <tbody>; spinnerHTML/errorCard
 * return block markup for card/panel containers. Retry callbacks are wired
 * after insertion via a unique id (works regardless of how the HTML is
 * injected). */
function spinnerHTML(pad) {
  return '<div style="display:flex;justify-content:center;padding:' +
    (pad || 40) + 'px"><span class="spinner dark"></span></div>';
}
function loadingRow(colspan) {
  return '<tr><td colspan="' + colspan +
    '" style="text-align:center;padding:28px"><span class="spinner dark"></span></td></tr>';
}
function emptyRow(colspan, msg) {
  return '<tr><td colspan="' + colspan + '"><div class="empty-state">' +
    esc(msg || 'Nothing here yet.') + '</div></td></tr>';
}
function _wireRetry(id, retryFn) {
  if (!retryFn) return;
  setTimeout(function () {
    var b = document.getElementById(id);
    if (b) b.onclick = function () { retryFn(); };
  }, 0);
}
function errorRow(colspan, err, retryFn) {
  var msg = (err && err.message) ? err.message : (typeof err === 'string' ? err : 'Something went wrong.');
  var id  = '_er' + Math.random().toString(36).slice(2);
  _wireRetry(id, retryFn);
  return '<tr><td colspan="' + colspan + '"><div class="empty-state">' +
    '<p style="margin:0 0 12px;color:var(--clr-danger)">' + esc(msg) + '</p>' +
    (retryFn ? '<button class="btn btn-primary btn-sm" id="' + id + '">Retry</button>' : '') +
    '</div></td></tr>';
}
function errorCard(err, retryFn) {
  var msg = (err && err.message) ? err.message : (typeof err === 'string' ? err : 'Something went wrong.');
  var id  = '_ec' + Math.random().toString(36).slice(2);
  _wireRetry(id, retryFn);
  return '<div class="card"><div class="card-body"><div class="empty-state">' +
    '<div style="font-weight:600;margin-bottom:6px">Couldn’t load this view</div>' +
    '<p style="margin:0 0 14px">' + esc(msg) + '</p>' +
    (retryFn ? '<button class="btn btn-primary btn-sm" id="' + id + '">Retry</button>' : '') +
    '</div></div></div>';
}

/* ── Branding ───────────────────────────────────────────────────── */
function applyBranding(b) {
  if (!b) return;
  var r = document.documentElement.style;
  if (b.primary_color)   r.setProperty('--clr-primary', b.primary_color);
  if (b.secondary_color) r.setProperty('--clr-gold',    b.secondary_color);
  if (b.accent_color)    r.setProperty('--clr-accent',  b.accent_color);
  if (b.app_name) {
    // Target the wordmark text span (not .sidebar-logo) so the gold brand mark
    // beside it is preserved; .login-title keeps its legacy behaviour.
    document.querySelectorAll('.sidebar-logo-text, .login-title')
      .forEach(function(el){ el.textContent = b.app_name; });
  }
}
window.applyBranding = applyBranding;

/* ── HassTable: shared result-table helpers (assistant + Reports page) ──
 * Formats cells by column type, renders a capped HTML table with a totals
 * line, builds CSV and triggers a client-side download. No server round-trip
 * for export. Used by the assistant's rich responses and the Reports runner. */
var HassTable = (function () {
  'use strict';

  function fmtCell(v, type) {
    if (v === null || v === undefined || v === '') return '-';
    if (type === 'money') {
      var n = parseFloat(v); if (isNaN(n)) return esc(v);
      return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    if (type === 'percent') { var p = parseFloat(v); return isNaN(p) ? esc(v) : (p + '%'); }
    if (type === 'number')  { var i = Number(v); return isNaN(i) ? esc(v) : i.toLocaleString(); }
    if (type === 'date')    { return esc(fmtDate(v)); }
    return esc(v);
  }

  function tableHTML(columns, rows, opts) {
    opts = opts || {};
    var maxRows = opts.maxRows || 50;
    var total = rows.length;
    var show  = rows.slice(0, maxRows);
    var th = columns.map(function (c) { return '<th>' + esc(c.label || c.key) + '</th>'; }).join('');
    var body = show.map(function (row) {
      return '<tr>' + columns.map(function (c) {
        var t = c.type || 'text';
        var cls = (t === 'money' || t === 'number' || t === 'percent') ? ' class="num"' : '';
        return '<td' + cls + '>' + fmtCell(row[c.key], t) + '</td>';
      }).join('') + '</tr>';
    }).join('');
    var note = total > show.length
      ? '<div class="hass-tbl-note">Showing ' + show.length + ' of ' + total + ' rows. Export CSV for the full set.</div>'
      : '';
    return '<div class="hass-table-wrap"><table class="hass-rtable"><thead><tr>' + th +
           '</tr></thead><tbody>' + body + '</tbody></table></div>' + note;
  }

  function totalsHTML(totals) {
    if (!totals || typeof totals !== 'object') return '';
    var chips = [];
    Object.keys(totals).forEach(function (k) {
      var v = totals[k];
      if (k === 'by_currency' && v && typeof v === 'object') {
        Object.keys(v).forEach(function (ccy) {
          var m = v[ccy];
          if (m && typeof m === 'object') {
            var parts = Object.keys(m).map(function (mk) {
              var num = parseFloat(m[mk]);
              return mk.replace(/_/g, ' ') + ' ' + (isNaN(num) ? m[mk] : num.toLocaleString(undefined, { maximumFractionDigits: 2 }));
            });
            chips.push('<span class="hass-chip-total">' + esc(ccy) + ': ' + esc(parts.join(', ')) + '</span>');
          } else {
            chips.push('<span class="hass-chip-total">' + esc(ccy) + ': ' + esc(String(v[ccy])) + '</span>');
          }
        });
      } else if (k === 'by_tier' && v && typeof v === 'object') {
        Object.keys(v).forEach(function (tk) { chips.push('<span class="hass-chip-total">' + esc(tk) + ': ' + esc(String(v[tk])) + '</span>'); });
      } else if (v === null || typeof v !== 'object') {
        chips.push('<span class="hass-chip-total">' + esc(k.replace(/_/g, ' ')) + ': ' + esc(String(v)) + '</span>');
      }
    });
    return chips.length ? '<div class="hass-totals">' + chips.join('') + '</div>' : '';
  }

  function toCSV(columns, rows) {
    function cell(v) {
      var s = (v === null || v === undefined) ? '' : String(v);
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }
    var head = columns.map(function (c) { return cell(c.label || c.key); }).join(',');
    var body = rows.map(function (row) {
      return columns.map(function (c) { return cell(row[c.key]); }).join(',');
    }).join('\n');
    return head + '\n' + body;
  }

  function download(filename, text) {
    try {
      var blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
      return true;
    } catch (e) { return false; }
  }

  return { fmtCell: fmtCell, tableHTML: tableHTML, totalsHTML: totalsHTML, toCSV: toCSV, download: download };
})();
window.HassTable = HassTable;

/* ── Floating Assistant chat widget (proactive co-pilot) ──────────────
 * Launcher-first: the assistant NEVER auto-opens. A small launcher bubble sits
 * at the bottom right with a short invite ("Need assistance? Click here") and a
 * subtle attention animation (a gentle gold pulse plus a soft bounce) that runs
 * for a few cycles then settles on its own, inviting a click without nagging.
 * The animation stops for the rest of the session the moment the user opens OR
 * dismisses it; the launcher always stays present, just quiet (it collapses to a
 * compact icon). Clicking it opens the panel with a role-aware greeting,
 * clickable page-aware prompt starters (served by bot.suggestions) and a free
 * text box. Renders rich responses: prose, data tables with Export CSV / Open in
 * {section} / Email to me, gated write proposals with Confirm/Cancel, and
 * one-question clarify chips. Dockable and resizable; never overflows the page.
 * All data flows through API.call('bot', ...); no keys client-side. */
var ChatWidget = (function () {
  'use strict';
  var HISTORY_TURNS = 6;
  var SEEN_KEY      = 'hass_bot_seen';   // sessionStorage: '1' once opened or dismissed this session
  var SIZE_KEY      = 'hass_bot_size';   // sessionStorage: '{w,h}'

  var _mounted = false, _open = false, _busy = false;
  var _history = [];
  var _route   = '';
  var _me      = null;
  var _started = false;            // a message has been sent this session
  var _suggestCache = {};
  var _els = {};

  var SECTION_LABEL = {
    invoices: 'Invoices', orders: 'Orders', tickets: 'Tickets', customers: 'Customers',
    payments: 'Payments', approvals: 'Approvals', documents: 'Documents', pricing: 'Pricing',
    catalog: 'Products', knowledge: 'Knowledge Base', reports: 'Reports', users: 'Users', dashboard: 'Dashboard',
  };

  function _injectStyles() {
    if (document.getElementById('hassChatStyles')) return;
    var css =
      '.hass-chat-launcher{position:fixed;right:24px;bottom:24px;display:flex;align-items:center;gap:9px;' +
        'background:var(--clr-primary);color:#fff;border:none;cursor:pointer;box-shadow:var(--shadow-md);' +
        'border-radius:999px;padding:11px 15px 11px 13px;max-width:calc(100vw - 32px);z-index:800;' +
        'transition:transform .15s ease, background .15s ease, padding .2s ease, width .2s ease;}' +
      '.hass-chat-launcher:hover{background:var(--clr-primary-d);transform:translateY(-2px);}' +
      '.hass-chat-launcher .lc-icon{display:flex;align-items:center;justify-content:center;color:var(--clr-gold);flex-shrink:0;}' +
      '.hass-chat-launcher .lc-icon svg{width:26px;height:26px;display:block;}' +
      '.hass-chat-launcher .lc-text{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}' +
      '.hass-chat-launcher .lc-x{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;' +
        'color:rgba(255,255,255,.7);font-size:16px;line-height:1;flex-shrink:0;margin-left:1px;}' +
      '.hass-chat-launcher .lc-x:hover{background:rgba(255,255,255,.16);color:#fff;}' +

  function _build() {
    _injectStyles();

      '<span class="lc-text">Need assistance? Click here</span>' +

      '</div>' +
      '<div class="hass-settings">' +

    document.body.appendChild(panel);

    _els.launcher = launcher;
    _els.panel    = panel;
    _els.body     = panel.querySelector('.hass-chat-body');
    _els.input    = panel.querySelector('textarea');
    _els.send     = panel.querySelector('.send');
    _els.close    = panel.querySelector('.cls');
    _els.dock     = panel.querySelector('.dock');
    _els.setBtn   = panel.querySelector('.set');
    _els.settings = panel.querySelector('.hass-settings');
    _els.newchat  = panel.querySelector('.newchat');
    _els.resize   = panel.querySelector('.hass-chat-resize');
    _els.dismiss  = launcher.querySelector('.lc-x');

    // launcher without opening it. Both stop the attention animation.
    launcher.onclick   = toggle;
    if (_els.dismiss) _els.dismiss.onclick = function (e) { e.stopPropagation(); _dismiss(); };
    _els.close.onclick = function () { setOpen(false); };
    _els.send.onclick  = _onSend;
    _els.dock.onclick  = _toggleDock;

    _wireResize();

  // ── Launcher state: attention animation + quiet settle ─────────────
  // "Seen" (opened or dismissed) is per-session: once set, the launcher stops
  // drawing attention and stays as a compact, quiet icon for the rest of the
  // session so it never keeps flashing.
  function _seen()     { try { return sessionStorage.getItem(SEEN_KEY) === '1'; } catch (e) { return false; } }
  function _markSeen() { try { sessionStorage.setItem(SEEN_KEY, '1'); } catch (e) {} }
  function _goQuiet() { if (_els.launcher) { _els.launcher.classList.remove('attn'); _els.launcher.classList.add('quiet'); } }
  function _dismiss() { _goQuiet(); _markSeen(); }

  // Draw a little attention for a few cycles, then let it settle. The CSS runs a
  // finite iteration count; we clear the class when those cycles finish so a
  // later hover transform is not overridden and the launcher rests quietly.
  function _playAttention() {
    if (_seen() || _open) return;
    var el = _els.launcher;
    if (!el) return;
    el.classList.add('attn');
    setTimeout(function () { if (el) el.classList.remove('attn'); }, 5300); // ~3 cycles of 1.7s
  }

  // ── Resize + dock ─────────────────────────────────────────────────
  function _clampW(w) { return Math.max(320, Math.min(w, window.innerWidth - 32)); }
  function _clampH(h) { return Math.max(360, Math.min(h, window.innerHeight - 120)); }
  function _applySize(w, h) { _els.panel.style.width = _clampW(w) + 'px'; _els.panel.style.height = _clampH(h) + 'px'; }
  function _persistSize() {
    try { sessionStorage.setItem(SIZE_KEY, JSON.stringify({ w: parseInt(_els.panel.style.width, 10), h: parseInt(_els.panel.style.height, 10) })); } catch (e) {}
  }
  function _restoreSize() {
    try {
      var s = JSON.parse(sessionStorage.getItem(SIZE_KEY) || 'null');
      if (s && s.w && s.h) _applySize(s.w, s.h);
    } catch (e) {}
  }
  function _toggleDock() {
    var wide = _els.panel.clientWidth > 520;
    if (wide) { _applySize(400, 560); } else { _applySize(window.innerWidth - 32, window.innerHeight - 120); }
    _persistSize();
  }
  function _wireResize() {
    var grip = _els.resize, startX, startY, startW, startH, dragging = false;
    function down(e) {
      dragging = true;
      var p = (e.touches && e.touches[0]) || e;
      startX = p.clientX; startY = p.clientY;
      startW = _els.panel.clientWidth; startH = _els.panel.clientHeight;
      document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
      document.addEventListener('touchmove', move, { passive: false }); document.addEventListener('touchend', up);
      e.preventDefault();
    }
    function move(e) {
      if (!dragging) return;
      var p = (e.touches && e.touches[0]) || e;
      _applySize(startW + (startX - p.clientX), startH + (startY - p.clientY));
      if (e.cancelable) e.preventDefault();
    }
    function up() {
      dragging = false; _persistSize();
      document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up);
      document.removeEventListener('touchmove', move); document.removeEventListener('touchend', up);
    }
    if (grip) { grip.addEventListener('mousedown', down); grip.addEventListener('touchstart', down, { passive: false }); }
  }

  // ── Home view: greeting + starters ────────────────────────────────
  function _renderHome() {
    _started = false;
    _els.body.innerHTML = '<div class="hass-starters"><div style="display:flex;justify-content:center;padding:24px"><span class="spinner dark"></span></div></div>';
    _loadSuggestions(_route, function (data) {
      if (_started) return; // a message was sent while loading
      var html = '<div class="hass-starters">';
      html += '<div class="hass-greet">' + esc((data && data.greeting) || 'Hi. How can I help?') + '</div>';
      (data && data.groups || []).forEach(function (g) {
        html += '<div class="hass-sgroup"><h4>' + esc(g.header) + '</h4><div class="schips">';
        (g.items || []).forEach(function (it) {
          html += '<button type="button" class="hass-starter" data-prompt="' + esc(it.prompt || it.label) + '">' + esc(it.label) + '</button>';
        });
        html += '</div></div>';
      });
      html += '</div>';
      _els.body.innerHTML = html;
      _els.body.querySelectorAll('.hass-starter').forEach(function (b) {
        b.onclick = function () { _sendUser(b.getAttribute('data-prompt')); };
      });
    });
  }

  function _loadSuggestions(route, cb) {
    var key = route || '_';
    if (_suggestCache[key]) { cb(_suggestCache[key]); return; }
    API.call('bot', 'suggestions', { route: route }, { retries: 1 })
      .then(function (data) { _suggestCache[key] = data; cb(data); })
      .catch(function () {
        cb({ greeting: (_me && _me.first_name ? 'Hi ' + _me.first_name + '. ' : 'Hi. ') +
             'Ask me to run a report, look something up, or draft a message.', groups: [] });
      });
  }

  // ── Bubbles / typing ──────────────────────────────────────────────
  function _scroll() { _els.body.scrollTop = _els.body.scrollHeight; }
  function _addBubble(cls, text) {
    var d = document.createElement('div');

  }
  function _addNode(node) { _els.body.appendChild(node); _scroll(); return node; }
  function _showTyping() {
    var t = document.createElement('div');
    t.className = 'hass-typing'; t.innerHTML = '<span></span><span></span><span></span>';

  }

  // ── Send pipeline ─────────────────────────────────────────────────
  function _onSend() {
    var msg = (_els.input.value || '').trim();
    if (!msg) return;
    _els.input.value = '';
    _sendUser(msg);
  }
  function _sendUser(msg) {
    if (_busy || !msg) return;
    if (!_started) { _started = true; _els.body.innerHTML = ''; }
    _addBubble('user', msg);
    _send(msg);
  }
  function _send(msg) {
    _busy = true; _els.send.disabled = true;
    var typing = _showTyping();
    var snapshot = _history.slice(-HISTORY_TURNS * 2);
    API.call('bot', 'chat', { message: msg, history: snapshot, route: _route }, { retries: 1 })
      .then(function (res) { if (typing.parentNode) typing.remove(); _busy = false; _els.send.disabled = false; _renderTurn(msg, res); })
      .catch(function (err) { if (typing.parentNode) typing.remove(); _busy = false; _els.send.disabled = false; _renderError(msg, err); });
  }

  function _renderTurn(userMsg, res) {
    var answer = (res && res.answer) || '';

    if (res && res.turnId == null && /not configured|not permitted/i.test(answer)) {
      var b = _addBubble('bot', answer);
      if (/not configured/i.test(answer)) {
        var hint = document.createElement('div');
        hint.style.cssText = 'margin-top:6px;font-size:12px;color:var(--clr-text-light)';
        hint.textContent = 'Admins can set this up under Admin then Bot Assistant.';
        b.appendChild(hint);
      }
      return;
    }

    if (answer) _addBubble('bot', answer);
    if (res && res.result) _renderResult(res.result);
    if (res && res.actions && res.actions.length) res.actions.forEach(_renderAction);
    if (res && res.clarify) _renderClarify(res.clarify);
    if (res && res.navigate && res.navigate.route) _renderNavigate(res.navigate);

    _history.push({ role: 'user', content: userMsg });
    _history.push({ role: 'assistant', content: answer || '(showed a result)' });
    if (_history.length > HISTORY_TURNS * 2) _history = _history.slice(-HISTORY_TURNS * 2);
  }

  function _renderResult(result) {
    var card = document.createElement('div');
    card.className = 'hass-card';
    var cols = result.columns || [], rows = result.rows || [];
    var html = '<div class="ctitle">' + esc(result.title || 'Result') + '</div>';
    if (result.summary) html += '<div class="csum">' + esc(result.summary) + '</div>';
    if (cols.length && rows.length) {
      html += HassTable.tableHTML(cols, rows, { maxRows: 50 });
      html += HassTable.totalsHTML(result.totals);
    } else {
      html += '<div class="csum">No rows.</div>';
    }
    if (result.currencyNote) html += '<div class="hass-tbl-note">' + esc(result.currencyNote) + '</div>';
    html += '<div class="hass-btnrow"></div>';
    card.innerHTML = html;

    var row = card.querySelector('.hass-btnrow');
    if (cols.length && rows.length) {
      var csvBtn = _mkBtn('btn-secondary', 'Export CSV');
      csvBtn.onclick = function () {
        var name = String(result.title || 'report').replace(/[^a-z0-9]+/gi, '_').toLowerCase() + '.csv';
        if (!HassTable.download(name, HassTable.toCSV(cols, rows))) Toast.error('Could not export. Try Email to me.');
      };
      row.appendChild(csvBtn);

      var mailBtn = _mkBtn('btn-secondary', 'Email to me');
      mailBtn.onclick = function () {
        mailBtn.disabled = true; mailBtn.textContent = 'Sending...';
        API.call('bot', 'emailResult', { title: result.title, summary: result.summary, columns: cols, rows: rows }, { retries: 0 })
          .then(function (r) { mailBtn.textContent = 'Emailed'; Toast.success('Emailed to ' + (r && r.to ? r.to : 'you') + '.'); })
          .catch(function (e) { mailBtn.disabled = false; mailBtn.textContent = 'Email to me'; Toast.error((e && e.message) || 'Could not email.'); });
      };
      row.appendChild(mailBtn);
    }
    if (result.deepLink && result.deepLink.route) {
      var label = SECTION_LABEL[result.deepLink.route] || result.deepLink.route;
      var openBtn = _mkBtn('btn-primary', 'Open in ' + label);
      openBtn.onclick = function () { _openRoute(result.deepLink); };
      row.appendChild(openBtn);
    }
    _addNode(card);
  }

  function _renderAction(action) {
    var card = document.createElement('div');
    card.className = 'hass-action';
    card.innerHTML = '<div class="alabel">Confirm to proceed</div>' +
      '<div>' + esc(action.preview || ('Run ' + action.service + '.' + action.action)) + '</div>' +
      '<div class="hass-btnrow"></div>';
    var row = card.querySelector('.hass-btnrow');
    var yes = _mkBtn('btn-primary', 'Confirm');
    var no  = _mkBtn('btn-secondary', 'Cancel');
    yes.onclick = function () {
      yes.disabled = true; no.disabled = true; yes.textContent = 'Working...';
      API.call('bot', 'confirmAction', { tool: action.tool, params: action.params }, { retries: 0 })
        .then(function (r) {
          card.innerHTML = '<div class="alabel">Done</div><div>' + esc((r && r.message) || 'Action completed.') + '</div>';
          Toast.success((r && r.message) || 'Action completed.');
        })
        .catch(function (e) {
          yes.disabled = false; no.disabled = false; yes.textContent = 'Confirm';
          Toast.error((e && e.message) || 'Could not complete the action.');
        });
    };
    no.onclick = function () { card.innerHTML = '<div class="alabel">Cancelled</div><div>No changes were made.</div>'; };
    row.appendChild(yes); row.appendChild(no);
    _addNode(card);
  }

  function _renderClarify(clarify) {
    if (clarify.question) _addBubble('bot', clarify.question);
    var chips = clarify.chips || [];
    if (!chips.length) return;
    var wrap = document.createElement('div');
    wrap.className = 'hass-clarify';
    chips.forEach(function (c) {
      var label = (c && c.label) ? c.label : c;
      var value = (c && c.value) ? c.value : c;
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'hass-starter'; b.textContent = String(label);
      b.onclick = function () { _sendUser(String(value)); };
      wrap.appendChild(b);
    });
    _addNode(wrap);
  }

  function _renderNavigate(nav) {
    var wrap = document.createElement('div');
    wrap.className = 'hass-btnrow'; wrap.style.alignSelf = 'flex-start';
    var label = SECTION_LABEL[nav.route] || nav.route;
    var btn = _mkBtn('btn-secondary', 'Open ' + label);
    btn.onclick = function () { _openRoute(nav); };
    wrap.appendChild(btn);
    _addNode(wrap);
  }

  function _openRoute(nav) {
    try {
      if (typeof goRoute === 'function') goRoute(nav.route, nav.params || {});
      else Router.navigate(nav.route, nav.params || {});
    } catch (e) { if (typeof Toast !== 'undefined') Toast.error('Could not open ' + nav.route); }
    setOpen(false);
  }

  function _renderError(userMsg, err) {
    var msg = (err && err.message) ? err.message : 'Something went wrong. Please try again.';
    var bubble = _addBubble('err', msg);
    var retry = _mkBtn('btn-secondary', 'Retry');
    retry.style.marginTop = '8px';
    retry.onclick = function () { bubble.remove(); _send(userMsg); };
    bubble.appendChild(retry);
  }

  function _mkBtn(variant, text) {
    var b = document.createElement('button');
    b.className = 'btn ' + variant + ' btn-sm'; b.type = 'button'; b.textContent = text;
    return b;
  }

  // ── Open / close ──────────────────────────────────────────────────
  function setOpen(open) {
    _open = open;
    _els.panel.classList.toggle('open', open);
    if (open) {
      _markSeen(); _goQuiet();            // opening settles the launcher for the session
      if (!_started) _renderHome();
      setTimeout(function () { _els.input.focus(); }, 50);
    } else {
      _els.settings.classList.remove('open');
    }
  }
  function toggle() { setOpen(!_open); }

  function mount(me) {
    if (_mounted) return;
    _mounted = true;
    _me = me || null;
    try { _route = (typeof Router !== 'undefined' && Router.current && Router.current()) || ''; } catch (e) {}
    _build();
    // Launcher-first: never auto-open. If the assistant has not been opened or
    // dismissed yet this session, draw a little attention (a few cycles, then it
    // settles on its own). Otherwise the launcher stays quiet.
    if (!_seen()) setTimeout(_playAttention, 700);
  }

  return { mount: mount, open: function () { setOpen(true); }, close: function () { setOpen(false); } };
})();
window.ChatWidget = ChatWidget;
</script>
