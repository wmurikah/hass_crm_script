<script>
Router.register('customers', function (el) {
  var page = 1, perPage = 20, searchQ = '';
  el.innerHTML =
    '<div class="filter-bar">' +
      '<div class="search-input"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<input type="text" id="custSearch" placeholder="Search customers…"></div>' +
      '<select class="form-control" id="custStatus"><option value="">All statuses</option><option>ACTIVE</option><option>INACTIVE</option></select>' +
      // Manual entry is now clearly secondary: customer master comes from Oracle.
      // Kept (not removed) so non-Oracle accounts can still be added; existing
      // data is untouched. Relabelled and de-emphasised to a secondary button.
      (can('customers.create') ? '<button class="btn btn-secondary btn-sm" id="custNewBtn" title="Customer master is synced from Oracle. Add manually only for accounts that are not in Oracle.">+ Add non-Oracle customer</button>' : '') +
    '</div>' +
    '<p style="font-size:12px;color:var(--clr-text-light);margin:-4px 0 12px">Customer credit limit, balance and on-hold status are synced read-only from Oracle and shown on each customer. Manual entry is for non-Oracle accounts only.</p>' +
    '<div class="card"><div class="table-wrapper"><table class="data-table">' +
      '<thead><tr><th>Account</th><th>Company</th><th>Country</th><th>Type</th><th>Status</th><th>Created</th><th></th></tr></thead>' +
      '<tbody id="custBody"></tbody></table></div>' +
    '<div id="custPager" style="padding:8px 16px"></div></div>';

  // Render is idempotent: stale-while-revalidate may call it twice (cache then
  // fresh-if-changed), and setHTML no-ops if the user has navigated away.
  function renderCustomers(rows) {
    if (!rows.length) { setHTML('custBody', emptyRow(7, 'No customers found.')); return; }
    setHTML('custBody', rows.map(function (r) {
      var cid = esc(r.customer_id);
      var actions = '<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();viewCustomer(\'' + cid + '\')">View</button>';
      if (can('customers.edit'))       actions += ' <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();editCustomer(\'' + cid + '\')">Edit</button>';
      if (can('customers.set_credit')) actions += ' <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();customerCreditModal(\'' + cid + '\')">Credit</button>';
      return '<tr style="cursor:pointer" onclick="viewCustomer(\'' + cid + '\')"><td>' + esc(r.account_number) + '</td><td>' + esc(r.company_name) + '</td>' +
             '<td>' + esc(r.country_code) + '</td><td>' + esc(r.customer_type) + '</td>' +
             '<td>' + statusBadge(r.status) + '</td><td>' + fmtDate(r.created_at) + '</td>' +
             '<td class="actions">' + actions + '</td></tr>';
    }).join(''));
  }

  function load() {
    var params = { limit: perPage };
    if (searchQ) params.search = searchQ;
    var s = document.getElementById('custStatus').value;
    if (s) params.status = s;
    // Stale-while-revalidate: paint last-known instantly, refetch, repaint only
    // if it changed. Falls back to a plain fetch if the perf layer is absent.
    if (API.swr) {
      API.swr('customers', 'list', params, renderCustomers, {
        onLoading: function () { setHTML('custBody', (window.UX ? UX.tableLoading(7) : loadingRow(7))); },
        onError:   function (e) { setHTML('custBody', errorRow(7, e, load)); }
      });
    } else {
      setHTML('custBody', (window.UX ? UX.tableLoading(7) : loadingRow(7)));
      API.call('customers', 'list', params).then(renderCustomers)
        .catch(function (e) { setHTML('custBody', errorRow(7, e, load)); });
    }
  }

  document.getElementById('custSearch').oninput = function () { searchQ = this.value; load(); };
  document.getElementById('custStatus').onchange = load;
  var custNewBtn = document.getElementById('custNewBtn');
  if (custNewBtn) custNewBtn.onclick = function () { newCustomerModal(load); };
  window._custReload = load;
  load();
});

// Oracle credit/hold block for the customer detail modal. These figures come
// from the read-only Oracle mirror (customers.get attaches c.oracle); Oracle is
// the source of truth and the app never edits them.
function _oracleCreditBlock(c) {
  var o = c && c.oracle;
  if (!o) {
    return '<div style="margin-top:14px;border-top:1px solid var(--clr-border);padding-top:10px;font-size:12.5px;color:var(--clr-text-light)">' +
      'No Oracle credit data for this customer yet. Configure and sync the Oracle integration in Settings &gt; Oracle integration.</div>';
  }
  var ccy = o.currency_code || c.currency_code;
  var holdBadge = o.on_hold
    ? '<span class="badge badge-danger">ON HOLD' + (o.hold_status ? ' (' + esc(o.hold_status) + ')' : '') + '</span>'
    : '<span class="badge badge-success">Not on hold</span>';
  return '<div style="margin-top:14px;border-top:1px solid var(--clr-border);padding-top:10px">' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
      '<span style="font-weight:600;font-size:13px">Oracle credit &amp; status</span>' +
      '<span class="badge badge-neutral">read-only from Oracle</span>' +
    '</div>' +
    '<dl style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">' +
      '<dt style="color:#6b7280">Credit limit</dt><dd>' + (o.credit_limit == null ? '-' : fmtMoney(o.credit_limit, ccy)) + '</dd>' +
      '<dt style="color:#6b7280">Balance / exposure</dt><dd>' + (o.balance == null ? '-' : fmtMoney(o.balance, ccy)) + '</dd>' +
      '<dt style="color:#6b7280">On hold</dt><dd>' + holdBadge + '</dd>' +
      '<dt style="color:#6b7280">Synced</dt><dd>' + (o.synced_at ? fmtDateTime(o.synced_at) : '-') + '</dd>' +
    '</dl></div>';
}

function viewCustomer(id) {
  var loader = Loader.show();
  API.call('customers', 'get', { customerId: id }).then(function (c) {
    Loader.hide(loader);
    var o = c.oracle;
    var holdBanner = (o && o.on_hold)
      ? '<div style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:8px 12px;border-radius:8px;font-weight:600;font-size:13px;margin-bottom:10px">This customer is ON HOLD in Oracle' + (o.hold_status ? ' (' + esc(o.hold_status) + ')' : '') + '.</div>'
      : '';
    Modal.open({
      title: c.company_name,
      body: holdBanner +
            '<dl style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">' +
            '<dt style="color:#6b7280">Account#</dt><dd>' + esc(c.account_number) + '</dd>' +
            '<dt style="color:#6b7280">Country</dt><dd>' + esc(c.country_code) + '</dd>' +
            '<dt style="color:#6b7280">Type</dt><dd>' + esc(c.customer_type) + '</dd>' +
            '<dt style="color:#6b7280">Status</dt><dd>' + statusBadge(c.status) + '</dd>' +
            '<dt style="color:#6b7280">Credit limit (local)</dt><dd>' + fmtMoney(c.credit_limit, c.currency_code) + '</dd>' +
            '<dt style="color:#6b7280">Created</dt><dd>' + fmtDate(c.created_at) + '</dd>' +
            '</dl>' +
            _oracleCreditBlock(c),
      footer: '<button class="btn btn-secondary" onclick="Modal.close()">Close</button>' +
              '<button class="btn btn-primary btn-sm" onclick="Modal.close();goRoute(\'contacts\',{customerId:\'' + esc(c.customer_id) + '\'})">View Contacts</button>',
    });
  }).catch(function (e) { Loader.hide(loader); Toast.error(e.message); });
}

function newCustomerModal(onSuccess) {
  Modal.open({
    title: 'New Customer',
    body: '<div class="form-row"><div class="form-group"><label class="form-label">Account Number</label>' +
          '<input class="form-control" id="ncAcct"></div>' +
          '<div class="form-group"><label class="form-label">Company Name</label>' +
          '<input class="form-control" id="ncName"></div></div>' +
          '<div class="form-row"><div class="form-group"><label class="form-label">Country</label>' +
          '<select class="form-control" id="ncCC"><option>KE</option><option>UG</option><option>TZ</option><option>RW</option><option>DRC</option><option>ZM</option><option>SS</option><option>MW</option></select></div>' +
          '<div class="form-group"><label class="form-label">Type</label>' +
          '<select class="form-control" id="ncType"><option>DIRECT</option><option>DEALER</option><option>CORPORATE</option></select></div></div>' +
          '<div id="ncError" style="color:#dc2626;font-size:12px"></div>',
    footer: '<button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>' +
            '<button class="btn btn-primary" id="ncSave">Create</button>',
    onOpen: function () {
      document.getElementById('ncSave').onclick = function () {
        var acct = document.getElementById('ncAcct').value.trim();
        var name = document.getElementById('ncName').value.trim();
        if (!acct || !name) { document.getElementById('ncError').textContent = 'Account number and company name required.'; return; }
        API.call('customers', 'create', {
          account_number: acct, company_name: name,
          country_code: document.getElementById('ncCC').value,
          customer_type: document.getElementById('ncType').value,
        }).then(function () { Modal.close(); Toast.success('Customer created.'); if (onSuccess) onSuccess(); })
          .catch(function (e) { document.getElementById('ncError').textContent = e.message; });
      };
    },
  });
}

// Edit affordance, wired to the existing customers.update action (gated
// customers.edit server-side). Fetches the row, then writes back ONLY the
// fields the user changed so an untouched value is never re-submitted.
function editCustomer(id) {
  var loader = Loader.show();
  API.call('customers', 'get', { customerId: id }).then(function (c) {
    Loader.hide(loader);
    var types = ['DIRECT', 'DEALER', 'CORPORATE'];
    var curType = String(c.customer_type || '');
    function typeOptions() {
      var arr = types.slice();
      if (curType && arr.indexOf(curType) === -1) arr.unshift(curType);
      return arr.map(function (t) {
        return '<option' + (t === curType ? ' selected' : '') + '>' + esc(t) + '</option>';
      }).join('');
    }
    Modal.open({
      title: 'Edit Customer',
      body: '<div class="form-row"><div class="form-group"><label class="form-label">Company Name</label>' +
            '<input class="form-control" id="ecName" value="' + esc(c.company_name || '') + '"></div>' +
            '<div class="form-group"><label class="form-label">Trading Name</label>' +
            '<input class="form-control" id="ecTrade" value="' + esc(c.trading_name || '') + '"></div></div>' +
            '<div class="form-row"><div class="form-group"><label class="form-label">Type</label>' +
            '<select class="form-control" id="ecType">' + typeOptions() + '</select></div>' +
            '<div class="form-group"><label class="form-label">Currency</label>' +
            '<input class="form-control" id="ecCcy" value="' + esc(c.currency_code || '') + '"></div></div>' +
            '<div class="form-group"><label class="form-label">Payment Terms</label>' +
            '<input class="form-control" id="ecTerms" value="' + esc(c.payment_terms || '') + '"></div>' +
            '<div id="ecErr" style="color:#dc2626;font-size:12px"></div>',
      footer: '<button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>' +
              '<button class="btn btn-primary" id="ecSave">Save changes</button>',
      onOpen: function () {
        document.getElementById('ecSave').onclick = function () {
          var patch = { customerId: id };
          var changed = false;
          function diff(elId, field, orig) {
            var v = document.getElementById(elId).value.trim();
            if (v !== String(orig == null ? '' : orig)) { patch[field] = v; changed = true; }
          }
          diff('ecName',  'company_name',  c.company_name);
          diff('ecTrade', 'trading_name',  c.trading_name);
          diff('ecType',  'customer_type', c.customer_type);
          diff('ecCcy',   'currency_code', c.currency_code);
          diff('ecTerms', 'payment_terms', c.payment_terms);
          if (!changed) { Modal.close(); return; }
          API.call('customers', 'update', patch)
            .then(function () { Modal.close(); Toast.success('Customer updated.'); if (window._custReload) window._custReload(); })
            .catch(function (e) { document.getElementById('ecErr').textContent = e.message; });
        };
      },
    });
  }).catch(function (e) { Loader.hide(loader); Toast.error(e.message); });
}

// Credit-limit affordance, wired to the existing customers.setCredit action
// (gated customers.set_credit server-side).
function customerCreditModal(id) {
  var loader = Loader.show();
  API.call('customers', 'get', { customerId: id }).then(function (c) {
    Loader.hide(loader);
    Modal.open({
      title: 'Set Credit Limit',
      body: '<p style="font-size:13px;margin:0 0 12px">' + esc(c.company_name || id) + '</p>' +
            '<div class="form-group"><label class="form-label">Credit Limit (' + esc(c.currency_code || 'KES') + ')</label>' +
            '<input class="form-control" id="ccLimit" type="number" min="0" step="0.01" value="' + esc(String(c.credit_limit || 0)) + '"></div>' +
            '<div id="ccErr" style="color:#dc2626;font-size:12px"></div>',
      footer: '<button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>' +
              '<button class="btn btn-primary" id="ccSave">Save</button>',
      onOpen: function () {
        document.getElementById('ccSave').onclick = function () {
          var v = document.getElementById('ccLimit').value;
          if (v === '' || isNaN(parseFloat(v)) || parseFloat(v) < 0) {
            document.getElementById('ccErr').textContent = 'Enter a non-negative number.'; return;
          }
          API.call('customers', 'setCredit', { customerId: id, credit_limit: parseFloat(v) })
            .then(function () { Modal.close(); Toast.success('Credit limit updated.'); if (window._custReload) window._custReload(); })
            .catch(function (e) { document.getElementById('ccErr').textContent = e.message; });
        };
      },
    });
  }).catch(function (e) { Loader.hide(loader); Toast.error(e.message); });
}
</script>
