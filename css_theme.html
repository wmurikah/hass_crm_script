<style>
:root {
  /* ── Brand (approved login palette: navy #0B1733 → #1F2D5C, gold #C9A227) ── */
  --clr-primary:    #1F2D5C;   /* navy (mid)  */
  --clr-primary-d:  #0B1733;   /* navy (deep) */
  --clr-navy-900:   #0B1733;
  --clr-navy-mid:   #16234d;
  --clr-navy-700:   #1F2D5C;
  --clr-gold:       #C9A227;
  --clr-gold-lt:    #E6C457;
  --clr-accent:     #FF6F00;
  --clr-success:    #16a34a;
  --clr-danger:     #dc2626;
  --clr-warning:    #d97706;
  --clr-muted:      #6b7280;
  --clr-bg:         #f9fafb;
  --clr-surface:    #ffffff;
  --clr-border:     #e5e7eb;
  --clr-text:       #111827;
  --clr-text-light: #6b7280;
  --sidebar-w:      232px;
  --sidebar-rail-w: 68px;
  --header-h:       56px;
  /* Top inset that clears the Cloudflare worker's banner-crop band (~36-44px).
     Single source of truth: tune this one value if the crop height changes. */
  --banner-safe:    44px;
  --radius:         6px;
  --shadow-sm:      0 1px 3px rgba(0,0,0,.10);
  --shadow-md:      0 4px 12px rgba(0,0,0,.12);
  --font:           'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
  --font-display:   'Fraunces', Georgia, 'Times New Roman', serif;
  --transition:     .18s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: 14px; color: var(--clr-text); background: var(--clr-bg); }
a { color: var(--clr-primary); text-decoration: none; }
a:hover { text-decoration: underline; }
button { cursor: pointer; font-family: inherit; font-size: inherit; border: none; background: none; }
input, select, textarea { font-family: inherit; font-size: inherit; outline: none; }
table { border-collapse: collapse; width: 100%; }

/* ── Layout: fixed full-height shell (only .page-content scrolls) ──
   (page-level scroll-lock [html,body overflow:hidden] is set page-scoped
   in Staffdashboard.html so it never affects login/portal/mfa.) */
.app-shell          { position: relative; display: flex; height: 100%; width: 100%; overflow: hidden; }

/* Sidebar: navy gradient brand chrome, pushed below the banner-safe band. */
.sidebar            { position: relative; z-index: 60; width: var(--sidebar-w); flex-shrink: 0;
                      display: flex; flex-direction: column; color: #cdd5e3;
                      background: linear-gradient(180deg, var(--clr-navy-900) 0%, var(--clr-navy-mid) 58%, var(--clr-navy-700) 100%);
                      padding-top: var(--banner-safe);
                      transition: width .18s ease, transform .2s ease; }
.sidebar-head       { display: flex; align-items: center; gap: 10px; min-height: 56px; padding: 14px 16px;
                      border-bottom: 1px solid rgba(255,255,255,.08); }
.sidebar-logo       { display: inline-flex; align-items: center; gap: 10px; overflow: hidden; white-space: nowrap;
                      font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -.01em; color: #fff; }
.sidebar-logo-mark  { flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
                      width: 30px; height: 30px; border-radius: 8px;
                      font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--clr-navy-900);
                      background: linear-gradient(135deg, var(--clr-gold-lt), var(--clr-gold)); }
.sidebar-nav        { flex: 1; padding: 10px 0; overflow-y: auto; overflow-x: hidden; }

/* ── Sidebar search / jump (optional, additive) ── */
.nav-search         { position: relative; margin: 2px 12px 8px; }
.nav-search svg     { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px;
                      color: #7c89a3; pointer-events: none; }
.nav-search input   { width: 100%; padding: 7px 10px 7px 30px; border: 1px solid rgba(255,255,255,.12); border-radius: 8px;
                      background: rgba(255,255,255,.06); color: #e6ebf3; font-family: inherit; font-size: 12.5px; }
.nav-search input::placeholder { color: #7c89a3; }
.nav-search input:focus { border-color: var(--clr-gold); background: rgba(255,255,255,.10); }
.nav-search-empty   { padding: 8px 16px; font-size: 12px; color: #7c89a3; }

/* ── Accordion groups (chunking + single-open progressive disclosure) ──
   Group headers read at full weight (icon + label + chevron); sub-items sit
   under a thin rail, lighter and a touch smaller, so the panel scans as a few
   groups rather than many equal rows. */
.nav-group          { margin-bottom: 1px; }
.nav-group-label    { display: flex; align-items: center; gap: 11px; width: calc(100% - 12px); margin: 0 6px;
                      padding: 10px 12px; font-size: 13px; font-weight: 600; letter-spacing: .005em;
                      color: #dbe2ee; background: none; border: none; cursor: pointer; font-family: inherit; text-align: left;
                      border-radius: 8px; transition: background var(--transition), color var(--transition); }
.nav-group-label:hover         { background: rgba(255,255,255,.06); color: #fff; }
.nav-group-label:focus-visible { outline: 2px solid var(--clr-gold); outline-offset: -2px; }
.nav-grp-ico        { flex-shrink: 0; display: inline-flex; width: 18px; height: 18px; }
.nav-grp-ico svg    { width: 18px; height: 18px; }
.nav-grp-label      { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-chevron        { flex-shrink: 0; width: 13px; height: 13px; opacity: .7; transition: transform .2s ease; }
.nav-group.open .nav-chevron { transform: rotate(90deg); }
.nav-group-items    { max-height: 0; opacity: 0; overflow: hidden; margin: 1px 0 6px 28px;
                      border-left: 1px solid rgba(255,255,255,.10);
                      transition: max-height .22s ease, opacity .22s ease; }
.nav-group.open .nav-group-items { max-height: 720px; opacity: 1; }

/* ── Nav rows: full-width >=44px targets, icon + label (Fitts + recognition) ──
   Scoped to .sidebar so the .nav-item class reused elsewhere (e.g. the Knowledge
   Base category list, on a light card) is NOT restyled. .nav-item.active stays
   global so that reuse keeps its selected-row highlight. */
.sidebar .nav-item  { display: flex; align-items: center; gap: 12px; width: calc(100% - 12px); min-height: 44px;
                      margin: 2px 6px; padding: 8px 14px; border: none; border-radius: 8px; background: none;
                      font-family: inherit; font-size: 13.5px; text-align: left; color: #cdd5e3; cursor: pointer;
                      transition: background var(--transition), color var(--transition); }
.sidebar .nav-item:hover         { background: rgba(255,255,255,.08); color: #fff; }
.sidebar .nav-item:focus-visible { outline: 2px solid var(--clr-gold); outline-offset: -2px; }
/* Standalone top item (Overview / Dashboard): reads at header weight. */
.sidebar .nav-item.nav-top { font-weight: 600; color: #dbe2ee; margin-bottom: 4px; }
/* Sub-items under a group: lighter and a touch smaller than the header. */
.sidebar .nav-group-items .nav-item { min-height: 38px; margin: 1px 6px; padding: 7px 12px; gap: 10px;
                      font-size: 12.5px; color: #9aa6bd; }
.sidebar .nav-group-items .nav-item:hover         { color: #fff; }
.sidebar .nav-group-items .nav-item .nav-ico      { width: 16px; height: 16px; opacity: .85; }
.sidebar .nav-group-items .nav-item .nav-ico svg  { width: 16px; height: 16px; }
.nav-item.active        { background: var(--clr-gold); color: var(--clr-navy-900); font-weight: 600;
                          box-shadow: 0 2px 8px rgba(201,162,39,.35); }
/* Keep the gold highlight legible over the lighter sub-item / top text styles. */
.sidebar .nav-item.nav-top.active,
.sidebar .nav-group-items .nav-item.active { color: var(--clr-navy-900); font-weight: 600; }
/* Search filter visibility helpers. */
.nav-item.nav-hidden, .nav-group.nav-hidden { display: none; }
.sidebar-nav.nav-filtering .nav-group-items { max-height: 720px !important; opacity: 1 !important; }
.nav-ico            { flex-shrink: 0; display: inline-flex; width: 18px; height: 18px; }
.nav-ico svg        { width: 18px; height: 18px; }
.nav-label          { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Sidebar footer: rail toggle + user + sign out ── */
.sidebar-foot       { border-top: 1px solid rgba(255,255,255,.08); padding: 8px; }
.nav-collapse-btn   { display: flex; align-items: center; gap: 12px; width: 100%; min-height: 40px; padding: 8px 12px;
                      border: none; border-radius: 8px; background: none; color: #94a3b8; cursor: pointer;
                      font-family: inherit; font-size: 12.5px; }
.nav-collapse-btn:hover         { background: rgba(255,255,255,.08); color: #fff; }
.nav-collapse-btn:focus-visible { outline: 2px solid var(--clr-gold); outline-offset: -2px; }
.nav-collapse-btn svg { flex-shrink: 0; width: 18px; height: 18px; transition: transform .2s ease; }
.sidebar-user       { padding: 8px 12px 4px; }
.sidebar-user-name  { margin-bottom: 6px; font-size: 12px; color: #aeb8cd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-logout     { width: 100%; justify-content: center; }
.sidebar-logout svg { width: 15px; height: 15px; }

/* Off-canvas dimming overlay (mobile only) */
.nav-overlay        { display: none; position: absolute; inset: 0; z-index: 45; background: rgba(11,23,51,.5); }

/* ── Desktop icon rail (collapsed): labels hidden, icons + tooltips ── */
.app-shell.nav-collapsed .sidebar { width: var(--sidebar-rail-w); }
.app-shell.nav-collapsed .sidebar-logo-text,
.app-shell.nav-collapsed .nav-label,
.app-shell.nav-collapsed .sidebar-user-name,
.app-shell.nav-collapsed .nav-group-label { display: none; }
.app-shell.nav-collapsed .nav-search        { display: none; }
.app-shell.nav-collapsed .sidebar-head      { justify-content: center; padding: 14px 0; }
.app-shell.nav-collapsed .nav-group + .nav-group { margin-top: 6px; border-top: 1px solid rgba(255,255,255,.07); padding-top: 6px; }
.app-shell.nav-collapsed .nav-group-items   { max-height: none !important; opacity: 1 !important; margin-left: 0; border-left: none; }
.app-shell.nav-collapsed .sidebar .nav-item { justify-content: center; padding: 8px 0; }
.app-shell.nav-collapsed .sidebar .nav-group-items .nav-item { margin: 2px 6px; padding: 8px 0; }
.app-shell.nav-collapsed .nav-collapse-btn  { justify-content: center; padding: 8px 0; }
.app-shell.nav-collapsed .nav-collapse-btn svg { transform: rotate(180deg); }
.app-shell.nav-collapsed .sidebar-user      { padding: 8px 6px 4px; }

@media (prefers-reduced-motion: reduce) {
  .nav-chevron, .nav-group-items, .sidebar, .nav-item, .nav-collapse-btn svg { transition: none; }
}

/* ── Main column: sticky app bar (below banner-safe) + single scroll region ── */
.main-area          { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
.app-header         { position: sticky; top: 0; z-index: 50; flex-shrink: 0; display: flex; align-items: center; gap: 12px;
                      padding: 0 20px; padding-top: var(--banner-safe); min-height: calc(var(--header-h) + var(--banner-safe));
                      background: var(--clr-surface); border-bottom: 1px solid var(--clr-border); box-shadow: var(--shadow-sm); }
.nav-hamburger      { display: none; align-items: center; justify-content: center; flex-shrink: 0; width: 38px; height: 38px;
                      border: 1px solid var(--clr-border); border-radius: 8px; background: none; color: var(--clr-primary); cursor: pointer; }
.nav-hamburger:hover         { background: var(--clr-bg); }
.nav-hamburger:focus-visible { outline: 2px solid var(--clr-gold); outline-offset: 1px; }
.header-title       { flex: 1; min-width: 0; font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--clr-primary-d);
                      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.app-header-right   { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.page-content       { flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden; padding: 20px; }

/* ── Card ── */
.card               { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
.card-header        { padding: 14px 18px; border-bottom: 1px solid var(--clr-border); display: flex; align-items: center; justify-content: space-between; }
.card-title         { font-size: 14px; font-weight: 600; }
.card-body          { padding: 16px 18px; }

/* ── Stat cards ── */
.stat-grid          { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; margin-bottom: 18px; }
.stat-card          { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius); padding: 16px 18px; }
.stat-label         { font-size: 12px; color: var(--clr-text-light); margin-bottom: 6px; }
.stat-value         { font-size: 26px; font-weight: 700; }
.stat-card.primary  { border-left: 4px solid var(--clr-primary); }
.stat-card.success  { border-left: 4px solid var(--clr-success); }
.stat-card.warning  { border-left: 4px solid var(--clr-warning); }
.stat-card.danger   { border-left: 4px solid var(--clr-danger); }

/* ── Table ── */
.table-wrapper      { overflow-x: auto; }
.data-table         { width: 100%; }
.data-table th      { text-align: left; padding: 9px 12px; font-size: 12px; font-weight: 600; color: var(--clr-text-light); border-bottom: 2px solid var(--clr-border); text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
.data-table td      { padding: 9px 12px; border-bottom: 1px solid var(--clr-border); vertical-align: middle; }
.data-table tbody tr:hover { background: #f8fafc; }
.data-table .actions { display: flex; gap: 6px; }

/* ── Badges ── */
.badge              { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-primary      { background: #dbeafe; color: #1d4ed8; }
.badge-success      { background: #dcfce7; color: #15803d; }
.badge-warning      { background: #fef9c3; color: #a16207; }
.badge-danger       { background: #fee2e2; color: #b91c1c; }
.badge-neutral      { background: #f3f4f6; color: #374151; }

/* ── Buttons ── */
.btn                { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; transition: background var(--transition), opacity var(--transition); }
.btn-primary        { background: var(--clr-primary); color: #fff; }
.btn-primary:hover  { background: var(--clr-primary-d); }
.btn-secondary      { background: var(--clr-bg); border: 1px solid var(--clr-border); color: var(--clr-text); }
.btn-secondary:hover{ background: #f3f4f6; }
.btn-danger         { background: var(--clr-danger); color: #fff; }
.btn-sm             { padding: 4px 10px; font-size: 12px; }
.btn:disabled       { opacity: .55; cursor: not-allowed; }

/* ── Forms ── */
.form-group         { margin-bottom: 14px; }
.form-label         { display: block; font-size: 12px; font-weight: 500; margin-bottom: 5px; color: var(--clr-text-light); }
.form-control       { display: block; width: 100%; padding: 7px 10px; border: 1px solid var(--clr-border); border-radius: var(--radius); background: var(--clr-surface); transition: border-color var(--transition); }
.form-control:focus { border-color: var(--clr-primary); box-shadow: 0 0 0 3px rgba(31,42,68,.15); }
.form-row           { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-error         { font-size: 11px; color: var(--clr-danger); margin-top: 3px; }

/* ── Modal ── */
.modal-backdrop     { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 900; display: none; align-items: center; justify-content: center; }
.modal-backdrop.open{ display: flex; }
.modal              { background: var(--clr-surface); border-radius: var(--radius); box-shadow: var(--shadow-md); width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal-header       { padding: 16px 20px; border-bottom: 1px solid var(--clr-border); display: flex; align-items: center; justify-content: space-between; }
.modal-title        { font-size: 15px; font-weight: 600; }
.modal-body         { padding: 20px; }
.modal-footer       { padding: 12px 20px; border-top: 1px solid var(--clr-border); display: flex; justify-content: flex-end; gap: 10px; }
.modal-close        { background: none; border: none; cursor: pointer; color: var(--clr-muted); font-size: 18px; line-height: 1; }

/* ── Toast ── */
.toast-container    { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast              { background: var(--clr-text); color: #fff; padding: 10px 16px; border-radius: var(--radius); box-shadow: var(--shadow-md); font-size: 13px; min-width: 220px; display: flex; align-items: center; gap: 8px; animation: slideIn .2s ease; }
.toast.success      { background: var(--clr-success); }
.toast.error        { background: var(--clr-danger); }
.toast.warning      { background: var(--clr-warning); color: #1c1917; }
@keyframes slideIn  { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Loader ── */
.spinner            { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; }
.spinner.dark       { border-color: var(--clr-border); border-top-color: var(--clr-primary); }
@keyframes spin     { to { transform: rotate(360deg); } }
.loading-overlay    { position: absolute; inset: 0; background: rgba(255,255,255,.7); display: flex; align-items: center; justify-content: center; z-index: 50; }

/* ── Empty state ── */
.empty-state        { text-align: center; padding: 48px 24px; color: var(--clr-text-light); }
.empty-state svg    { margin-bottom: 12px; opacity: .4; }

/* ── Pagination ── */
.pagination         { display: flex; align-items: center; gap: 4px; padding: 10px 0; }
.page-btn           { padding: 5px 10px; border: 1px solid var(--clr-border); border-radius: var(--radius); background: var(--clr-surface); cursor: pointer; font-size: 13px; }
.page-btn.active    { background: var(--clr-primary); color: #fff; border-color: var(--clr-primary); }
.page-btn:disabled  { opacity: .4; cursor: not-allowed; }

/* ── Breadcrumb ── */
.breadcrumb         { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 14px; }
.breadcrumb-item    { color: var(--clr-text-light); }
.breadcrumb-item.active { color: var(--clr-text); font-weight: 500; }
.breadcrumb-sep     { color: var(--clr-border); }

/* ── Filter bar ── */
.filter-bar         { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-bar .form-control { width: auto; min-width: 140px; }
.search-input       { display: flex; align-items: center; gap: 6px; border: 1px solid var(--clr-border); border-radius: var(--radius); padding: 0 10px; background: var(--clr-surface); }
.search-input input { border: none; outline: none; padding: 6px 0; background: transparent; width: 200px; }

/* ── Login page ── */
.login-page         { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#1F2A44 0%,#16203a 100%); }
.login-card         { width: 380px; background: var(--clr-surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 36px 32px; }
.login-logo         { text-align: center; margin-bottom: 24px; }
.login-title        { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 24px; }
.login-footer       { margin-top: 16px; text-align: center; font-size: 12px; color: var(--clr-text-light); }

/* ── MFA ── */
.mfa-page           { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--clr-bg); }
.mfa-card           { width: 360px; background: var(--clr-surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 32px; }
.otp-inputs         { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
.otp-inputs input   { width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 600; border: 2px solid var(--clr-border); border-radius: var(--radius); }
.otp-inputs input:focus { border-color: var(--clr-primary); }

/* ── Portal ── */
.portal-shell       { display: flex; flex-direction: column; min-height: 100vh; }
.portal-header      { background: var(--clr-primary); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; }
.portal-nav         { display: flex; gap: 2px; }
.portal-nav-item    { padding: 8px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13.5px; color: rgba(255,255,255,.8); }
.portal-nav-item:hover   { background: rgba(255,255,255,.12); color: #fff; }
.portal-nav-item.active  { background: rgba(255,255,255,.2); color: #fff; font-weight: 600; }
.portal-content     { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
.portal-footer      { background: var(--clr-surface); border-top: 1px solid var(--clr-border); padding: 14px 24px; text-align: center; font-size: 12px; color: var(--clr-text-light); }

/* ── Responsive: sidebar becomes an off-canvas drawer below 960px ── */
@media (max-width: 960px) {
  .sidebar         { position: absolute; top: 0; left: 0; bottom: 0; transform: translateX(-100%);
                     box-shadow: 6px 0 24px rgba(11,23,51,.28); }
  .app-shell.drawer-open .sidebar      { transform: translateX(0); }
  .app-shell.drawer-open .nav-overlay  { display: block; }
  .nav-hamburger   { display: inline-flex; }
  /* The drawer is always full-width; the desktop rail-collapse does not apply here. */
  .app-shell.nav-collapsed .sidebar            { width: var(--sidebar-w); }
  .app-shell.nav-collapsed .sidebar-logo-text,
  .app-shell.nav-collapsed .nav-label,
  .app-shell.nav-collapsed .sidebar-user-name,
  .app-shell.nav-collapsed .nav-group-label    { display: revert; }
  .app-shell.nav-collapsed .nav-search         { display: revert; }
  .app-shell.nav-collapsed .nav-group + .nav-group { margin-top: 0; border-top: none; padding-top: 0; }
  .app-shell.nav-collapsed .nav-group-items    { max-height: 0; opacity: 0; margin-left: 28px; border-left: 1px solid rgba(255,255,255,.10); }
  .app-shell.nav-collapsed .nav-group.open .nav-group-items { max-height: 720px; opacity: 1; }
  .app-shell.nav-collapsed .sidebar .nav-item  { justify-content: flex-start; padding: 8px 14px; }
  .app-shell.nav-collapsed .sidebar .nav-group-items .nav-item { padding: 7px 12px; margin: 1px 6px; }
