<style>
:root {
  /* ── Hass deck palette (extracted from the official .pptx) ── */
  --clr-primary:    #290486;  /* indigo (accent1) */
  --clr-primary-d:  #1d0360;  /* darker indigo for hover */
  --clr-gold:       #FFC000;  /* bright gold (accent2, signature colour) */
  --clr-accent:     #FFC000;  /* gold accent */
  --clr-ink:        #020D26;  /* near-black navy (accent5) for darkest chrome */
  --clr-navy:       #002060;  /* deep navy used in slides */
  --clr-success:    #16a34a;
  --clr-danger:     #dc2626;
  --clr-warning:    #d97706;
  --clr-muted:      #6b7280;
  --clr-bg:         #EBEBEB;  /* lt2 page bg */
  --clr-surface:    #ffffff;
  --clr-border:     #e5e7eb;
  --clr-text:       #3D3D3D;  /* dk2 */
  --clr-text-light: #6b7280;
  --sidebar-w:      220px;
  --header-h:       56px;
  --radius:         6px;
  --shadow-sm:      0 1px 3px rgba(0,0,0,.10);
  --shadow-md:      0 4px 12px rgba(0,0,0,.12);
  --font:           'Segoe UI', system-ui, sans-serif;
  --transition:     .18s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: 14px; color: var(--clr-text); background: var(--clr-bg); }
a { color: var(--clr-primary); text-decoration: none; }
a:hover { text-decoration: underline; }
button { cursor: pointer; font-family: inherit; font-size: inherit; border: none; background: none; }
input, select, textarea { font-family: inherit; font-size: inherit; outline: none; }
table { border-collapse: collapse; width: 100%; }

/* ── Layout ── */
.app-shell          { display: flex; height: 100vh; overflow: hidden; }
.sidebar            { width: var(--sidebar-w); background: var(--clr-primary); color: #cbd5e1; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.sidebar-logo       { padding: 16px; font-size: 16px; font-weight: 700; color: #fff; border-bottom: 1px solid rgba(255,255,255,.08); }
.sidebar-nav        { flex: 1; padding: 8px 0; }
/* Collapsible nav groups (strict single-open accordion). */
.nav-group          { }
.nav-group-header   { display: flex; align-items: center; justify-content: space-between; width: 100%; box-sizing: border-box;
                      padding: 12px 16px 4px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #64748b;
                      background: none; border: 0; font-family: inherit; cursor: pointer; transition: color var(--transition); }
.nav-group-header:hover  { color: #94a3b8; }
.nav-chevron        { flex-shrink: 0; transition: transform .22s ease; }
.nav-group.open > .nav-group-header .nav-chevron { transform: rotate(90deg); }
/* Height animation via grid-template-rows 0fr -> 1fr (no fixed max-height needed). */
.nav-group-body     { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .22s ease; }
.nav-group.open > .nav-group-body { grid-template-rows: 1fr; }
.nav-group-body-inner { overflow: hidden; min-height: 0; }
.nav-item           { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-radius: 4px; margin: 1px 6px; cursor: pointer; transition: background var(--transition); font-size: 13.5px; color: #cbd5e1; }
.nav-item:hover     { background: rgba(255,255,255,.07); }
.nav-item.active    { background: var(--clr-gold); color: var(--clr-primary); font-weight: 600; }
.nav-item svg       { flex-shrink: 0; }
.main-area          { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.app-header         { height: var(--header-h); background: var(--clr-surface); border-bottom: 1px solid var(--clr-border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; box-shadow: var(--shadow-sm); }
.header-title       { font-size: 15px; font-weight: 600; flex: 1; }
.page-content       { flex: 1; overflow-y: auto; padding: 20px; }

/* ── Card ── */
.card               { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
.card-header        { padding: 14px 18px; border-bottom: 1px solid var(--clr-border); display: flex; align-items: center; justify-content: space-between; }
.card-title         { font-size: 14px; font-weight: 600; }
.card-body          { padding: 16px 18px; }

/* ── Stat cards ── */
.stat-grid          { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 14px; margin-bottom: 18px; }
.stat-card          { background: var(--clr-surface); border: 1px solid var(--clr-border); border-radius: var(--radius); padding: 16px 18px; }
.stat-label         { font-size: 12px; color: var(--clr-text-light); margin-bottom: 6px; }
.stat-value         { font-size: 26px; font-weight: 700; }
.stat-card.primary  { border-left: 4px solid var(--clr-primary); }
.stat-card.success  { border-left: 4px solid var(--clr-success); }
.stat-card.warning  { border-left: 4px solid var(--clr-warning); }
.stat-card.danger   { border-left: 4px solid var(--clr-danger); }

/* ── Table ── */
.table-wrapper      { overflow-x: auto; }
.data-table         { width: 100%; }
.data-table th      { text-align: left; padding: 9px 12px; font-size: 12px; font-weight: 600; color: var(--clr-text-light); border-bottom: 2px solid var(--clr-border); text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
.data-table td      { padding: 9px 12px; border-bottom: 1px solid var(--clr-border); vertical-align: middle; }
.data-table tbody tr:hover { background: #f8fafc; }
.data-table .actions { display: flex; gap: 6px; }

/* ── Badges ── */
.badge              { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-primary      { background: #dbeafe; color: #1d4ed8; }
.badge-success      { background: #dcfce7; color: #15803d; }
.badge-warning      { background: #fef9c3; color: #a16207; }
.badge-danger       { background: #fee2e2; color: #b91c1c; }
.badge-neutral      { background: #f3f4f6; color: #374151; }

/* ── Buttons ── */
.btn                { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; transition: background var(--transition), opacity var(--transition); }
.btn-primary        { background: var(--clr-primary); color: #fff; }
.btn-primary:hover  { background: var(--clr-primary-d); }
.btn-secondary      { background: var(--clr-bg); border: 1px solid var(--clr-border); color: var(--clr-text); }
.btn-secondary:hover{ background: #f3f4f6; }
.btn-danger         { background: var(--clr-danger); color: #fff; }
.btn-sm             { padding: 4px 10px; font-size: 12px; }
.btn:disabled       { opacity: .55; cursor: not-allowed; }

/* ── Forms ── */
.form-group         { margin-bottom: 14px; }
.form-label         { display: block; font-size: 12px; font-weight: 500; margin-bottom: 5px; color: var(--clr-text-light); }
.form-control       { display: block; width: 100%; padding: 7px 10px; border: 1px solid var(--clr-border); border-radius: var(--radius); background: var(--clr-surface); transition: border-color var(--transition); }
.form-control:focus { border-color: var(--clr-primary); box-shadow: 0 0 0 3px rgba(41,4,134,.15); }
.form-row           { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-error         { font-size: 11px; color: var(--clr-danger); margin-top: 3px; }

/* ── Modal ── */
.modal-backdrop     { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 900; display: none; align-items: center; justify-content: center; }
.modal-backdrop.open{ display: flex; }
.modal              { background: var(--clr-surface); border-radius: var(--radius); box-shadow: var(--shadow-md); width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
.modal-header       { padding: 16px 20px; border-bottom: 1px solid var(--clr-border); display: flex; align-items: center; justify-content: space-between; }
.modal-title        { font-size: 15px; font-weight: 600; }
.modal-body         { padding: 20px; }
.modal-footer       { padding: 12px 20px; border-top: 1px solid var(--clr-border); display: flex; justify-content: flex-end; gap: 10px; }
.modal-close        { background: none; border: none; cursor: pointer; color: var(--clr-muted); font-size: 18px; line-height: 1; }

/* ── Toast ── */
.toast-container    { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast              { background: var(--clr-text); color: #fff; padding: 10px 16px; border-radius: var(--radius); box-shadow: var(--shadow-md); font-size: 13px; min-width: 220px; display: flex; align-items: center; gap: 8px; animation: slideIn .2s ease; }
.toast.success      { background: var(--clr-success); }
.toast.error        { background: var(--clr-danger); }
.toast.warning      { background: var(--clr-warning); color: #1c1917; }
@keyframes slideIn  { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Loader ── */
.spinner            { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; }
.spinner.dark       { border-color: var(--clr-border); border-top-color: var(--clr-primary); }
@keyframes spin     { to { transform: rotate(360deg); } }
.loading-overlay    { position: absolute; inset: 0; background: rgba(255,255,255,.7); display: flex; align-items: center; justify-content: center; z-index: 50; }

/* ── Empty state ── */
.empty-state        { text-align: center; padding: 48px 24px; color: var(--clr-text-light); }
.empty-state svg    { margin-bottom: 12px; opacity: .4; }

/* ── Pagination ── */
.pagination         { display: flex; align-items: center; gap: 4px; padding: 10px 0; }
.page-btn           { padding: 5px 10px; border: 1px solid var(--clr-border); border-radius: var(--radius); background: var(--clr-surface); cursor: pointer; font-size: 13px; }
.page-btn.active    { background: var(--clr-primary); color: #fff; border-color: var(--clr-primary); }
.page-btn:disabled  { opacity: .4; cursor: not-allowed; }

/* ── Breadcrumb ── */
.breadcrumb         { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 14px; }
.breadcrumb-item    { color: var(--clr-text-light); }
.breadcrumb-item.active { color: var(--clr-text); font-weight: 500; }
.breadcrumb-sep     { color: var(--clr-border); }

/* ── Filter bar ── */
.filter-bar         { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-bar .form-control { width: auto; min-width: 140px; }
.search-input       { display: flex; align-items: center; gap: 6px; border: 1px solid var(--clr-border); border-radius: var(--radius); padding: 0 10px; background: var(--clr-surface); }
.search-input input { border: none; outline: none; padding: 6px 0; background: transparent; width: 200px; }

/* ── Login page (animated, on-brand indigo → ink) ── */
.login-page         { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; overflow: hidden;
                      background: linear-gradient(135deg, #290486 0%, #1d0360 45%, #020D26 100%); background-size: 200% 200%; animation: loginGradient 18s ease infinite; }
@keyframes loginGradient { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }

/* Slow-moving glow orbs add depth without heavy libs. */
.login-page::before,
.login-page::after  { content: ''; position: absolute; border-radius: 50%; pointer-events: none; filter: blur(60px); }
.login-page::before { width: 420px; height: 420px; top: -120px; left: -80px; opacity: .22; background: radial-gradient(circle, #FFC000 0%, transparent 70%); animation: loginFloat1 22s ease-in-out infinite; }
.login-page::after  { width: 360px; height: 360px; bottom: -120px; right: -60px; opacity: .35; background: radial-gradient(circle, #290486 0%, transparent 70%); animation: loginFloat2 26s ease-in-out infinite; }
@keyframes loginFloat1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(60px, 80px); } }
@keyframes loginFloat2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-50px, -70px); } }

.login-card         { position: relative; z-index: 1; width: 380px; max-width: 100%; background: var(--clr-surface); border-radius: 12px; box-shadow: 0 24px 60px rgba(2,13,38,.45); padding: 38px 34px; border-top: 4px solid var(--clr-gold);
                      opacity: 0; transform: translateY(18px); animation: loginCardIn .5s cubic-bezier(.16,.84,.44,1) .1s forwards; }
@keyframes loginCardIn { to { opacity: 1; transform: translateY(0); } }
.login-logo         { text-align: center; margin-bottom: 16px; }
.login-title        { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; color: var(--clr-primary); letter-spacing: -.01em; }
.login-subtitle     { text-align: center; font-size: 12.5px; color: var(--clr-text-light); margin-bottom: 24px; }
.login-subtitle::after { content: ''; display: block; width: 40px; height: 3px; margin: 12px auto 0; border-radius: 2px; background: var(--clr-gold); }
.login-footer       { margin-top: 18px; text-align: center; font-size: 12px; color: var(--clr-text-light); }

@media (prefers-reduced-motion: reduce) {
  .login-page                       { animation: none; }
  .login-page::before,
  .login-page::after                { animation: none; }
  .login-card                       { animation: none; opacity: 1; transform: none; }
}

/* ── MFA ── */
.mfa-page           { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--clr-bg); }
.mfa-card           { width: 360px; background: var(--clr-surface); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 32px; }
.otp-inputs         { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
.otp-inputs input   { width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 600; border: 2px solid var(--clr-border); border-radius: var(--radius); }
.otp-inputs input:focus { border-color: var(--clr-primary); }

/* ── Portal ── */
.portal-shell       { display: flex; flex-direction: column; min-height: 100vh; }
.portal-header      { background: var(--clr-primary); color: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px; }
.portal-nav         { display: flex; gap: 2px; }
.portal-nav-item    { padding: 8px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13.5px; color: rgba(255,255,255,.8); }
.portal-nav-item:hover   { background: rgba(255,255,255,.12); color: #fff; }
.portal-nav-item.active  { background: rgba(255,255,255,.2); color: #fff; font-weight: 600; }
.portal-content     { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
.portal-footer      { background: var(--clr-surface); border-top: 1px solid var(--clr-border); padding: 14px 24px; text-align: center; font-size: 12px; color: var(--clr-text-light); }

/* ── Time-based welcome greeting ── */
.header-titles      { display: flex; flex-direction: column; justify-content: center; flex: 1; line-height: 1.2; gap: 1px; }
.header-greeting    { font-size: 12px; color: var(--clr-text-light); opacity: 0; max-height: 0; transform: translateY(-4px);
                      transition: opacity .45s ease, transform .45s ease, max-height .45s ease; overflow: hidden; }
.header-greeting.show { opacity: 1; max-height: 18px; transform: translateY(0); }
.header-greeting b  { color: var(--clr-primary); font-weight: 600; }

.welcome-banner     { position: fixed; top: 18px; left: 50%; z-index: 9998; transform: translate(-50%, -14px);
                      background: var(--clr-primary); color: #fff; padding: 12px 26px; border-radius: 999px;
                      box-shadow: 0 12px 30px rgba(2,13,38,.4); border: 1px solid rgba(255,192,0,.45);
                      font-size: 16px; font-weight: 600; white-space: nowrap; opacity: 0;
                      transition: opacity .45s ease, transform .45s ease; }
.welcome-banner b   { color: var(--clr-gold); font-weight: 700; }
.welcome-banner.show { opacity: 1; transform: translate(-50%, 0); }
@media (prefers-reduced-motion: reduce) {
  .header-greeting  { transition: none; }
  .welcome-banner   { transition: none; }
  .nav-group-body   { transition: none; }
  .nav-chevron      { transition: none; }
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar         { display: none; }
  .form-row        { grid-template-columns: 1fr; }
  .stat-grid       { grid-template-columns: 1fr 1fr; }
}
</style>
