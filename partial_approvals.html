<script>
Router.register('approvals', function (el) {
  el.innerHTML =
    '<div class="filter-bar">' +
      '<select class="form-control" id="appMode"><option value="inbox">My inbox</option><option value="all">All requests</option></select>' +
      '<select class="form-control" id="appStatus"><option value="">All statuses</option><option>PENDING</option><option>APPROVED</option><option>REJECTED</option></select>' +
    '</div>' +
    '<div class="card"><div class="table-wrapper"><table class="data-table">' +
      '<thead><tr><th>Entity</th><th>Type</th><th>Country</th><th>Required Role</th><th>Status</th><th>Created</th><th></th></tr></thead>' +
      '<tbody id="appBody"></tbody></table></div></div>';

  function load() {
    var mode   = document.getElementById('appMode').value;
    var status = document.getElementById('appStatus').value;
    var action = mode === 'inbox' ? 'inbox' : 'list';
    var params = { limit: 50 };
    if (status) params.status = status;
    API.call('approvals', action, params).then(function (rows) {
      var tbody = document.getElementById('appBody');
      if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">No approval requests.</div></td></tr>'; return; }
      tbody.innerHTML = rows.map(function (r) {
        return '<tr><td style="font-size:11px">' + esc(r.entity_id) + '</td><td>' + esc(r.entity_type) + '</td>' +
               '<td>' + esc(r.country_code || '—') + '</td><td>' + esc(r.required_approver_role || '—') + '</td>' +
               '<td>' + statusBadge(r.status) + '</td><td>' + fmtDate(r.created_at) + '</td>' +
               '<td class="actions">' +
               (r.status === 'PENDING'
                 ? '<button class="btn btn-danger btn-sm" onclick="approvalAction(\'' + esc(r.request_id) + '\',\'reject\')">Reject</button>' +
                   '<button class="btn btn-primary btn-sm" onclick="approvalAction(\'' + esc(r.request_id) + '\',\'approve\')">Approve</button>'
                 : '') +
               '</td></tr>';
      }).join('');
    }).catch(function (e) { document.getElementById('appBody').innerHTML = '<tr><td colspan="7" style="color:#dc2626">' + esc(e.message) + '</td></tr>'; });
  }

  document.getElementById('appMode').onchange = load;
  document.getElementById('appStatus').onchange = load;
  load();
});

function approvalAction(requestId, action) {
  var params = { requestId: requestId };
  if (action === 'reject') {
    params.reason = window.prompt('Rejection reason (required):');
    if (!params.reason) return;
  } else {
    params.comment = window.prompt('Comment (optional):') || '';
  }
  API.call('approvals', action, params)
    .then(function (r) { Toast.success('Request ' + r.status + '.'); Router.navigate('approvals', {}); })
    .catch(function (e) { Toast.error(e.message); });
}
</script>
