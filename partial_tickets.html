<script>
Router.register('tickets', function (el, params) {
  params = params || {};
  el.innerHTML =
    '<div class="filter-bar">' +
      '<select class="form-control" id="tktStatus"><option value="">All statuses</option><option>NEW</option><option>OPEN</option><option>PENDING</option><option>RESOLVED</option><option>CLOSED</option></select>' +
      '<select class="form-control" id="tktPriority"><option value="">All priorities</option><option>LOW</option><option>MEDIUM</option><option>HIGH</option><option>CRITICAL</option></select>' +
      (can('ticket.create') ? '<button class="btn btn-primary btn-sm" id="tktNewBtn">+ New Ticket</button>' : '') +
    '</div>' +
    '<div class="card"><div class="table-wrapper"><table class="data-table">' +
      '<thead><tr><th>Ticket #</th><th>Subject</th><th>Customer</th><th>Priority</th><th>Status</th><th>Created</th><th></th></tr></thead>' +
      '<tbody id="tktBody"></tbody></table></div></div>';

  // Idempotent render (stale-while-revalidate may call it twice).
  function renderTickets(rows) {
    if (!rows.length) { setHTML('tktBody', emptyRow(7, 'No tickets.')); return; }
    setHTML('tktBody', rows.map(function (r) {
      var tid = esc(r.ticket_id);
      return '<tr style="cursor:pointer" onclick="viewTicket(\'' + tid + '\')"><td>' + esc(r.ticket_number) + '</td><td>' + esc(r.subject) + '</td>' +
             '<td>' + esc(r.company_name || r.customer_id) + '</td>' +
             '<td>' + statusBadge(r.priority) + '</td><td>' + statusBadge(r.status) + '</td>' +
             '<td>' + fmtDate(r.created_at) + '</td>' +
             '<td><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();viewTicket(\'' + tid + '\')">View</button></td></tr>';
    }).join(''));
  }

  function load() {
    var params = { limit: 50 };
    var s = document.getElementById('tktStatus').value;
    var p = document.getElementById('tktPriority').value;
    if (s) params.status = s;
    if (p) params.priority = p;
    if (API.swr) {
      API.swr('tickets', 'list', params, renderTickets, {
        onLoading: function () { setHTML('tktBody', loadingRow(7)); },
        onError:   function (e) { setHTML('tktBody', errorRow(7, e, load)); }
      });
    } else {
      setHTML('tktBody', loadingRow(7));
      API.call('tickets', 'list', params).then(renderTickets)
        .catch(function (e) { setHTML('tktBody', errorRow(7, e, load)); });
    }
  }

  document.getElementById('tktStatus').onchange = load;
  document.getElementById('tktPriority').onchange = load;
  var tktNewBtn = document.getElementById('tktNewBtn');
  if (tktNewBtn) tktNewBtn.onclick = function () { newTicketModal(load); };
  // Pre-apply a drill-down filter when arriving from a dashboard chart "View all".
  if (params.status) { var _ts = document.getElementById('tktStatus'); if (_ts) _ts.value = params.status; }
  load();
});

function viewTicket(id) {
  var l = Loader.show();
  API.call('tickets', 'get', { ticketId: id }).then(function (t) {
    Loader.hide(l);
    var comments = (t.comments || []).map(function (c) {
      return '<div style="padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px">' +
             '<strong>' + esc(c.author_id) + '</strong> · ' + fmtDateTime(c.created_at) +
             '<p style="margin:4px 0 0">' + esc(c.content) + '</p></div>';
    }).join('');
    Modal.open({
      title: t.ticket_number + ': ' + t.subject,
      body: '<p>' + statusBadge(t.priority) + ' &nbsp; ' + statusBadge(t.status) + '</p>' +
            '<p style="font-size:13px;margin:8px 0">' + esc(t.description) + '</p>' +
            '<div id="tktThread" style="max-height:200px;overflow-y:auto;margin-bottom:10px">' + (comments || '<p class="tkt-empty" style="color:#9ca3af;font-size:12px">No comments.</p>') + '</div>' +
            '<textarea class="form-control" id="tktComment" rows="3" placeholder="Add a comment…"></textarea>',
      footer: '<button class="btn btn-secondary" onclick="Modal.close()">Close</button>' +
              (can('ticket.view') ? '<button class="btn btn-primary btn-sm" onclick="addTicketComment(\'' + id + '\')">Add Comment</button>' : '') +
              (t.status !== 'RESOLVED' && t.status !== 'CLOSED' && can('ticket.close')
                ? '<button class="btn btn-secondary btn-sm" onclick="resolveTicket(\'' + id + '\')">Resolve</button>' : ''),
    });
  }).catch(function (e) { Loader.hide(l); Toast.error(e.message); });
}

function addTicketComment(id) {
  var ta = document.getElementById('tktComment');
  var content = (ta && ta.value || '').trim();
  if (!content) return;

  // Layer 3: optimistic write. The comment appears in the thread immediately
  // (dimmed = pending), the box clears, and the save goes out in the background.
  // On success it settles to full opacity; on failure it is removed and the text
  // is handed back so nothing is lost. Adding a comment is safe to reverse, so it
  // qualifies for optimistic UI (irreversible actions stay synchronous).
  if (!API.optimistic) {
    API.call('tickets', 'addComment', { ticketId: id, content: content })
      .then(function () { Modal.close(); Toast.success('Comment added.'); })
      .catch(function (e) { Toast.error(e.message); });
    return;
  }

  var thread = document.getElementById('tktThread');
  var bubble = null;
  API.optimistic({
    service: 'tickets', action: 'addComment', params: { ticketId: id, content: content },
    apply: function () {
      if (!thread) return null;
      var empty = thread.querySelector('.tkt-empty');
      if (empty) empty.remove();
      bubble = document.createElement('div');
      bubble.style.cssText = 'padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px;opacity:.6';
      bubble.innerHTML = '<strong>You</strong> &middot; ' + esc(fmtDateTime(new Date().toISOString())) +
                         '<p style="margin:4px 0 0">' + esc(content) + '</p>';
      thread.appendChild(bubble);
      thread.scrollTop = thread.scrollHeight;
      if (ta) ta.value = '';
      return bubble;
    },
    rollback: function (b) {
      if (b && b.parentNode) b.parentNode.removeChild(b);
      if (ta) ta.value = content;   // restore the unsaved text
    },
    onDone: function () { if (bubble) bubble.style.opacity = ''; }
  });
}

function resolveTicket(id) {
  var summary = window.prompt('Resolution summary:');
  if (!summary) return;
  API.call('tickets', 'resolve', { ticketId: id, resolution_type: 'RESOLVED', resolution_summary: summary })
    .then(function () { Modal.close(); Toast.success('Ticket resolved.'); Router.navigate('tickets', {}); })
    .catch(function (e) { Toast.error(e.message); });
}

function newTicketModal(onSuccess) {
  Modal.open({
    title: 'New Ticket',
    body: '<div class="form-row">' +
          '<div class="form-group"><label class="form-label">Customer ID</label><input class="form-control" id="ntCust"></div>' +
          '<div class="form-group"><label class="form-label">Category</label>' +
            '<select class="form-control" id="ntCat"><option>BILLING</option><option>DELIVERY</option><option>TECHNICAL</option><option>GENERAL</option></select></div></div>' +
          '<div class="form-group"><label class="form-label">Subject</label><input class="form-control" id="ntSubject"></div>' +
          '<div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="ntDesc" rows="3"></textarea></div>' +
          '<div class="form-group"><label class="form-label">Priority</label>' +
            '<select class="form-control" id="ntPriority"><option>LOW</option><option selected>MEDIUM</option><option>HIGH</option><option>CRITICAL</option></select></div>' +
          '<div id="ntErr" style="color:#dc2626;font-size:12px"></div>',
    footer: '<button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>' +
            '<button class="btn btn-primary" id="ntSave">Create</button>',
    onOpen: function () {
      document.getElementById('ntSave').onclick = function () {
        var cust    = document.getElementById('ntCust').value.trim();
        var subject = document.getElementById('ntSubject').value.trim();
        if (!cust || !subject) { document.getElementById('ntErr').textContent = 'Customer ID and subject required.'; return; }
        API.call('tickets', 'create', {
          customer_id: cust, category: document.getElementById('ntCat').value,
          subject: subject, description: document.getElementById('ntDesc').value,
          priority: document.getElementById('ntPriority').value,
        }).then(function () { Modal.close(); Toast.success('Ticket created.'); if (onSuccess) onSuccess(); })
          .catch(function (e) { document.getElementById('ntErr').textContent = e.message; });
      };
    },
  });
}
</script>
