<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hass CMS</title>
  <style>
    :root {
      /* Height (px) of the "This application was created by a Google Apps
         Script user" banner. MEASURE the real value in DevTools and edit this
         single number — see the README note below. 36px is a starting guess. */
      --banner: 36px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;            /* clip the banner we push off-screen */
      background: #fff;
    }

    .frame-wrap {
      position: fixed;
      inset: 0;                    /* fill the entire viewport */
      overflow: hidden;
    }

    .frame-wrap iframe {
      position: absolute;
      left: 0;
      width: 100%;
      border: 0;
      /* Pull the iframe UP by --banner so the banner row is clipped above the
         visible area, and grow its height by the same amount so the bottom of
         the app still reaches the bottom of the viewport. */
      top: calc(-1 * var(--banner));
      height: calc(100% + var(--banner));
    }
  </style>
</head>
<body>
  <div class="frame-wrap">
    <!--
      src is the CLEAN Cloudflare worker URL. The worker 302-redirects to the
      GAS /exec endpoint; the iframe follows that redirect transparently. The
      GAS app must have setXFrameOptionsMode(ALLOWALL) set (see doGet in
      30_router.gs) or this frame renders blank.
    -->
    <iframe
      src="https://hass-cms-proxy.hasspe.workers.dev/"
      title="Hass CMS"
      allow="clipboard-read; clipboard-write"></iframe>
  </div>
</body>
</html>
