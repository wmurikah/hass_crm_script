<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hass CMS - MFA Enrolment</title>
  <?!= HtmlService.createHtmlOutputFromFile('css_theme').getContent(); ?>
</head>
<body>
<div class="mfa-page">
  <div class="mfa-card">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:8px">Set up two-factor authentication</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:20px">
      Add this account to your authenticator app (Google Authenticator, Authy, etc.), then enter the 6-digit code to confirm.
    </p>
    <div id="qrArea" style="margin-bottom:16px">
      <span class="spinner dark"></span>
    </div>
    <div class="form-group">
      <label class="form-label">Verify code</label>
      <div class="otp-inputs" id="otpInputs">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
    </div>
    <div id="mfaError" style="display:none;color:#dc2626;font-size:13px;margin-bottom:10px"></div>
    <button class="btn btn-primary" id="verifyBtn" style="width:100%;justify-content:center">Verify &amp; activate</button>
  </div>
</div>
<?!= HtmlService.createHtmlOutputFromFile('js_api').getContent(); ?>
<script>
(function () {
  var errDiv = document.getElementById('mfaError');
  var btn    = document.getElementById('verifyBtn');
  var inputs = document.querySelectorAll('#otpInputs input');

  // The enrol challenge minted at login (after the password step) is injected by
  // the server. It is the partial pre-MFA token: the mid-login user has no full
  // session yet, so enrolment is resumed from this challenge id.
  var challengeId = '<?= challengeId ?>';

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // Load the enrolment secret. We render the otpauth link (which authenticator
  // apps open directly) and the secret for manual entry. We deliberately do NOT
  // send the TOTP secret to a third-party QR image service.
  API.call('auth', 'mfaEnroll', { challengeId: challengeId })
    .then(function (d) {
      // The server returns the canonical challenge id to verify against; for the
      // settings (already-logged-in) path this may differ from the injected one.
      if (d && (d.challengeId || d.challenge_id)) challengeId = d.challengeId || d.challenge_id;
      var uri    = (d && d.provisioning_uri) || '';
      var secret = (d && d.secret) || '';
      document.getElementById('qrArea').innerHTML =
        '<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px">' +
          '<p style="font-size:12px;color:#6b7280;margin:0 0 6px">In your authenticator app, choose "Add account" then "Enter a setup key", or open this link on your phone:</p>' +
          (uri ? '<p style="margin:0 0 10px;word-break:break-all"><a href="' + esc(uri) + '">' + esc(uri) + '</a></p>' : '') +
          '<p style="font-size:12px;color:#6b7280;margin:0 0 4px">Setup key (secret):</p>' +
          '<code style="display:block;font-size:14px;letter-spacing:1px;word-break:break-all">' + esc(secret) + '</code>' +
        '</div>';
    })
    .catch(function (e) {
      document.getElementById('qrArea').innerHTML =
        '<p style="color:#dc2626">Failed to start enrolment: ' + esc(e && e.message ? e.message : e) + '</p>';
    });

  // OTP inputs: auto-advance.
  inputs.forEach(function (inp, i) {
    inp.addEventListener('input', function () {
      if (inp.value.length === 1 && i < inputs.length - 1) inputs[i + 1].focus();
    });
    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
    });
  });

  btn.addEventListener('click', function () {
    var code = Array.from(inputs).map(function (i) { return i.value; }).join('');
    if (code.length < 6) { errDiv.textContent = 'Enter all 6 digits.'; errDiv.style.display = 'block'; return; }
    errDiv.style.display = 'none';
    btn.disabled = true;
    API.call('auth', 'mfaVerifyEnroll', { challengeId: challengeId, code: code })
      .then(function (d) {
        var token = (d && d.token) || API.getToken();
        if (d && d.token) {
          API.setToken(d.token);
          try { sessionStorage.setItem('hass_token', d.token); } catch (e) {}
        }
        // GAS-safe page swap (window.location is blocked in the sandbox iframe).
        google.script.run
          .withSuccessHandler(function (html) { document.open(); document.write(html); document.close(); })
          .withFailureHandler(function (e) { errDiv.textContent = 'Failed to load dashboard: ' + (e && e.message ? e.message : e); errDiv.style.display = 'block'; btn.disabled = false; })
          .getStaffDashboardPage(token);
      })
      .catch(function (e) { errDiv.textContent = e.message || 'Invalid code.'; errDiv.style.display = 'block'; btn.disabled = false; });
  });
})();
</script>
</body>
</html>
