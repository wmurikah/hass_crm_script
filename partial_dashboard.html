<style>
/* ── SLA Performance section (navy/gold chrome; alert palette = breach only) ── */
.sla-section        { margin-top: 24px; }
.sla-section-title  { font-size: 16px; font-weight: 700; color: var(--clr-primary); margin: 0 0 12px;
                      display: flex; align-items: center; gap: 8px; }
.sla-section-title::before { content: ''; width: 4px; height: 16px; border-radius: 2px; background: var(--clr-gold); }
.sla-grid           { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.sla-card           { display: flex; flex-direction: column; }
.sla-card-head      { padding: 12px 14px 4px; }
.sla-card-title     { display: block; font-size: 13.5px; font-weight: 600; color: var(--clr-text); }
.sla-card-take      { display: block; font-size: 11.5px; color: var(--clr-text-light); margin-top: 2px; }
.sla-card-body      { position: relative; height: 180px; padding: 8px 14px 14px; }
/* Approaching breach = the action item: amber accent, scrollable list. */
.sla-alert          { border-top: 3px solid var(--clr-warning); }
.sla-alert .sla-card-title { color: var(--clr-warning); }
.sla-alert .sla-card-body  { overflow-y: auto; }
.sla-approach       { width: 100%; font-size: 12px; }
.sla-approach td    { padding: 6px 6px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
.sla-approach tr:last-child td { border-bottom: none; }
.sla-ap-sub         { width: 100%; }
.sla-ap-num         { font-weight: 600; color: var(--clr-text); }
.sla-ap-title       { color: var(--clr-text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.sla-ap-due         { white-space: nowrap; font-weight: 600; color: var(--clr-warning); text-align: right; }
.sla-pr             { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .03em; padding: 2px 6px; border-radius: 4px; }
.sla-pr-hi          { background: #fee2e2; color: #b91c1c; }
.sla-pr-mid         { background: #fef3c7; color: #92400e; }
.sla-pr-lo          { background: #f3f4f6; color: #6b7280; }
.sla-empty          { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
                      gap: 8px; color: var(--clr-success); text-align: center; font-size: 13px; padding: 0 16px; }
.sla-empty svg      { opacity: .85; }
/* Chart.js-unavailable fallbacks */
.sla-mini           { display: flex; align-items: flex-end; gap: 3px; height: 100%; }
.sla-mini-col       { flex: 1; height: 100%; display: flex; align-items: flex-end; }
.sla-mini-bar       { width: 100%; background: var(--clr-danger); border-radius: 2px 2px 0 0; min-height: 2px; }
.sla-comp-fb        { display: flex; flex-direction: column; gap: 10px; justify-content: center; height: 100%; font-size: 13px; color: var(--clr-text); }
@media (max-width: 768px) { .sla-grid { grid-template-columns: 1fr; } }
/* ── Business overview charts (navy/gold brand; 2x2 grid → 1 column on narrow) ── */
.ovw-section        { margin-top: 24px; }
.ovw-section-title  { font-size: 16px; font-weight: 700; color: var(--clr-primary); margin: 0 0 12px;
                      display: flex; align-items: center; gap: 8px; }
.ovw-section-title::before { content: ''; width: 4px; height: 16px; border-radius: 2px; background: var(--clr-gold); }
.ovw-grid           { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.ovw-card           { display: flex; flex-direction: column; }
.ovw-card-head      { padding: 12px 14px 4px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.ovw-card-titles    { min-width: 0; }
.ovw-card-title     { display: block; font-size: 13.5px; font-weight: 600; color: var(--clr-text); }
.ovw-card-sub       { display: block; font-size: 11.5px; color: var(--clr-text-light); margin-top: 2px; }
.ovw-card-body      { position: relative; height: 240px; padding: 8px 14px 14px; }
/* Calm empty state, mirrors the SLA card empty state (icon + short message). */
.ovw-empty          { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
                      gap: 8px; color: var(--clr-text-light); text-align: center; font-size: 13px; padding: 0 16px; }
.ovw-empty svg      { opacity: .5; }
/* Currency selector keeps a single currency on screen (revenue is never summed across currencies). */
.ovw-ccy-sel        { flex-shrink: 0; font-size: 12px; padding: 4px 8px; border: 1px solid var(--clr-border);
                      border-radius: 6px; background: var(--clr-surface); color: var(--clr-text); max-width: 130px; }
.ovw-ccy-sel:focus  { outline: none; border-color: var(--clr-primary); box-shadow: 0 0 0 3px rgba(31,42,68,.15); }
/* Text fallback list if Chart.js cannot be fetched (offline / strict CSP). */
.ovw-fb             { display: flex; flex-direction: column; gap: 6px; justify-content: center; height: 100%; font-size: 12.5px; color: var(--clr-text); }
.ovw-fb-row         { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ovw-fb-row b       { font-variant-numeric: tabular-nums; }
@media (max-width: 768px) { .ovw-grid { grid-template-columns: 1fr; } }
/* ── Skeleton placeholders (instant first paint while data loads) ── */
.skeleton        { position: relative; overflow: hidden; background: #eceff3; border-radius: 6px; }
.skeleton::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%);
                   background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent);
                   animation: hass-shimmer 1.2s infinite; }
.sk-line         { display: block; height: 12px; }
@keyframes hass-shimmer { 100% { transform: translateX(100%); } }
@media (prefers-reduced-motion: reduce) { .skeleton::after { animation: none; } }
</style>
<script>
Router.register('dashboard', function (el) {
  el.innerHTML =
    '<div class="stat-grid" id="dashStats">' + statSkeletons() + '</div>' +
    // ── Business overview charts (below the KPIs, above SLA detail) ──
    '<div class="ovw-section">' +
      '<h2 class="ovw-section-title">Business overview</h2>' +
      '<div class="ovw-grid" id="ovwGrid">' + ovwSkeletons() + '</div>' +
    '</div>' +
    // ── SLA Performance section (below the KPI cards, scanning order preserved) ──
    '<div class="sla-section">' +
      '<h2 class="sla-section-title">SLA Performance</h2>' +
      '<div class="sla-grid" id="slaGrid">' + slaSkeletons() + '</div>' +
    '</div>';

  // Each loader uses setHTML so a stale callback (user navigated away before
  // the API resolved) no-ops instead of throwing "Cannot set properties of
  // null". Router.current() keeps us from painting a previous page's data.
  function renderStats(d) {
    if (Router.current() !== 'dashboard') return;
    setHTML('dashStats',
      stat('Open Tickets',      d.open_tickets,      'warning', 'tickets')   +
      stat('Pending Orders',    d.pending_orders,    'primary', 'orders')    +
      stat('Unpaid Invoices',   d.unpaid_invoices,   'danger',  'invoices')  +
      stat('Pending Approvals', d.pending_approvals, 'warning', 'approvals') +
      stat('Active Customers',  d.active_customers,  'success', 'customers') +
      stat('Receivables (KES)', fmtMoney(d.unpaid_amount).replace('KES ',''), 'danger', 'invoices'));
  }

  function loadStats() {
    // First paint right after login is served from the auth.me init bundle —
    // no separate round-trip. Consumed once so a manual refresh / re-navigation
    // pulls live data.
    var pre = window._hassInitDash && window._hassInitDash.summary;
    if (pre) { window._hassInitDash.summary = null; renderStats(pre); return; }
    setHTML('dashStats', statSkeletons());
    API.call('dashboard', 'summary', {})
      .then(renderStats)
      .catch(function (e) {
        setHTML('dashStats', '<div style="grid-column:1/-1">' + errorCard(e, loadStats) + '</div>');
      });
  }

  // Stat cards are drill-downs: clicking navigates to the relevant list.
  function stat(label, val, cls, route) {
    return '<div class="stat-card ' + cls + '" style="cursor:pointer" ' +
           'onclick="goRoute(\'' + route + '\')" title="View ' + esc(label) + '">' +
           '<div class="stat-label">' + label + '</div>' +
           '<div class="stat-value">' + (val || 0) + '</div></div>';
  }

  // Skeleton placeholders shown while first-screen data is in flight, so the
  // page paints its structure instantly instead of a bare spinner.
  function statSkeletons() {
    var card =
      '<div class="stat-card">' +
        '<span class="skeleton sk-line" style="width:58%"></span>' +
        '<span class="skeleton sk-line" style="width:42%;height:26px;margin-top:14px"></span>' +
      '</div>';
    var out = ''; for (var i = 0; i < 6; i++) out += card; return out;
  }
  function slaSkeletons() {
    var card =
      '<div class="card sla-card">' +
        '<div class="sla-card-head">' +
          '<span class="skeleton sk-line" style="width:52%"></span>' +
          '<span class="skeleton sk-line" style="width:72%;margin-top:6px"></span>' +
        '</div>' +
        '<div class="sla-card-body"><div class="skeleton" style="width:100%;height:100%"></div></div>' +
      '</div>';
    var out = ''; for (var i = 0; i < 4; i++) out += card; return out;
  }
  function ovwSkeletons() {
    var card =
      '<div class="card ovw-card">' +
        '<div class="ovw-card-head"><div class="ovw-card-titles" style="flex:1">' +
          '<span class="skeleton sk-line" style="width:46%"></span>' +
          '<span class="skeleton sk-line" style="width:66%;margin-top:6px"></span>' +
        '</div></div>' +
        '<div class="ovw-card-body"><div class="skeleton" style="width:100%;height:100%"></div></div>' +
      '</div>';
    var out = ''; for (var i = 0; i < 4; i++) out += card; return out;
  }

  // ── SLA Performance ──────────────────────────────────────────────────
  // One backend call (dashboard.slaMetrics) feeds four panels. Charts use
  // the rolled-back navy/gold chrome; only breach semantics use the alert
  // palette (red = breached, amber = at-risk, green = met). Each panel has a
  // plain-language title + single takeaway, and a calm empty state.
  var SLA_RED = '#dc2626', SLA_AMBER = '#d97706', SLA_GREEN = '#16a34a', SLA_GRID = '#f1f3f5';

  // Lazy-load Chart.js (the page shell does not bundle it). cb(true) when the
  // global is ready; cb(false) if it could not load (we degrade gracefully).
  function ensureChart(cb) {
    if (window.Chart) { cb(true); return; }
    if (window._slaChartCbs) { window._slaChartCbs.push(cb); return; }
    window._slaChartCbs = [cb];
    function done(ok) {
      var cbs = window._slaChartCbs || []; window._slaChartCbs = null;
      cbs.forEach(function (f) { try { f(ok); } catch (e) {} });
    }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
    s.onload  = function () { done(true); };
    s.onerror = function () { done(false); };
    document.head.appendChild(s);
  }

  function loadSla() {
    // First paint right after login is served from the auth.me init bundle.
    var pre = window._hassInitDash && window._hassInitDash.sla;
    if (pre) {
      window._hassInitDash.sla = null;
      ensureChart(function (chartOk) {
        if (Router.current() !== 'dashboard') return;
        renderSla(pre, chartOk);
      });
      return;
    }
    setHTML('slaGrid', slaSkeletons());
    API.call('dashboard', 'slaMetrics', {}).then(function (d) {
      if (Router.current() !== 'dashboard') return;
      ensureChart(function (chartOk) {
        if (Router.current() !== 'dashboard') return;
        renderSla(d, chartOk);
      });
    }).catch(function (e) {
      setHTML('slaGrid', '<div style="grid-column:1/-1">' + errorCard(e, loadSla) + '</div>');
    });
  }

  // Panel shell: title + one-line takeaway + body. `flag` adds the amber
  // action-item accent (used by the "approaching breach" panel).
  function slaPanel(title, takeaway, bodyHtml, flag) {
    return '<div class="card sla-card' + (flag ? ' sla-alert' : '') + '">' +
      '<div class="sla-card-head"><span class="sla-card-title">' + esc(title) + '</span>' +
      '<span class="sla-card-take">' + esc(takeaway) + '</span></div>' +
      '<div class="sla-card-body">' + bodyHtml + '</div></div>';
  }
  function slaCalm(msg) {
    return '<div class="sla-empty">' +
      '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
      '<span>' + esc(msg) + '</span></div>';
  }
  function prBadge(p) {
    var u = String(p || '').toUpperCase();
    var cls = (u === 'CRITICAL' || u === 'HIGH') ? 'hi' : (u === 'MEDIUM' ? 'mid' : 'lo');
    return '<span class="sla-pr sla-pr-' + cls + '">' + esc(u || '—') + '</span>';
  }
  function dueIn(iso) {
    var ms = new Date(iso).getTime() - Date.now();
    if (isNaN(ms)) return '—';
    if (ms <= 0) return 'due now';
    var h = Math.floor(ms / 3600000), m = Math.round((ms % 3600000) / 60000);
    return h > 0 ? ('in ' + h + 'h' + (m ? ' ' + m + 'm' : '')) : ('in ' + m + 'm');
  }

  var _baseOpts = {
    responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
    plugins: { legend: { display: false }, tooltip: { intersect: false, mode: 'index' } },
    scales: {
      x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 } },
      y: { beginAtZero: true, grid: { color: SLA_GRID }, border: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 }, precision: 0, maxTicksLimit: 5 } },
    },
  };

  function renderSla(d, chartOk) {
    d = d || {};
    var trend     = d.breachTrend || [];
    var byPrio    = d.breachesByPriority || [];
    var comp      = d.compliance || { responseMet: 0, responseBreached: 0, resolveMet: 0, resolveBreached: 0 };
    var approach  = d.approaching || [];

    var trendTotal = trend.reduce(function (s, r) { return s + (r.count || 0); }, 0);
    var prioTotal  = byPrio.reduce(function (s, r) { return s + (r.count || 0); }, 0);
    var compTotal  = comp.responseMet + comp.responseBreached + comp.resolveMet + comp.resolveBreached;

    // ── Panel bodies (canvas when Chart.js is ready, calm/fallback otherwise) ──
    var trendBody = trendTotal === 0
      ? slaCalm('No SLA breaches in the last 30 days.')
      : (chartOk ? '<canvas id="slaTrendCv"></canvas>' : _miniBars(trend.map(function (t) { return { label: t.date.slice(5), val: t.count }; })));

    var prioBody = prioTotal === 0
      ? slaCalm('No breaches by priority.')
      : (chartOk ? '<canvas id="slaPrioCv"></canvas>' : _miniBars(byPrio.map(function (p) { return { label: p.priority, val: p.count }; })));

    var respPct = (comp.responseMet + comp.responseBreached) ? Math.round(comp.responseMet * 100 / (comp.responseMet + comp.responseBreached)) : null;
    var resoPct = (comp.resolveMet + comp.resolveBreached) ? Math.round(comp.resolveMet * 100 / (comp.resolveMet + comp.resolveBreached)) : null;
    var compTake = (respPct == null && resoPct == null) ? 'No SLA-tracked tickets yet'
      : ((respPct == null ? '—' : respPct + '%') + ' response · ' + (resoPct == null ? '—' : resoPct + '%') + ' resolve met');
    var compBody = compTotal === 0
      ? slaCalm('No SLA-tracked tickets yet.')
      : (chartOk ? '<canvas id="slaCompCv"></canvas>' : _compFallback(comp));

    var approachBody = approach.length === 0
      ? slaCalm('No tickets approaching breach.')
      : '<table class="sla-approach"><tbody>' + approach.map(function (t) {
          return '<tr>' +
            '<td>' + prBadge(t.priority) + '</td>' +
            '<td class="sla-ap-sub"><div class="sla-ap-num">' + esc(t.ticket_number || '') + '</div>' +
              '<div class="sla-ap-title" title="' + esc(t.subject || '') + '">' + esc(t.subject || '') + '</div></td>' +
            '<td class="sla-ap-due">' + esc(dueIn(t.due_at)) + '</td></tr>';
        }).join('') + '</tbody></table>';

    // Order: trend (top-left), APPROACHING (top-right, the action item),
    // breaches by priority (bottom-left), compliance (bottom-right).
    setHTML('slaGrid',
      slaPanel('Breach rate trend', 'Daily breaches, last 30 days', trendBody) +
      slaPanel('Approaching breach', approach.length ? approach.length + ' open ticket' + (approach.length > 1 ? 's' : '') + ' due within 24h' : 'Open tickets due within 24h', approachBody, true) +
      slaPanel('Breaches by priority', 'Where breaches concentrate', prioBody) +
      slaPanel('Response vs resolve compliance', compTake, compBody)
    );

    if (!chartOk) return; // fallbacks already rendered; nothing to instantiate

    // ── Instantiate charts ──
    if (trendTotal > 0) {
      new Chart(document.getElementById('slaTrendCv'), {
        type: 'line',
        data: { labels: trend.map(function (t) { return t.date.slice(5); }),
          datasets: [{ data: trend.map(function (t) { return t.count; }),
            borderColor: SLA_RED, backgroundColor: 'rgba(220,38,38,.08)', fill: true,
            tension: .3, pointRadius: 0, borderWidth: 2 }] },
        options: _baseOpts,
      });
    }
    if (prioTotal > 0) {
      new Chart(document.getElementById('slaPrioCv'), {
        type: 'bar',
        data: { labels: byPrio.map(function (p) { return _cap(p.priority); }),
          datasets: [{ data: byPrio.map(function (p) { return p.count; }),
            backgroundColor: SLA_RED, borderRadius: 3, maxBarThickness: 46 }] },
        options: _baseOpts,
      });
    }
    if (compTotal > 0) {
      new Chart(document.getElementById('slaCompCv'), {
        type: 'bar',
        data: { labels: ['Response', 'Resolve'],
          datasets: [
            { label: 'Met',      data: [comp.responseMet, comp.resolveMet],           backgroundColor: SLA_GREEN, borderRadius: 3, maxBarThickness: 46 },
            { label: 'Breached', data: [comp.responseBreached, comp.resolveBreached], backgroundColor: SLA_RED,   borderRadius: 3, maxBarThickness: 46 },
          ] },
        options: Object.assign({}, _baseOpts, {
          plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, color: '#6b7280' } },
                     tooltip: { intersect: false, mode: 'index' } },
        }),
      });
    }
  }

  // Tiny CSS-bar fallback if Chart.js cannot be fetched (offline / strict CSP).
  function _miniBars(rows) {
    var max = rows.reduce(function (m, r) { return Math.max(m, r.val); }, 1);
    return '<div class="sla-mini">' + rows.map(function (r) {
      var h = Math.max(2, Math.round((r.val / max) * 100));
      return '<div class="sla-mini-col" title="' + esc(r.label) + ': ' + r.val + '">' +
        '<div class="sla-mini-bar" style="height:' + h + '%"></div></div>';
    }).join('') + '</div>';
  }
  function _compFallback(c) {
    return '<div class="sla-comp-fb">' +
      '<div>Response — <b>' + c.responseMet + '</b> met / <b style="color:' + SLA_RED + '">' + c.responseBreached + '</b> breached</div>' +
      '<div>Resolve — <b>' + c.resolveMet + '</b> met / <b style="color:' + SLA_RED + '">' + c.resolveBreached + '</b> breached</div>' +
      '</div>';
  }
  function _cap(s) { s = String(s || ''); return s.charAt(0) + s.slice(1).toLowerCase(); }

  // ── Business overview (four charts, one backend call: dashboard.charts) ──────
  // Chart types chosen by what the data is, not by habit:
  //   - Orders over time  -> LINE  (a time series belongs on a line)
  //   - Revenue by month  -> vertical BAR (discrete period comparison; one
  //                          currency at a time via a selector, never summed
  //                          across currencies)
  //   - Orders by country -> horizontal BAR (~8 categories read better than a pie)
  //   - Tickets by status -> DOUGHNUT (the one true part-to-whole, 5 slices)
  // Brand palette stays consistent: orders are navy everywhere, revenue is gold,
  // ticket statuses use brand tints. Meaning never rides on colour alone (every
  // chart keeps axis labels or a legend), and axis text is AA on white.
  var OVW_NAVY = '#1F2D5C', OVW_NAVY_DEEP = '#0B1733', OVW_NAVY_TINT = '#3E63A8',
      OVW_GOLD = '#C9A227', OVW_GOLD_DK = '#A07E1C', OVW_ORANGE = '#E06820', OVW_SLATE = '#7E8AA6';
  // NEW, OPEN, PENDING, RESOLVED, CLOSED (order matches the server series).
  var OVW_STATUS_COLORS = [OVW_NAVY, OVW_NAVY_TINT, OVW_GOLD, OVW_ORANGE, OVW_SLATE];
  var OVW_GRIDLINE = '#eef1f5', OVW_AXIS = '#4b5563';     // #4b5563 clears WCAG AA on white
  var _ovwCharts = [];     // count/category charts created this mount (destroyed on re-render)
  var _ovwRevChart = null; // revenue chart, recreated when the currency selector changes

  function _axisTicks(extra) { return Object.assign({ color: OVW_AXIS, font: { size: 11 } }, extra || {}); }
  function _fmtInt(n) { n = Number(n) || 0; return Math.round(n).toLocaleString(); }
  function _fmtCompact(n) {
    n = Number(n) || 0; var a = Math.abs(n);
    if (a >= 1e9) return (n / 1e9).toFixed(a >= 1e10 ? 0 : 1).replace(/\.0$/, '') + 'B';
    if (a >= 1e6) return (n / 1e6).toFixed(a >= 1e7 ? 0 : 1).replace(/\.0$/, '') + 'M';
    if (a >= 1e3) return (n / 1e3).toFixed(a >= 1e4 ? 0 : 1).replace(/\.0$/, '') + 'K';
    return _fmtInt(n);
  }
  var _MON_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var _MON_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  function _ymParts(ym) { var p = String(ym || '').split('-'); return { y: parseInt(p[0], 10) || 0, m: (parseInt(p[1], 10) || 1) - 1 }; }
  function monthShort(ym) { var o = _ymParts(ym); return _MON_ABBR[o.m] || ym; }
  function monthLong(ym)  { var o = _ymParts(ym); return (_MON_FULL[o.m] || '') + ' ' + o.y; }

  function ovwPanel(title, sub, bodyHtml, headExtra) {
    return '<div class="card ovw-card">' +
      '<div class="ovw-card-head"><div class="ovw-card-titles">' +
        '<span class="ovw-card-title">' + esc(title) + '</span>' +
        '<span class="ovw-card-sub">' + esc(sub) + '</span>' +
      '</div>' + (headExtra || '') + '</div>' +
      '<div class="ovw-card-body">' + bodyHtml + '</div></div>';
  }
  function ovwCalm(msg) {
    return '<div class="ovw-empty">' +
      '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' +
      '<line x1="3" y1="20" x2="21" y2="20"/><rect x="5" y="11" width="3.4" height="7"/><rect x="10.3" y="7" width="3.4" height="11"/><rect x="15.6" y="13" width="3.4" height="5"/></svg>' +
      '<span>' + esc(msg) + '</span></div>';
  }
  // Text list fallback when Chart.js cannot be fetched (offline / strict CSP).
  function ovwFallback(rows, fmt) {
    return '<div class="ovw-fb">' + rows.map(function (r) {
      return '<div class="ovw-fb-row"><span>' + esc(r.label) + '</span><b>' + esc(fmt ? fmt(r.val) : _fmtInt(r.val)) + '</b></div>';
    }).join('') + '</div>';
  }

  function loadCharts() {
    // First paint right after login is served from the auth.me init bundle.
    var pre = window._hassInitDash && window._hassInitDash.charts;
    if (pre) {
      window._hassInitDash.charts = null;
      ensureChart(function (chartOk) {
        if (Router.current() !== 'dashboard') return;
        renderCharts(pre, chartOk);
      });
      return;
    }
    setHTML('ovwGrid', ovwSkeletons());
    API.call('dashboard', 'charts', {}).then(function (d) {
      if (Router.current() !== 'dashboard') return;
      ensureChart(function (chartOk) {
        if (Router.current() !== 'dashboard') return;
        renderCharts(d, chartOk);
      });
    }).catch(function (e) {
      setHTML('ovwGrid', '<div style="grid-column:1/-1">' + errorCard(e, loadCharts) + '</div>');
    });
  }

  function renderCharts(d, chartOk) {
    if (Router.current() !== 'dashboard') return;
    d = d || {};
    var om  = d.ordersByMonth   || [];
    var rev = d.revenueByMonth  || { months: [], currencies: [], series: {} };
    var oc  = d.ordersByCountry || [];
    var ts  = d.ticketsByStatus || [];

    var ordersTotal  = om.reduce(function (s, r) { return s + (r.count || 0); }, 0);
    var ccyList      = rev.currencies || [];
    var hasRevenue   = ccyList.length > 0;
    var countryTotal = oc.reduce(function (s, r) { return s + (r.count || 0); }, 0);
    var ticketTotal  = ts.reduce(function (s, r) { return s + (r.count || 0); }, 0);

    // Tear down any charts from a previous render in this mount before rebuilding.
    _ovwCharts.forEach(function (c) { try { c.destroy(); } catch (e) {} });
    _ovwCharts = [];
    if (_ovwRevChart) { try { _ovwRevChart.destroy(); } catch (e) {} _ovwRevChart = null; }

    // Recreate the revenue bar for one currency. Kept inline so it closes over
    // `rev`; the selector calls it again with a different currency.
    function drawRevenue(ccy) {
      var cv = document.getElementById('ovwRevenueCv');
      if (!cv) return;
      if (_ovwRevChart) { try { _ovwRevChart.destroy(); } catch (e) {} _ovwRevChart = null; }
      var vals = (rev.series && rev.series[ccy]) ? rev.series[ccy] : [];
      _ovwRevChart = new Chart(cv, {
        type: 'bar',
        data: { labels: (rev.months || []).map(monthShort),
          datasets: [{ label: ccy + ' revenue', data: vals,
            backgroundColor: OVW_GOLD, hoverBackgroundColor: OVW_GOLD_DK, borderColor: OVW_GOLD_DK,
            borderWidth: 1, borderRadius: 4, maxBarThickness: 46 }] },
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: { intersect: false, mode: 'index', callbacks: {
              title: function (it) { return it.length ? monthLong((rev.months || [])[it[0].dataIndex]) : ''; },
              label: function (ctx) { return fmtMoney(ctx.parsed.y, ccy); } } },
          },
          scales: {
            x: { grid: { display: false }, ticks: _axisTicks({ maxRotation: 0 }) },
            y: { beginAtZero: true, grid: { color: OVW_GRIDLINE }, border: { display: false },
                 ticks: _axisTicks({ maxTicksLimit: 5, callback: function (v) { return _fmtCompact(v); } }) },
          },
        },
      });
    }

    // ── Panel bodies (canvas when Chart.js is ready, calm/fallback otherwise) ──
    var ordersBody = ordersTotal === 0
      ? ovwCalm('No orders in the last 6 months yet.')
      : (chartOk ? '<canvas id="ovwOrdersCv"></canvas>'
                 : ovwFallback(om.map(function (r) { return { label: monthShort(r.month), val: r.count }; })));

    var defCcy  = hasRevenue ? ccyList[0] : '';
    var revHead = hasRevenue
      ? '<select class="ovw-ccy-sel" id="ovwCcySel" aria-label="Revenue currency">' +
          ccyList.map(function (c) { return '<option value="' + esc(c) + '"' + (c === defCcy ? ' selected' : '') + '>' + esc(c) + '</option>'; }).join('') +
        '</select>'
      : '';
    var revBody = !hasRevenue
      ? ovwCalm('No revenue in the last 6 months yet.')
      : (chartOk ? '<canvas id="ovwRevenueCv"></canvas>'
                 : ovwFallback((rev.months || []).map(function (m, i) { return { label: monthShort(m), val: (rev.series[defCcy] || [])[i] || 0 }; }),
                               function (v) { return fmtMoney(v, defCcy); }));

    var countryBody = countryTotal === 0
      ? ovwCalm('No orders by country yet.')
      : (chartOk ? '<canvas id="ovwCountryCv"></canvas>'
                 : ovwFallback(oc.map(function (r) { return { label: r.label, val: r.count }; })));

    var ticketsBody = ticketTotal === 0
      ? ovwCalm('No tickets yet.')
      : (chartOk ? '<canvas id="ovwTicketsCv"></canvas>'
                 : ovwFallback(ts.map(function (r) { return { label: _cap(r.status), val: r.count }; })));

    var revSub = hasRevenue ? ('Confirmed order value per month, ' + defCcy) : 'Confirmed order value per month';

    setHTML('ovwGrid',
      ovwPanel('Orders over time', 'Orders created per month, last 6 months', ordersBody) +
      ovwPanel('Revenue by month', revSub, revBody, revHead) +
      ovwPanel('Orders by country', 'Active countries by order count', countryBody) +
      ovwPanel('Tickets by status', 'Spread across the five lifecycle statuses', ticketsBody)
    );

    if (!chartOk) return;   // fallbacks already rendered; nothing to instantiate

    // ── 1. Orders over time (line) ──
    if (ordersTotal > 0) {
      _ovwCharts.push(new Chart(document.getElementById('ovwOrdersCv'), {
        type: 'line',
        data: { labels: om.map(function (r) { return monthShort(r.month); }),
          datasets: [{ label: 'Orders', data: om.map(function (r) { return r.count; }),
            borderColor: OVW_NAVY, backgroundColor: 'rgba(31,45,92,.10)', fill: true,
            tension: .3, borderWidth: 2, pointRadius: 3, pointHoverRadius: 5,
            pointBackgroundColor: OVW_NAVY, pointBorderColor: '#fff', pointBorderWidth: 1 }] },
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: { intersect: false, mode: 'index', callbacks: {
              title: function (it) { return it.length ? monthLong(om[it[0].dataIndex].month) : ''; },
              label: function (ctx) { return 'Orders: ' + _fmtInt(ctx.parsed.y); } } },
          },
          scales: {
            x: { grid: { display: false }, ticks: _axisTicks({ maxRotation: 0 }) },
            y: { beginAtZero: true, grid: { color: OVW_GRIDLINE }, border: { display: false },
                 ticks: _axisTicks({ precision: 0, maxTicksLimit: 5, callback: function (v) { return _fmtInt(v); } }) },
          },
        },
      }));
    }

    // ── 2. Revenue by month (bar) + currency selector ──
    if (hasRevenue) {
      drawRevenue(defCcy);
      var sel = document.getElementById('ovwCcySel');
      if (sel) sel.addEventListener('change', function () {
        var c = this.value;
        drawRevenue(c);
        var card = this.closest && this.closest('.ovw-card');
        var subEl = card && card.querySelector('.ovw-card-sub');
        if (subEl) subEl.textContent = 'Confirmed order value per month, ' + c;
      });
    }

    // ── 3. Orders by country (horizontal bar) ──
    if (countryTotal > 0) {
      _ovwCharts.push(new Chart(document.getElementById('ovwCountryCv'), {
        type: 'bar',
        data: { labels: oc.map(function (r) { return r.label; }),
          datasets: [{ label: 'Orders', data: oc.map(function (r) { return r.count; }),
            backgroundColor: OVW_NAVY, hoverBackgroundColor: OVW_NAVY_DEEP, borderRadius: 4, maxBarThickness: 26 }] },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              title: function (it) { return it.length ? (oc[it[0].dataIndex].label + ' (' + oc[it[0].dataIndex].country + ')') : ''; },
              label: function (ctx) { return 'Orders: ' + _fmtInt(ctx.parsed.x); } } },
          },
          scales: {
            x: { beginAtZero: true, grid: { color: OVW_GRIDLINE }, border: { display: false },
                 ticks: _axisTicks({ precision: 0, maxTicksLimit: 6, callback: function (v) { return _fmtInt(v); } }) },
            y: { grid: { display: false }, ticks: _axisTicks() },
          },
        },
      }));
    }

    // ── 4. Tickets by status (doughnut) ──
    if (ticketTotal > 0) {
      _ovwCharts.push(new Chart(document.getElementById('ovwTicketsCv'), {
        type: 'doughnut',
        data: { labels: ts.map(function (r) { return _cap(r.status); }),
          datasets: [{ data: ts.map(function (r) { return r.count; }),
            backgroundColor: OVW_STATUS_COLORS, borderColor: '#fff', borderWidth: 2, hoverOffset: 6 }] },
        options: {
          responsive: true, maintainAspectRatio: false, animation: { duration: 300 }, cutout: '60%',
          plugins: {
            legend: { position: 'bottom', labels: { color: '#374151', boxWidth: 12, padding: 12, font: { size: 11.5 } } },
            tooltip: { callbacks: {
              label: function (ctx) {
                var total = ctx.dataset.data.reduce(function (s, v) { return s + (v || 0); }, 0);
                var pct = total ? Math.round(ctx.parsed * 100 / total) : 0;
                return ctx.label + ': ' + _fmtInt(ctx.parsed) + ' (' + pct + '%)';
              } } },
          },
        },
      }));
    }
  }

  loadStats();
  loadCharts();
  loadSla();
});
</script>
