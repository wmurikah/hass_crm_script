<script>
Router.register('invoices', function (el) {
  el.innerHTML =
    '<div class="filter-bar">' +
      '<select class="form-control" id="invStatus"><option value="">All statuses</option><option>ISSUED</option><option>CANCELLED</option></select>' +
      '<select class="form-control" id="invPayStatus"><option value="">Payment status</option><option>UNPAID</option><option>PAID</option></select>' +
    '</div>' +
    '<div class="card"><div class="table-wrapper"><table class="data-table">' +
      '<thead><tr><th>Invoice #</th><th>Customer</th><th>Total</th><th>Due Date</th><th>Status</th><th>Payment</th><th></th></tr></thead>' +
      '<tbody id="invBody"></tbody></table></div></div>';

  function load() {
    setHTML('invBody', loadingRow(7));
    var params = { limit: 50 };
    var s = document.getElementById('invStatus').value;
    var p = document.getElementById('invPayStatus').value;
    if (s) params.status = s;
    if (p) params.payment_status = p;
    API.call('invoices', 'list', params).then(function (rows) {
      if (!rows.length) { setHTML('invBody', emptyRow(7, 'No invoices.')); return; }
      setHTML('invBody', rows.map(function (r) {
        var iid = esc(r.invoice_id);
        return '<tr style="cursor:pointer" onclick="viewInvoice(\'' + iid + '\')"><td>' + esc(r.invoice_number) + '</td><td>' + esc(r.company_name || r.customer_id) + '</td>' +
               '<td>' + fmtMoney(r.total_amount, r.currency_code) + '</td><td>' + fmtDate(r.due_date) + '</td>' +
               '<td>' + statusBadge(r.status) + '</td><td>' + statusBadge(r.payment_status) + '</td>' +
               '<td><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();viewInvoice(\'' + iid + '\')">View</button></td></tr>';
      }).join(''));
    }).catch(function (e) { setHTML('invBody', errorRow(7, e, load)); });
  }

  document.getElementById('invStatus').onchange = load;
  document.getElementById('invPayStatus').onchange = load;
  load();
});

function viewInvoice(id) {
  var l = Loader.show();
  API.call('invoices', 'get', { invoiceId: id }).then(function (inv) {
    Loader.hide(l);
    var payments = (inv.payments || []).map(function (p) {
      return '<tr><td>' + fmtDate(p.uploaded_at) + '</td><td>' + fmtMoney(p.amount) + '</td>' +
             '<td>' + esc(p.payment_method) + '</td><td>' + esc(p.reference) + '</td><td>' + statusBadge(p.status) + '</td></tr>';
    }).join('');
    Modal.open({
      title: inv.invoice_number,
      body: '<dl style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px">' +
            '<dt style="color:#6b7280">Total</dt><dd>' + fmtMoney(inv.total_amount, inv.currency_code) + '</dd>' +
            '<dt style="color:#6b7280">Due</dt><dd>' + fmtDate(inv.due_date) + '</dd>' +
            '<dt style="color:#6b7280">Status</dt><dd>' + statusBadge(inv.status) + '</dd>' +
            '<dt style="color:#6b7280">Payment</dt><dd>' + statusBadge(inv.payment_status) + '</dd>' +
            '</dl>' +
            '<h4 style="font-size:13px;font-weight:600;margin-bottom:6px">Payment history</h4>' +
            '<table class="data-table"><thead><tr><th>Date</th><th>Amount</th><th>Method</th><th>Reference</th><th>Status</th></tr></thead>' +
            '<tbody>' + (payments || '<tr><td colspan="5" style="color:#9ca3af">No payments.</td></tr>') + '</tbody></table>',
      footer: '<button class="btn btn-secondary" onclick="Modal.close()">Close</button>' +
              (inv.status === 'ISSUED' && inv.payment_status !== 'PAID' && can('invoice.cancel')
                ? '<button class="btn btn-danger btn-sm" onclick="cancelInvoice(\'' + esc(inv.invoice_id) + '\')">Cancel invoice</button>'
                : ''),
    });
  }).catch(function (e) { Loader.hide(l); Toast.error(e.message); });
}

// Cancel affordance, gated by invoice.cancel and wired to the existing
// invoices.cancel action (which also re-checks the status server-side).
function cancelInvoice(id) {
  var reason = window.prompt('Reason for cancelling this invoice:');
  if (!reason) return;
  API.call('invoices', 'cancel', { invoiceId: id, reason: reason })
    .then(function () { Modal.close(); Toast.success('Invoice cancelled.'); if (Router.current() === 'invoices') Router.navigate('invoices', {}); })
    .catch(function (e) { Toast.error(e.message); });
}
</script>
