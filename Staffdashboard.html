<? var _stoken = (typeof sessionToken !== 'undefined' && sessionToken) ? sessionToken : ''; ?>
<script>
(function () {
  'use strict';

  // Token injected server-side when this page is rendered via
  // getStaffDashboardPage(). Falls back to a persisted token if present.
  var SESSION_TOKEN = '<?= _stoken ?>';

  // GAS-safe page swap: window.location is blocked inside the sandbox iframe,
  // so fetch the login HTML and replace the document instead.
  function loadLoginPage() {
    google.script.run
      .withSuccessHandler(function (html) {
        document.open(); document.write(html); document.close();
      })
      .withFailureHandler(function () {
        document.open();
        document.write('<!DOCTYPE html><html><body style="font-family:sans-serif;'
          + 'padding:40px"><p>Session ended. Please reload.</p></body></html>');
        document.close();
      })
      .getLoginPage();
  }
  window._hassLoadLoginPage = loadLoginPage;

  // ── Auth guard ─────────────────────────────────────────────────
  if (SESSION_TOKEN) {
    API.setToken(SESSION_TOKEN);
    try { sessionStorage.setItem('hass_token', SESSION_TOKEN); } catch (e) {}
  }
  if (!API.getToken() && !API.loadPersistedToken()) {
    loadLoginPage();
    return;
  }

  // ── Verify session ─────────────────────────────────────────────
  API.call('auth', 'me', {})
    .then(function (me) {
      document.getElementById('authGuard').style.display  = 'none';
      document.getElementById('appShell').style.display   = 'flex';
      document.getElementById('userLabel').textContent    = me.first_name + ' ' + me.last_name + ' (' + me.role + ')';
      initApp(me);
    })
    .catch(function () {
      loadLoginPage();
    });

  // ── App init ───────────────────────────────────────────────────
  function initApp(me) {
    // Set up router.
    Router.init(document.getElementById('pageContent'), '.nav-item');

    // Build sidebar from menu API.
    API.call('menu', 'list', {})
      .then(function (items) { renderNav(items); })
      .catch(function () { renderNav([]); });

    // Logout.
    document.getElementById('logoutBtn').onclick = function () {
      API.logout().catch(function () {}).finally(function () {
        loadLoginPage();
      });
    };

    // Navigate to default page.
    Router.navigate('dashboard', {});
  }

  // ── Sidebar render ──────────────────────────────────────────────
  function renderNav(items) {
    var nav = document.getElementById('sidebarNav');
    var groups = {};
    items.forEach(function (item) {
      if (!groups[item.group]) groups[item.group] = [];
      groups[item.group].push(item);
    });
    var groupLabels = { main:'Main', finance:'Finance', ops:'Operations',
                        catalog:'Catalog', support:'Support', reports:'Reports', admin:'Admin' };
    var html = '';
    Object.keys(groupLabels).forEach(function (g) {
      if (!groups[g] || !groups[g].length) return;
      html += '<div class="nav-group-label">' + groupLabels[g] + '</div>';
      groups[g].forEach(function (item) {
        html += '<div class="nav-item" data-route="' + item.id + '">' +
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>' +
                '<span>' + item.label + '</span></div>';
      });
    });
    nav.innerHTML = html;
    nav.querySelectorAll('.nav-item').forEach(function (el) {
      el.addEventListener('click', function () {
        document.getElementById('pageTitle').textContent = el.querySelector('span').textContent;
        Router.navigate(el.dataset.route, {});
      });
    });
  }
})();
</script>
</body>
