<? var _stoken = (typeof sessionToken !== 'undefined' && sessionToken) ? sessionToken : ''; ?>
<script>
(function () {
  'use strict';

  // Token injected server-side when this page is rendered via
  // getStaffDashboardPage(). Falls back to a persisted token if present.
  var SESSION_TOKEN = '<?= _stoken ?>';

  // GAS-safe page swap: window.location is blocked inside the sandbox iframe,
  // so fetch the login HTML and replace the document instead.
  function loadLoginPage() {
    google.script.run
      .withSuccessHandler(function (html) {
        document.open(); document.write(html); document.close();
      })
      .withFailureHandler(function () {
        document.open();
        document.write('<!DOCTYPE html><html><body style="font-family:sans-serif;'
          + 'padding:40px"><p>Session ended. Please reload.</p></body></html>');
        document.close();
      })
      .getLoginPage();
  }
  window._hassLoadLoginPage = loadLoginPage;

  // ── Auth guard ─────────────────────────────────────────────────
  if (SESSION_TOKEN) {
    API.setToken(SESSION_TOKEN);
    try { sessionStorage.setItem('hass_token', SESSION_TOKEN); } catch (e) {}
  }
  if (!API.getToken() && !API.loadPersistedToken()) {
    loadLoginPage();
    return;
  }

  // ── Verify session ─────────────────────────────────────────────
  // A transient blip must NOT falsely log the user out. Give the guard call
  // 3 retries (transient failures only) and only redirect to login on a real
  // session loss (NO_SESSION / SESSION_EXPIRED). Any other failure after
  // retries are exhausted shows a "Connection problem" retry state instead.
  function verifySession() {
    var guard = document.getElementById('authGuard');
    if (guard) guard.innerHTML = '<span class="spinner dark"></span>';

    // bundle:true asks auth.me to also return the dashboard first-screen data
    // (branding, menu, bot-admin flag, dashboard summary + SLA) in this ONE
    // round-trip, instead of the dashboard firing five more google.script.run
    // calls after the guard passes.
    API.call('auth', 'me', { bundle: true }, { retries: 3 })
      .then(function (me) {
        document.getElementById('authGuard').style.display = 'none';
        document.getElementById('appShell').style.display  = 'flex';
        document.getElementById('userLabel').textContent   =
          me.first_name + ' ' + me.last_name + ' (' + me.role + ')';
        initApp(me);
      })
      .catch(function (err) {
        if (err && (err.code === 'NO_SESSION' || err.code === 'SESSION_EXPIRED')) {
          loadLoginPage();
        } else {
          showConnectionError(err);
        }
      });
  }

  function showConnectionError(err) {
    var guard = document.getElementById('authGuard');
    if (!guard) return;
    var msg = (err && err.message) ? err.message : 'Could not reach the server.';
    guard.innerHTML =
      '<div class="card" style="max-width:420px;text-align:center">' +
        '<div class="card-body">' +
          '<div style="font-size:16px;font-weight:600;margin-bottom:8px">Connection problem</div>' +
          '<p style="color:#6b7280;margin-bottom:16px">' +
            String(msg).replace(/[<>&]/g, '') + '</p>' +
          '<button class="btn btn-primary" id="connRetryBtn">Retry</button>' +
        '</div>' +
      '</div>';
    var btn = document.getElementById('connRetryBtn');
    if (btn) btn.onclick = verifySession;
  }

  // ── Sidebar chrome: off-canvas drawer (mobile) + icon-rail (desktop) ──────
  // Conventional admin-sidebar behaviour (Jakob's law). The rail choice is
  // persisted for the session in sessionStorage (sandbox-safe; the same store
  // the app already uses for its token/cache). Group open/close state stays
  // in-memory (see renderNav).
  var _shell = document.getElementById('appShell');

  function openDrawer() {
    if (_shell) _shell.classList.add('drawer-open');
    var h = document.getElementById('navHamburger');
    if (h) h.setAttribute('aria-expanded', 'true');
  }
  function closeDrawer() {
    if (!_shell || !_shell.classList.contains('drawer-open')) return;
    _shell.classList.remove('drawer-open');
    var h = document.getElementById('navHamburger');
    if (h) h.setAttribute('aria-expanded', 'false');
  }
  function toggleDrawer() {
    if (_shell && _shell.classList.contains('drawer-open')) closeDrawer(); else openDrawer();
  }
  function setRail(on) {
    if (_shell) _shell.classList.toggle('nav-collapsed', on);
    var b = document.getElementById('navCollapseBtn');
    if (b) {
      b.setAttribute('aria-pressed', String(on));
      b.setAttribute('aria-label', on ? 'Expand sidebar' : 'Collapse sidebar');
      b.setAttribute('title',      on ? 'Expand sidebar' : 'Collapse sidebar');
    }
    try { sessionStorage.setItem('hass_nav_rail', on ? '1' : '0'); } catch (e) {}
  }
  function setupShellChrome() {
    var ham = document.getElementById('navHamburger');
    var ov  = document.getElementById('navOverlay');
    var col = document.getElementById('navCollapseBtn');
    if (ham) ham.addEventListener('click', toggleDrawer);
    if (ov)  ov.addEventListener('click', closeDrawer);
    if (col) col.addEventListener('click', function () {
      setRail(!(_shell && _shell.classList.contains('nav-collapsed')));
    });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrawer(); });
    // Restore the persisted desktop rail choice.
    var pref = null;
    try { pref = sessionStorage.getItem('hass_nav_rail'); } catch (e) {}
    if (pref === '1') setRail(true);
  }
  setupShellChrome();

  verifySession();

  // ── App init ───────────────────────────────────────────────────
  var _menuItems   = [];   // cached menu.list result
  var _botAdmin    = false; // user may manage bot configs (probed server-side)
  var _landed      = false; // first-section navigation has happened

  function initApp(me) {
    var bundle  = me.bundle || {};
    var cacheNs = me.userId || me.email || 'staff';   // per-user cache namespace

    // Bind the persistent SWR cache to THIS user before any data call runs. If a
    // different user signed in on this browser, setUser purges the prior owner's
    // cache first, so one user can never read another's cached data.
    try { if (window.HassStore) HassStore.setUser(cacheNs); } catch (e) {}

    // Resolved permission union delivered by auth.me. The menu arrives already
    // filtered server-side, but loading the set here lets sections/actions gate
    // client-side via HassPerms.has(code) (server still enforces every call).
    Perms.load(me.permissions || []);

    // ── Branding ── paint last-known instantly (cache), then refresh from the
    // init bundle (preferred) or a standalone call. Failure → CSS defaults.
    var cachedBranding = HassCache.any('branding_' + cacheNs);
    if (cachedBranding) applyBranding(cachedBranding);
    function freshBranding(b) {
      if (!b) return;
      applyBranding(b);
      HassCache.set('branding_' + cacheNs, b, 3600);   // 1h — branding rarely changes
    }
    if (bundle.branding) freshBranding(bundle.branding);
    else API.call('branding', 'get', { scope_code: 'GLOBAL' }).then(freshBranding).catch(function () {});

    // Set up router.
    Router.init(document.getElementById('pageContent'), '.nav-item');

    // ── Sidebar menu ── render last-known instantly, then refresh.
    var cachedMenu  = HassCache.any('menu_' + cacheNs);
    var menuIsFinal = !!bundle.menu;   // bundle menu is authoritative this load
    if (cachedMenu) { _menuItems = cachedMenu; rebuildNav(); }
    function freshMenu(items) {
      _menuItems = items || [];
      rebuildNav();
      HassCache.set('menu_' + cacheNs, _menuItems, 3600);   // 1h, menu rarely changes
    }
    if (bundle.menu) {
      freshMenu(bundle.menu);   // synchronous: landing happens at the end of init
    } else {
      // Menu arrives async: land once it (and the no-sections fallback) is known.
      API.call('menu', 'list', {})
        .then(function (items) { freshMenu(items); goLanding(true); })
        .catch(function () { if (!cachedMenu) { _menuItems = []; rebuildNav(); } goLanding(true); });
    }

    // ── Bot Assistant admin entry ── the bundle carries the resolved RBAC flag;
    // only fall back to the standalone probe when it is absent.
    if (bundle.botAdmin !== undefined) {
      _botAdmin = !!bundle.botAdmin;
      HassCache.set('botAdmin_' + cacheNs, _botAdmin, 3600);
      rebuildNav();
    } else {
      if (HassCache.any('botAdmin_' + cacheNs)) { _botAdmin = true; rebuildNav(); }
      API.call('bot', 'listConfigs', {})
        .then(function () { _botAdmin = true; HassCache.set('botAdmin_' + cacheNs, true, 3600); rebuildNav(); goLanding(false); })
        .catch(function () { HassCache.set('botAdmin_' + cacheNs, false, 3600); });
    }

    // ── Dashboard first-screen data ── hand the bundle's summary + SLA to the
    // dashboard route so it paints WITHOUT firing its own two calls. Consumed
    // once (see partial_dashboard.html); later visits fetch live data.
    if (bundle.dashboardSummary || bundle.dashboardSla || bundle.dashboardCharts) {
      window._hassInitDash = {
        summary: bundle.dashboardSummary || null,
        sla:     bundle.dashboardSla     || null,
        charts:  bundle.dashboardCharts  || null,
      };
    }

    // Cache the lightweight profile/identity for fast re-paint + reference
    // (short TTL — it is identity, not transactional data).
    HassCache.set('profile_' + cacheNs, {
      userId: me.userId, role: me.role, first_name: me.first_name,
      last_name: me.last_name, email: me.email, country: me.country,
    }, 600);

    // Logout.
    document.getElementById('logoutBtn').onclick = function () {
      try { HassCache.clearAll(); } catch (e) {}
      try { if (window.HassStore) HassStore.clearAll(); } catch (e) {}
      API.logout().catch(function () {}).finally(function () {
        loadLoginPage();
      });
    };

    // Floating assistant widget, only for logged-in staff (auth guard passed).
    if (typeof ChatWidget !== 'undefined') ChatWidget.mount(me);

    // Land on the first section this role can open. When the menu came from the
    // init bundle it is already authoritative, so pass that; otherwise the async
    // freshMenu()/catch above drives the landing once the menu resolves.
    goLanding(menuIsFinal);

    // ── Predictive prefetch ── warm the SWR cache for the few most likely next
    // pages so the first navigation paints instantly. The params MUST match each
    // page's own first load() so the cache key lines up. Prefetch is low priority:
    // it never starts while a user-initiated call is in flight (see js_perf).
    try {
      if (window.Prefetch) {
        Prefetch.register('customers', [{ service: 'customers', action: 'list',         params: { limit: 20 } }]);
        Prefetch.register('orders',    [{ service: 'orders',    action: 'list',         params: { limit: 50 } }]);
        Prefetch.register('tickets',   [{ service: 'tickets',   action: 'list',         params: { limit: 50 } }]);
        Prefetch.register('invoices',  [{ service: 'invoices',  action: 'list',         params: { limit: 50 } }]);
        Prefetch.register('catalog',   [{ service: 'catalog',   action: 'listProducts', params: { limit: 50 } }]);
        // Only warm pages this role can actually open (and skip the one we landed on).
        var likely = ['customers', 'orders', 'tickets', 'invoices', 'catalog'].filter(function (r) {
          return r !== Router.current() && _menuItems.some(function (i) { return i.id === r; });
        });
        Prefetch.warmLikely(likely);
      }
    } catch (e) {}

    // ── Perf marker: login-click → dashboard-usable ──
    // Login.html stashes the click time; by now the first screen has painted
    // (from the bundle when present). Console-only; no UI impact.
    try {
      var t0 = parseInt(sessionStorage.getItem('hass_login_t0'), 10);
      if (t0) {
        sessionStorage.removeItem('hass_login_t0');
        console.log('[hass:perf] login → dashboard-usable: ' + (Date.now() - t0) +
                    'ms (init bundle: ' + (me.bundle ? 'yes' : 'no') + ')');
      }
    } catch (e) {}
  }

  // Merge the static menu with the admin-only botconfig entry, then render.
  function rebuildNav() {
    var items = _menuItems.slice();
    if (_botAdmin && !items.some(function (i) { return i.id === 'botconfig'; })) {
      items.push({ id: 'botconfig', label: 'Bot Assistant', route: 'botconfig', group: 'admin', icon: 'cpu' });
    }
    renderNav(items);
  }

  // The route to open first. Dashboard when the user can see it (its data is
  // gated order.view), else the first visible menu item, else botconfig for a
  // bot-admin-only user, else null (no sections this role can open).
  function landingRoute() {
    var items = _menuItems || [];
    if (items.some(function (i) { return i.id === 'dashboard'; })) return 'dashboard';
    if (items.length) return items[0].id;
    if (_botAdmin) return 'botconfig';
    return null;
  }

  // Navigate to the landing route exactly once. `final` means the menu is now
  // authoritative: if there is still nothing to land on, show a clear empty
  // state instead of leaving the user on the initial spinner. A non-final call
  // with no route is a no-op (a later menu/botAdmin update calls goLanding again).
  function goLanding(final) {
    if (_landed) return;
    var route = landingRoute();
    if (route) {
      _landed = true;
      var navItem = document.querySelector('.nav-item[data-route="' + route + '"]');
      var title   = document.getElementById('pageTitle');
      if (navItem && title && navItem.dataset.label) title.textContent = navItem.dataset.label;
      Router.navigate(route, {});
      return;
    }
    if (final) {
      _landed = true;
      var t = document.getElementById('pageTitle');
      if (t) t.textContent = 'Welcome';
      setHTML('pageContent',
        '<div class="card"><div class="card-body"><div class="empty-state">' +
        '<div style="font-weight:600;margin-bottom:6px">No sections available</div>' +
        '<p style="margin:0">Your account has no permissions assigned yet. ' +
        'Please contact an administrator.</p>' +
        '</div></div></div>');
    }
  }

  // ── Sidebar render (single-open accordion, task-based groups) ──────────
  // Grouping is presentation only. A map in THIS rendering layer assigns each
  // menu item (by id, which equals its route) to a task-based section. The
  // server menu.list contract, the routes, and every required_permission stay
  // untouched. Any item not in the map drops into a default group (More) so a
  // module can never disappear just because it was not mapped.
  //
  // Open/closed state is a single key held in memory for the session (no storage
  // APIs in GAS artifacts). One group is open at a time. Navigation auto-expands
  // the group of the current route (see applyActiveGroup); a manual header click
  // overrides until the next navigation, which re-applies the active-section rule.
  var _openGroup    = null;    // currently expanded accordion group key, or null
  var _navSeeded    = false;   // first paint has seeded the open group
  var _routeToGroup = {};      // route/item id -> group key, rebuilt each render

  // Ordered sections. Overview is a standalone item at the very top (no header).
  // More is the safety-net catch-all at the very bottom (renders only if used).
  var NAV_GROUP_ORDER = ['overview', 'sales', 'customers', 'finance', 'support', 'insights', 'admin', 'more'];
  var NAV_GROUP_META = {
    overview:  { label: 'Overview',  icon: 'home',        standalone: true },
    sales:     { label: 'Sales',     icon: 'package' },
    customers: { label: 'Customers', icon: 'users' },
    finance:   { label: 'Finance',   icon: 'credit-card' },
    support:   { label: 'Support',   icon: 'headphones' },
    insights:  { label: 'Insights',  icon: 'bar-chart-2' },
    admin:     { label: 'Admin',     icon: 'settings' },
    more:      { label: 'More',      icon: 'grid' }
  };
  // Menu item id -> group key, confirmed against menu.list introspection. Keep
  // this as the single source of truth for the sidebar grouping.
  var NAV_ITEM_GROUP = {
    dashboard: 'overview',
    orders: 'sales', pricing: 'sales', catalog: 'sales',
    customers: 'customers', documents: 'customers', signups: 'customers',
    invoices: 'finance', payments: 'finance', approvals: 'finance', approvalsadmin: 'finance',
    tickets: 'support', knowledge: 'support', sla: 'support',
    reports: 'insights',
    users: 'admin', rbac: 'admin', branding: 'admin', audit: 'admin', botconfig: 'admin', config: 'admin'
  };
  var NAV_FALLBACK_GROUP = 'more';   // any unmapped item lands here, never dropped

  function navGroupOf(itemId) {
    return NAV_ITEM_GROUP[itemId] || NAV_FALLBACK_GROUP;
  }
  function isAccordionGroup(key) {
    return !!(key && NAV_GROUP_META[key] && !NAV_GROUP_META[key].standalone);
  }

  // ── Inline SVG icon set (Feather/Lucide 24x24 stroke) keyed by the menu
  // item's icon name. One consistent set so every row shows icon + label
  // (recognition over recall). Unknown names fall back to a neutral dot. ──
  var NAV_ICONS = {
    home:          '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
    users:         '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    package:       '<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
    headphones:    '<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>',
    'file-text':   '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>',
    'credit-card': '<rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>',

    grid:          '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
    tag:           '<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>',

    'bar-chart-2': '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
    clock:         '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
    shield:        '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
    lock:          '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
    user:          '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
    settings:      '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
    image:         '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
    cpu:           '<rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>',
    _default:      '<circle cx="12" cy="12" r="9"/>'
  };
  function navSvg(name) {
    var inner = NAV_ICONS[name] || NAV_ICONS._default;
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
           'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + inner + '</svg>';
  }
  function navIcon(name) { return '<span class="nav-ico">' + navSvg(name) + '</span>'; }

  // Build the grouped sidebar from the (already permission-filtered) menu items.
  // A group renders only if it has at least one visible item, so a limited role
  // never sees a header that opens into nothing. The active item keeps its gold
  // highlight on every (re)render so wayfinding survives a menu/botconfig refresh.
  function renderNav(items) {
    var nav = document.getElementById('sidebarNav');
    if (!nav) return;

    // Bucket items into task-based groups, preserving menu order within each.
    var groups = {};
    _routeToGroup = {};
    items.forEach(function (item) {
      var g = navGroupOf(item.id);
      (groups[g] || (groups[g] = [])).push(item);
      _routeToGroup[item.id] = g;
    });

    // First paint only: open the active route's group (when it is an accordion
    // group). Later re-renders preserve whatever is currently open, so a manual
    // override is never clobbered by a menu refresh or the botconfig probe.
    if (!_navSeeded) {
      _navSeeded = true;
      var ag = _routeToGroup[Router.current()];
      _openGroup = isAccordionGroup(ag) ? ag : null;
    }

    var current = Router.current();
    var chevron =
      '<svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
      'stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 6 15 12 9 18"/></svg>';

    function itemBtn(item, extraClass) {
      var isActive = (item.id === current);
      var cls = 'nav-item' + (extraClass ? ' ' + extraClass : '') + (isActive ? ' active' : '');
      return '<button type="button" class="' + cls + '" ' +
             'data-route="' + esc(item.id) + '" data-label="' + esc(item.label) + '" ' +
             'data-search="' + esc(String(item.label).toLowerCase()) + '" ' +
             'title="' + esc(item.label) + '" aria-label="' + esc(item.label) + '"' +
             (isActive ? ' aria-current="page"' : '') + '>' +
             navIcon(item.icon) + '<span class="nav-label">' + esc(item.label) + '</span></button>';
    }

    var html = '';

    // Optional search / jump box (additive; the grouping works without it).
    html += '<div class="nav-search">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
            'stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
            '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
            '<input id="navSearchInput" type="text" autocomplete="off" spellcheck="false" ' +
            'placeholder="Search menu" aria-label="Search menu"></div>';

    NAV_GROUP_ORDER.forEach(function (g) {
      var list = groups[g];
      if (!list || !list.length) return;          // hide empty / unused groups
      var meta = NAV_GROUP_META[g] || { label: g, icon: '' };

      // Overview: render its item(s) directly at the top, no accordion header.
      if (meta.standalone) {
        list.forEach(function (item) { html += itemBtn(item, 'nav-top'); });
        return;
      }

      var open    = (g === _openGroup);
      var groupId = 'navgrp-' + g;
      html += '<div class="nav-group' + (open ? ' open' : '') + '" data-group="' + g + '">';
      html += '<button type="button" class="nav-group-label" data-group="' + g + '" ' +
              'aria-expanded="' + open + '" aria-controls="' + groupId + '">' +
              '<span class="nav-grp-ico">' + navSvg(meta.icon) + '</span>' +
              '<span class="nav-grp-label">' + esc(meta.label) + '</span>' + chevron + '</button>';
      html += '<div class="nav-group-items" id="' + groupId + '">';
      list.forEach(function (item) { html += itemBtn(item); });
      html += '</div></div>';
    });

    nav.innerHTML = html;

    // Group header: single-open accordion. Clicking a header opens it and
    // collapses the others; clicking the open one closes it. This manual choice
    // holds until the next navigation re-applies the active-section rule.
    nav.querySelectorAll('.nav-group-label').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var g = btn.dataset.group;
        _openGroup = (_openGroup === g) ? null : g;
        syncGroupDom();
      });
    });

    // Nav items navigate; on mobile, selecting one closes the off-canvas drawer
    // and clears any active search. Hover/focus warms that page's data (low
    // priority) so the click resolves from cache. Prefetch never delays a click.
    nav.querySelectorAll('.nav-item').forEach(function (el) {
      el.addEventListener('click', function () {
        document.getElementById('pageTitle').textContent = el.dataset.label;
        Router.navigate(el.dataset.route, {});
        clearNavSearch();
        closeDrawer();
      });
      var warm = function () { try { if (window.Prefetch) Prefetch.warm(el.dataset.route); } catch (e) {} };
      el.addEventListener('mouseenter', warm);
      el.addEventListener('focus', warm);
    });

    wireNavSearch(nav);
  }

  // Reflect _openGroup in the DOM without a full re-render (used by the header
  // toggle and by navigation-driven active-section expansion).
  function syncGroupDom() {
    var nav = document.getElementById('sidebarNav');
    if (!nav) return;
    nav.querySelectorAll('.nav-group').forEach(function (groupEl) {
      var open = (groupEl.getAttribute('data-group') === _openGroup);
      groupEl.classList.toggle('open', open);
      var btn = groupEl.querySelector('.nav-group-label');
      if (btn) btn.setAttribute('aria-expanded', String(open));
    });
  }

  // Active-section rule: expand the group that owns `route` and collapse the
  // rest. A standalone route (Overview) collapses every accordion group; a route
  // that is not a sidebar item (e.g. a drill-down such as contacts) leaves the
  // current state untouched, which is the calmest fit.
  function applyActiveGroup(route) {
    if (!Object.prototype.hasOwnProperty.call(_routeToGroup, route)) return;
    var g = _routeToGroup[route];
    _openGroup = isAccordionGroup(g) ? g : null;
    syncGroupDom();
  }

  // Re-apply the active-section rule on every navigation. Router fires hass:route
  // for sidebar clicks, the initial landing, and drill-downs alike, so this keeps
  // the sidebar reflecting where the user is and resets a manual override back to
  // the active section on the next navigation.
  window.addEventListener('hass:route', function (e) {
    var route = e && e.detail && e.detail.route;
    if (route) applyActiveGroup(route);
  });

  // Drill-down helper kept for callers (js_app goRoute): reveal the group that
  // owns a route. Now single-open via the shared active-section rule.
  window._hassOpenNavGroup = function (route) { applyActiveGroup(route); };

  // ── Optional search / jump (Fix 5) ──────────────────────────────────────
  // Filters the visible, permitted items by label. While searching, matching
  // groups force open so hits are visible and groups with no hit are hidden; an
  // empty box restores the single-open accordion. Purely additive: the
  // reorganisation works fully without it, and it never widens permissions
  // (it only filters items the server already returned for this user).
  function clearNavSearch() {
    var nav = document.getElementById('sidebarNav');
    if (!nav) return;
    var input = nav.querySelector('#navSearchInput');
    if (input) input.value = '';
    nav.classList.remove('nav-filtering');
    nav.querySelectorAll('.nav-hidden').forEach(function (el) { el.classList.remove('nav-hidden'); });
    var none = nav.querySelector('.nav-search-empty');
    if (none) none.remove();
  }
  function wireNavSearch(nav) {
    var input = nav.querySelector('#navSearchInput');
    if (!input) return;
    input.addEventListener('input', function () {
      var q = String(input.value || '').trim().toLowerCase();
      if (!q) { clearNavSearch(); syncGroupDom(); return; }
      nav.classList.add('nav-filtering');
      var anyHit = false;
      nav.querySelectorAll('.nav-item').forEach(function (el) {
        var hit = (el.getAttribute('data-search') || '').indexOf(q) !== -1;
        el.classList.toggle('nav-hidden', !hit);
        if (hit) anyHit = true;
      });
      nav.querySelectorAll('.nav-group').forEach(function (groupEl) {
        var shown = groupEl.querySelectorAll('.nav-item:not(.nav-hidden)').length;
        groupEl.classList.toggle('nav-hidden', shown === 0);
      });
      var none = nav.querySelector('.nav-search-empty');
      if (!anyHit && !none) {
        none = document.createElement('div');
        none.className = 'nav-search-empty';
        none.textContent = 'No menu items match.';
        nav.appendChild(none);
      } else if (anyHit && none) { none.remove(); }
    });
    // Esc clears the filter and restores the single-open accordion.
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { clearNavSearch(); syncGroupDom(); }
    });
  }
})();
</script>
