<? var _stoken = (typeof sessionToken !== 'undefined' && sessionToken) ? sessionToken : ''; ?>
<script>
(function () {
  'use strict';

  // Token injected server-side when this page is rendered via
  // getStaffDashboardPage(). Falls back to a persisted token if present.
  var SESSION_TOKEN = '<?= _stoken ?>';

  // GAS-safe page swap: window.location is blocked inside the sandbox iframe,
  // so fetch the login HTML and replace the document instead.
  function loadLoginPage() {
    google.script.run
      .withSuccessHandler(function (html) {
        document.open(); document.write(html); document.close();
      })
      .withFailureHandler(function () {
        document.open();
        document.write('<!DOCTYPE html><html><body style="font-family:sans-serif;'
          + 'padding:40px"><p>Session ended. Please reload.</p></body></html>');
        document.close();
      })
      .getLoginPage();
  }
  window._hassLoadLoginPage = loadLoginPage;

  // ── Auth guard ─────────────────────────────────────────────────
  if (SESSION_TOKEN) {
    API.setToken(SESSION_TOKEN);
    try { sessionStorage.setItem('hass_token', SESSION_TOKEN); } catch (e) {}
  }
  if (!API.getToken() && !API.loadPersistedToken()) {
    loadLoginPage();
    return;
  }

  // ── Verify session ─────────────────────────────────────────────
  // A transient blip must NOT falsely log the user out. Give the guard call
  // 3 retries (transient failures only) and only redirect to login on a real
  // session loss (NO_SESSION / SESSION_EXPIRED). Any other failure after
  // retries are exhausted shows a "Connection problem" retry state instead.
  function verifySession() {
    var guard = document.getElementById('authGuard');
    if (guard) guard.innerHTML = '<span class="spinner dark"></span>';

    API.call('auth', 'me', {}, { retries: 3 })
      .then(function (me) {
        document.getElementById('authGuard').style.display = 'none';
        document.getElementById('appShell').style.display  = 'flex';
        document.getElementById('userLabel').textContent   =
          me.first_name + ' ' + me.last_name + ' (' + me.role + ')';
        initApp(me);
      })
      .catch(function (err) {
        if (err && (err.code === 'NO_SESSION' || err.code === 'SESSION_EXPIRED')) {
          loadLoginPage();
        } else {
          showConnectionError(err);
        }
      });
  }

  function showConnectionError(err) {
    var guard = document.getElementById('authGuard');
    if (!guard) return;
    var msg = (err && err.message) ? err.message : 'Could not reach the server.';
    guard.innerHTML =
      '<div class="card" style="max-width:420px;text-align:center">' +
        '<div class="card-body">' +
          '<div style="font-size:16px;font-weight:600;margin-bottom:8px">Connection problem</div>' +
          '<p style="color:#6b7280;margin-bottom:16px">' +
            String(msg).replace(/[<>&]/g, '') + '</p>' +
          '<button class="btn btn-primary" id="connRetryBtn">Retry</button>' +
        '</div>' +
      '</div>';
    var btn = document.getElementById('connRetryBtn');
    if (btn) btn.onclick = verifySession;
  }

  verifySession();

  // ── App init ───────────────────────────────────────────────────
  var _menuItems   = [];   // cached menu.list result
  var _botAdmin    = false; // user may manage bot configs (probed server-side)

  function initApp(me) {
    // Pull live branding (non-blocking): failure falls back to CSS defaults.
    API.call('branding', 'get', { scope_code: 'GLOBAL' })
      .then(function (b) { applyBranding(b); })
      .catch(function () {});

    // Set up router.
    Router.init(document.getElementById('pageContent'), '.nav-item');

    // Build sidebar from menu API.
    API.call('menu', 'list', {})
      .then(function (items) { _menuItems = items || []; rebuildNav(); })
      .catch(function () { _menuItems = []; rebuildNav(); });

    // The Bot Assistant config page has no menu_items row (menu is server-driven
    // and out of scope). Probe the real RBAC gate: if listConfigs is permitted
    // (SUPER_ADMIN / config.edit), inject a nav entry into the Admin group.
    API.call('bot', 'listConfigs', {})
      .then(function () { _botAdmin = true; rebuildNav(); })
      .catch(function () { /* non-admins simply never see the page */ });

    // Logout.
    document.getElementById('logoutBtn').onclick = function () {
      API.logout().catch(function () {}).finally(function () {
        loadLoginPage();
      });
    };

    // Floating assistant widget — only for logged-in staff (auth guard passed).
    if (typeof ChatWidget !== 'undefined') ChatWidget.mount(me);

    // Navigate to default page.
    Router.navigate('dashboard', {});
  }

  // Merge the static menu with the admin-only botconfig entry, then render.
  function rebuildNav() {
    var items = _menuItems.slice();
    if (_botAdmin && !items.some(function (i) { return i.id === 'botconfig'; })) {
      items.push({ id: 'botconfig', label: 'Bot Assistant', route: 'botconfig', group: 'admin' });
    }
    renderNav(items);
  }

  // ── Sidebar render (collapsible accordion groups) ───────────────
  // Open/closed state is held in-memory for the session (NO storage APIs in
  // GAS artifacts). On the very first render we open only the group that
  // contains the active route; the user's toggles persist across re-renders
  // (menu reload, botconfig probe) and across page navigations.
  var _openGroups   = null;   // { groupKey: bool }  — null until first render
  var _routeToGroup = {};     // route id → group key, rebuilt each render

  function renderNav(items) {
    var nav = document.getElementById('sidebarNav');
    var groups = {};
    _routeToGroup = {};
    items.forEach(function (item) {
      if (!groups[item.group]) groups[item.group] = [];
      groups[item.group].push(item);
      _routeToGroup[item.id] = item.group;
    });
    var groupLabels = { main:'Main', finance:'Finance', ops:'Operations',
                        catalog:'Catalog', support:'Support', reports:'Reports', admin:'Admin' };

    // First render: initialise open state — only the active route's group opens.
    if (_openGroups === null) {
      _openGroups = {};
      var activeGroup = _routeToGroup[Router.current()] || 'main';
      Object.keys(groupLabels).forEach(function (g) { _openGroups[g] = (g === activeGroup); });
    }

    var chevron =
      '<svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
      'stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';

    var html = '';
    Object.keys(groupLabels).forEach(function (g) {
      if (!groups[g] || !groups[g].length) return;
      var open = !!_openGroups[g];
      html += '<div class="nav-group' + (open ? ' open' : '') + '" data-group="' + g + '">';
      html += '<button type="button" class="nav-group-label" data-group="' + g + '" ' +
              'aria-expanded="' + open + '"><span>' + groupLabels[g] + '</span>' + chevron + '</button>';
      html += '<div class="nav-group-items">';
      groups[g].forEach(function (item) {
        html += '<div class="nav-item" data-route="' + item.id + '">' +
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>' +
                '<span>' + item.label + '</span></div>';
      });
      html += '</div></div>';
    });
    nav.innerHTML = html;

    // Group header toggles only its own group (active group starts open).
    nav.querySelectorAll('.nav-group-label').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var g     = btn.dataset.group;
        var group = btn.closest('.nav-group');
        var open  = !group.classList.contains('open');
        group.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', String(open));
        _openGroups[g] = open;
      });
    });

    // Nav items navigate; their group is already open (you clicked inside it).
    nav.querySelectorAll('.nav-item').forEach(function (el) {
      el.addEventListener('click', function () {
        document.getElementById('pageTitle').textContent = el.querySelector('span').textContent;
        Router.navigate(el.dataset.route, {});
      });
    });
  }

  // Open (and reveal) the group that owns a route — used by drill-down
  // navigation (e.g. dashboard stat cards) so jumping into a collapsed
  // group expands it and keeps the active item visible.
  window._hassOpenNavGroup = function (route) {
    var g = _routeToGroup[route];
    if (!g || !_openGroups) return;
    _openGroups[g] = true;
    var groupEl = document.querySelector('.nav-group[data-group="' + g + '"]');
    if (groupEl) {
      groupEl.classList.add('open');
      var btn = groupEl.querySelector('.nav-group-label');
      if (btn) btn.setAttribute('aria-expanded', 'true');
    }
  };
})();
</script>
</body>
