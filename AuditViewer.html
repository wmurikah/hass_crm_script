<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<title>Audit Log - Hass Petroleum</title>
<style>
  :root { --navy:#1A237E; --orange:#FF6F00; --slate:#475569; --line:#e2e8f0; --bg:#f1f5f9; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:#0f172a; }
  header { background:var(--navy); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:16px; }
  header h1 { margin:0; font-size:18px; font-weight:600; letter-spacing:0.4px; }
  header .sub { font-size:12px; opacity:0.85; }
  main { padding:18px 24px; }
  .filters { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; background:#fff; padding:14px; border:1px solid var(--line); border-radius:8px; margin-bottom:14px; }
  .filters label { display:block; font-size:11px; font-weight:600; color:var(--slate); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .filters input, .filters select { width:100%; padding:7px 9px; font-size:13px; border:1px solid var(--line); border-radius:6px; }
  .filters .actions { display:flex; align-items:flex-end; gap:8px; }
  button { background:var(--navy); color:#fff; border:none; padding:8px 14px; font-size:13px; font-weight:600; border-radius:6px; cursor:pointer; }
  button.secondary { background:#fff; color:var(--navy); border:1px solid var(--navy); }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  .summary { display:flex; align-items:center; justify-content:space-between; margin:8px 4px 12px; font-size:13px; color:var(--slate); }
  .pager { display:flex; gap:6px; align-items:center; }
  .pager button { padding:5px 10px; font-size:12px; }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:8px; overflow:hidden; font-size:12.5px; }
  th, td { padding:9px 10px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top; }
  th { background:#f8fafc; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--slate); }
  tr:last-child td { border-bottom:none; }
  .pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; background:#e0e7ff; color:var(--navy); }
  .pill.create { background:#dcfce7; color:#166534; }
  .pill.update { background:#dbeafe; color:#1e40af; }
  .pill.delete { background:#fee2e2; color:#991b1b; }
  .pill.deny   { background:#fef3c7; color:#92400e; }
  .pill.login  { background:#ede9fe; color:#5b21b6; }
  .json { font-family:Consolas,Menlo,monospace; font-size:11px; color:#334155; max-width:380px; white-space:pre-wrap; word-break:break-word; }
  .empty { text-align:center; padding:40px; color:var(--slate); }
  .err { background:#fee2e2; color:#991b1b; padding:10px 14px; border-radius:6px; margin:10px 0; }
</style>
</head>
<body>
<header>
  <h1>Audit Log</h1>
  <span class="sub">Read-only view of every business-significant action</span>
</header>
<main>
  <div class="filters">
    <div><label>Entity type</label><input id="f_entity" placeholder="e.g. Order, Customer"></div>
    <div><label>Action</label><input id="f_action" placeholder="e.g. CREATE, APPROVE"></div>
    <div><label>Actor email</label><input id="f_email" placeholder="user@example.com"></div>
    <div><label>Country</label><input id="f_country" placeholder="KE"></div>
    <div><label>From (ISO date)</label><input id="f_from" type="date"></div>
    <div><label>To (ISO date)</label><input id="f_to" type="date"></div>
    <div class="actions">
      <button id="btn_search">Search</button>
      <button id="btn_clear" class="secondary">Clear</button>
    </div>
  </div>

  <div id="errBox"></div>
  <div class="summary">
    <div id="summaryText">Loading&hellip;</div>
    <div class="pager">
      <button id="btn_prev" class="secondary">&laquo; Prev</button>
      <span id="pageLabel">Page 1</span>
      <button id="btn_next" class="secondary">Next &raquo;</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:160px">When (UTC)</th>
        <th>Entity</th>
        <th>Action</th>
        <th>Actor</th>
        <th>Country</th>
        <th>Changes / Metadata</th>
      </tr>
    </thead>
    <tbody id="tbody"><tr><td colspan="6" class="empty">Loading audit rows&hellip;</td></tr></tbody>
  </table>
</main>

<script>
  var SESSION = <?!= SESSION ?>;
  var state = { page: 1, pageSize: 100 };

  function $(id) { return document.getElementById(id); }

  function actionPill(action) {
    var a = String(action || '').toUpperCase();
    var cls = '';
    if (a === 'CREATE') cls = 'create';
    else if (a === 'UPDATE') cls = 'update';
    else if (a === 'DELETE') cls = 'delete';
    else if (a === 'PERMISSION_DENIED') cls = 'deny';
    else if (a === 'LOGIN' || a === 'LOGOUT' || a === 'LOGIN_FAILED') cls = 'login';
    return '<span class="pill ' + cls + '">' + a + '</span>';
  }

  function fmtJson(o) {
    if (!o || (typeof o === 'object' && Object.keys(o).length === 0)) return '<span style="color:#94a3b8">&mdash;</span>';
    var s;
    try { s = JSON.stringify(o, null, 2); } catch(e) { s = String(o); }
    return '<div class="json">' + s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(rows, total) {
    var tbody = $('tbody');
    if (!rows || rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No audit rows match these filters.</td></tr>';
    } else {
      tbody.innerHTML = rows.map(function(r) {
        var combined = {};
        if (r.changes  && Object.keys(r.changes).length)  combined.changes  = r.changes;
        if (r.metadata && Object.keys(r.metadata).length) combined.metadata = r.metadata;
        return '<tr>' +
          '<td>' + escapeHtml(r.created_at) + '</td>' +
          '<td><strong>' + escapeHtml(r.entity_type) + '</strong><br><span style="color:#64748b">' + escapeHtml(r.entity_id) + '</span></td>' +
          '<td>' + actionPill(r.action) + '</td>' +
          '<td>' + escapeHtml(r.actor_email || r.actor_id || r.actor_type) +
            (r.actor_ip ? '<br><span style="color:#94a3b8;font-size:11px">' + escapeHtml(r.actor_ip) + '</span>' : '') +
          '</td>' +
          '<td>' + escapeHtml(r.country_code) + '</td>' +
          '<td>' + fmtJson(combined) + '</td>' +
        '</tr>';
      }).join('');
    }
    var start = (state.page - 1) * state.pageSize + 1;
    var end   = Math.min(state.page * state.pageSize, total);
    $('summaryText').textContent = total === 0
      ? 'No rows.'
      : 'Showing ' + start + '–' + end + ' of ' + total;
    $('pageLabel').textContent = 'Page ' + state.page;
    $('btn_prev').disabled = state.page <= 1;
    $('btn_next').disabled = end >= total;
  }

  function showError(msg) {
    $('errBox').innerHTML = msg ? '<div class="err">' + escapeHtml(msg) + '</div>' : '';
  }

  function load() {
    showError('');
    $('summaryText').textContent = 'Loading…';
    var filters = {
      entity_type:  $('f_entity').value.trim(),
      action:       $('f_action').value.trim().toUpperCase(),
      actor_email:  $('f_email').value.trim(),
      country_code: $('f_country').value.trim().toUpperCase(),
      from:         $('f_from').value ? $('f_from').value + 'T00:00:00.000Z' : '',
      to:           $('f_to').value   ? $('f_to').value   + 'T23:59:59.999Z' : '',
      page:         state.page,
      pageSize:     state.pageSize,
    };
    var payload = {
      service: 'audit',
      action:  'list',
      token:   SESSION.token,
      filters: filters,
    };
    google.script.run
      .withSuccessHandler(function(resp) {
        if (!resp || !resp.success) { showError((resp && resp.error) || 'Unknown error'); render([], 0); return; }
        render(resp.rows, resp.total);
      })
      .withFailureHandler(function(err) { showError(err && err.message ? err.message : 'Request failed'); render([], 0); })
      .processRequest(payload);
  }

  $('btn_search').onclick = function() { state.page = 1; load(); };
  $('btn_clear').onclick  = function() {
    ['f_entity','f_action','f_email','f_country','f_from','f_to'].forEach(function(id) { $(id).value = ''; });
    state.page = 1; load();
  };
  $('btn_prev').onclick = function() { if (state.page > 1) { state.page--; load(); } };
  $('btn_next').onclick = function() { state.page++; load(); };

  load();
</script>
</body>
</html>
