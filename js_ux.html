<script>
// -----------------------------------------------------------------
//  js_ux.html  -  Hass CMS responsiveness + disclosure layer (Stage 7)
//
//  A transparent feedback layer on top of the EXISTING API.call channel
//  (which js_perf already wrapped for caching/optimistic writes). It does
//  not change what any call returns, what any handler does, who may call
//  it, or any business result. It only makes interactions feel instant and
//  safe against impatient multi-clicking, and provides the reusable
//  in-module disclosure + skeleton primitives.
//
//  Built on the one request path so the whole app benefits:
//    - Instant pending state on the control that fired a call.
//    - Disable while pending; always re-enable on success or error.
//    - Coalesce identical in-flight requests (key = action + params).
//    - Debounce a burst of identical repeats into one effective call.
//    - Idempotency key on writes (added optional param) so a double-clicked
//      submit/approve/generate cannot create a duplicate. Additive: handlers
//      that ignore the key are unaffected.
//    - A subtle global progress bar while any call is in flight, plus a
//      "Fetching"/"Working" chip for operations that exceed a short threshold.
//
//  Loads AFTER js_perf so API.call here is the perf-wrapped call; SWR /
//  prefetch / batch use the original js_api call and are intentionally not
//  re-wrapped (they are background and meant to be invisible).
// -----------------------------------------------------------------
(function () {
  'use strict';

  if (typeof API === 'undefined' || !API || typeof API.call !== 'function') return;

  // ---- tunables ----------------------------------------------------------
  var PENDING_FRESH_MS = 1200;   // a click "owns" calls fired within this window
  var GRACE_MS         = 450;    // identical repeat within this of settle = one call
  var IDEM_REUSE_MS    = 8000;   // reuse one idempotency key for identical writes
  var SLOW_MS          = 600;    // a call in flight longer than this shows the chip

  // ---- write detection (canonical, from js_api) --------------------------
  var isWrite = (typeof API.isWriteAction === 'function')
    ? API.isWriteAction
    : function (a) { return /^(create|update|delete|submit|approve|reject|assign|cancel|dispatch|upload|set|generate|upsert|deactivate|initiate|save)/.test(String(a || '')); };

  // Stable request signature, reusing the perf layer's (excludes sessionToken).
  function sigOf(service, action, params) {
    if (typeof API._sig === 'function') return API._sig(service, action, params);
    var p = {};
    Object.keys(params || {}).forEach(function (k) { if (k !== 'sessionToken' && k !== 'idempotencyKey') p[k] = params[k]; });
    return service + '.' + action + '|' + JSON.stringify(p);
  }

  function uid() {
    return (Date.now().toString(36) + Math.random().toString(36).slice(2, 10) +
            Math.random().toString(36).slice(2, 6));
  }

  // ---- pending control feedback -----------------------------------------
  // The control that triggered the current call gets an instant pending state
  // (disabled + inline spinner) and is released the moment the call settles.
  function setPending(el) {
    if (!el || el.__uxPending) return;
    el.__uxPending = true;
    el.setAttribute('aria-busy', 'true');
    var isBtn = (el.tagName === 'BUTTON' || el.classList.contains('btn'));
    if (isBtn) {
      el.__uxHTML = el.innerHTML;
      // Freeze the width so swapping the label for a spinner does not reflow.
      var w = el.offsetWidth;
      if (w) el.style.minWidth = w + 'px';
      el.classList.add('is-pending');
      el.innerHTML = '<span class="ux-btn-spin" aria-hidden="true"></span>';
    } else {
      el.classList.add('is-pending');
    }
    try { el.disabled = true; } catch (e) {}
  }
  function clearPending(el) {
    if (!el || !el.__uxPending) return;
    el.__uxPending = false;
    el.removeAttribute('aria-busy');
    el.classList.remove('is-pending');
    if ('__uxHTML' in el) { el.innerHTML = el.__uxHTML; el.style.minWidth = ''; delete el.__uxHTML; }
    try { el.disabled = false; } catch (e) {}
  }

  // Capture the last user-clicked control so a call fired from its handler can
  // adopt it. Capture phase + a freshness window keeps the correlation tight
  // without each call site passing its button in.
  var _cand = null;
  document.addEventListener('click', function (e) {
    var t = e.target && e.target.closest && e.target.closest('button, .btn, [role="button"], [data-ux-pending]');
    if (t && !t.disabled && t.getAttribute('data-ux-skip') === null) _cand = { el: t, at: Date.now() };
  }, true);
  function takeCandidate() {
    if (_cand && (Date.now() - _cand.at) < PENDING_FRESH_MS && _cand.el && _cand.el.isConnected) {
      var el = _cand.el; _cand = null; return el;
    }
    return null;
  }

  // ---- global indicator: top progress bar + slow-op chip -----------------
  var _bar = null, _chip = null, _chipLabel = null;
  function ensureUI() {
    if (_bar) return;
    _bar = document.createElement('div');
    _bar.className = 'ux-progress';
    _bar.setAttribute('aria-hidden', 'true');
    _bar.innerHTML = '<div class="ux-progress-fill"></div>';
    _chip = document.createElement('div');
    _chip.className = 'ux-chip';
    _chip.setAttribute('role', 'status');
    _chip.setAttribute('aria-live', 'polite');
    _chip.innerHTML = '<span class="ux-chip-spin" aria-hidden="true"></span><span class="ux-chip-txt">Working</span>';
    _chipLabel = _chip.querySelector('.ux-chip-txt');
    var mount = function () { document.body.appendChild(_bar); document.body.appendChild(_chip); };
    if (document.body) mount(); else document.addEventListener('DOMContentLoaded', mount);
  }
  function refreshIndicator() {
    ensureUI();
    if (_active > 0) _bar.classList.add('on'); else { _bar.classList.remove('on'); _chip.classList.remove('on'); }
  }
  function showChip(label) {
    ensureUI();
    if (_active <= 0) return;
    if (_chipLabel) _chipLabel.textContent = label || 'Working';
    _chip.classList.add('on');
  }

  // ---- the wrapper: coalesce + debounce + idempotency + indicator --------
  var _orig   = API.call;   // the perf-wrapped call
  var _calls  = {};         // sig -> { state, at, controls[], promise, value, error, key }
  var _idem   = {};         // sig -> { id, at }
  var _active = 0;          // number of fired calls currently in flight

  function idemKeyFor(sig) {
    var rec = _idem[sig], now = Date.now();
    if (rec && (now - rec.at) < IDEM_REUSE_MS) return rec.id;   // window not slid: a genuine later repeat gets a new key
    var id = uid();
    _idem[sig] = { id: id, at: now };
    return id;
  }
  function attachControl(entry, el) {
    if (!el || entry.controls.indexOf(el) !== -1) return;
    entry.controls.push(el);
    setPending(el);
  }
  function finish(entry, slowT) {
    if (slowT) clearTimeout(slowT);
    entry.controls.forEach(clearPending);
    entry.controls = [];
    _active = Math.max(0, _active - 1);
    refreshIndicator();
    var key = entry.key;
    setTimeout(function () {
      var e = _calls[key];
      if (e && e.state === 'settled' && (Date.now() - e.at) >= GRACE_MS) delete _calls[key];
    }, GRACE_MS + 20);
  }

  API.call = function (service, action, params, opts) {
    params = params || {};
    var sig     = sigOf(service, action, params);
    var control = takeCandidate();
    var entry   = _calls[sig];
    var now     = Date.now();

    // Coalesce: an identical request is already in flight. Attach this caller's
    // control to it and hand back the SAME promise instead of firing again.
    if (entry && entry.state === 'pending') {
      if (control) attachControl(entry, control);
      return entry.promise;
    }
    // Debounce: an identical request settled a moment ago. A burst of repeats
    // resolves to that one effective call rather than re-hitting the server.
    if (entry && entry.state === 'settled' && (now - entry.at) < GRACE_MS) {
      return entry.error ? Promise.reject(entry.error) : Promise.resolve(entry.value);
    }

    // Fresh request. Writes carry an idempotency key (additive optional param)
    // so the server can dedupe a double-fire that slips past coalescing.
    var write = isWrite(action);
    var sendParams = params;
    if (write) sendParams = Object.assign({}, params, { idempotencyKey: idemKeyFor(sig) });

    entry = { state: 'pending', at: now, controls: [], promise: null, key: sig };
    _calls[sig] = entry;
    if (control) attachControl(entry, control);

    _active++;
    refreshIndicator();
    var slowT = setTimeout(function () { showChip(write ? 'Working' : 'Fetching'); }, SLOW_MS);

    var base = _orig.call(API, service, action, sendParams, opts);
    entry.promise = base.then(function (val) {
      entry.state = 'settled'; entry.at = Date.now(); entry.value = val;
      finish(entry, slowT);
      return val;
    }, function (err) {
      entry.state = 'settled'; entry.at = Date.now(); entry.error = err;
      finish(entry, slowT);
      throw err;
    });
    return entry.promise;
  };

  // =======================================================================
  //  UX: public toolkit (pending helper, skeletons, disclosure, debounce)
  // =======================================================================
  var UX = {};

  // Explicit pending binding for call sites that want precise control (e.g. a
  // control that is not the click target). Returns a release function.
  UX.pending = function (el) {
    setPending(el);
    return function () { clearPending(el); };
  };

  // Trailing debounce for noisy inputs (search-as-you-type, etc.).
  UX.debounce = function (fn, ms) {
    var t = null;
    return function () {
      var ctx = this, args = arguments;
      if (t) clearTimeout(t);
      t = setTimeout(function () { t = null; fn.apply(ctx, args); }, ms || 250);
    };
  };

  // ---- skeletons (Part B): layout-matched placeholders -------------------
  // Reserve spinners/label-changes for button actions; content/list/detail
  // loads use these so a screen never sits blank.
  UX.skel = {
    // Rows for a <tbody>. Matches a table's column count and row rhythm.
    tableRows: function (rows, cols) {
      rows = rows || 6; cols = cols || 4;
      var tds = '';
      for (var c = 0; c < cols; c++) tds += '<td><span class="ux-sk ux-sk-text" style="width:' + (40 + ((c * 53) % 50)) + '%"></span></td>';
      var out = '';
      for (var r = 0; r < rows; r++) out += '<tr class="ux-sk-row">' + tds + '</tr>';
      return out;
    },
    // A stack of text lines (detail panels, descriptions).
    lines: function (n) {
      n = n || 4; var out = '<div class="ux-sk-stack">';
      for (var i = 0; i < n; i++) out += '<span class="ux-sk ux-sk-line" style="width:' + (100 - (i % 3) * 18) + '%"></span>';
      return out + '</div>';
    },
    // Card placeholders (grids of stat cards, lists of records).
    cards: function (n) {
      n = n || 3; var out = '<div class="ux-sk-cards">';
      for (var i = 0; i < n; i++) {
        out += '<div class="ux-sk-card"><span class="ux-sk ux-sk-line" style="width:55%"></span>' +
               '<span class="ux-sk ux-sk-line" style="width:80%"></span>' +
               '<span class="ux-sk ux-sk-line" style="width:40%"></span></div>';
      }
      return out + '</div>';
    },
    // A definition-list detail block (label/value pairs).
    detail: function (pairs) {
      pairs = pairs || 6; var out = '<div class="ux-sk-detail">';
      for (var i = 0; i < pairs; i++) {
        out += '<div class="ux-sk-pair"><span class="ux-sk ux-sk-line" style="width:38%"></span>' +
               '<span class="ux-sk ux-sk-line" style="width:64%"></span></div>';
      }
      return out + '</div>';
    }
  };

  // ---- disclosure (Part C): the reusable single-open chunking component ---
  // disclosure(mount, sections, opts) -> controller
  //   sections: [{ id, label, icon?, scent?, badge?, render(bodyEl), gated?,
  //                empty?, lazy? }]
  //     gated:false or empty:true  -> the whole section (its header) is hidden,
  //                                   exactly like an empty sidebar group.
  //     scent: a short hint shown on the header (e.g. "4 of 9 granted") so a
  //            user need not open everything to find something.
  //   opts: { open, single (default true), lazy (default false), onToggle }
  // Returns { open(id), setScent(id, html), setBadge(id, html), section(id),
  //           openIds(), el }.
  var _discSeq = 0;
  UX.disclosure = function (mount, sections, opts) {
    opts = opts || {};
    var single = (opts.single !== false);
    var lazyAll = !!opts.lazy;
    var ns = 'uxd' + (++_discSeq);
    var visible = (sections || []).filter(function (s) { return s && s.gated !== false && s.empty !== true; });

    var chevron = '<svg class="ux-disc-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
      'stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 6 15 12 9 18"/></svg>';

    var html = '<div class="ux-disc">';
    visible.forEach(function (s, i) {
      var open = single ? (opts.open ? s.id === opts.open : i === 0) : (s.open !== false);
      var bid = ns + '-' + i;
      html += '<section class="ux-disc-sec' + (open ? ' open' : '') + '" data-id="' + escAttr(s.id) + '">' +
        '<button type="button" class="ux-disc-head" aria-expanded="' + open + '" aria-controls="' + bid + '">' +
          (s.icon ? '<span class="ux-disc-ico">' + s.icon + '</span>' : '') +
          '<span class="ux-disc-label">' + escHtml(s.label) + '</span>' +
          '<span class="ux-disc-scent" data-scent>' + (s.scent != null ? s.scent : '') + '</span>' +
          (s.badge != null ? '<span class="ux-disc-badge" data-badge>' + s.badge + '</span>' : '') +
          chevron +
        '</button>' +
        '<div class="ux-disc-body" id="' + bid + '"></div>' +
      '</section>';
    });
    html += '</div>';
    mount.innerHTML = html;

    var root  = mount.querySelector('.ux-disc');
    var secEls = {};
    var rendered = {};
    visible.forEach(function (s, i) {
      var el = root.children[i];
      secEls[s.id] = { el: el, spec: s, body: el.querySelector('.ux-disc-body') };
    });

    function renderBody(id) {
      var rec = secEls[id];
      if (!rec || rendered[id]) return;
      rendered[id] = true;
      try { if (rec.spec.render) rec.spec.render(rec.body); } catch (e) {}
    }

    function open(id) {
      Object.keys(secEls).forEach(function (k) {
        var rec = secEls[k];
        var on = single ? (k === id) : (k === id ? !rec.el.classList.contains('open') : rec.el.classList.contains('open'));
        rec.el.classList.toggle('open', on);
        var head = rec.el.querySelector('.ux-disc-head');
        if (head) head.setAttribute('aria-expanded', String(on));
        if (on) renderBody(k);
      });
      if (opts.onToggle) try { opts.onToggle(id); } catch (e) {}
    }

    // Wire headers + render the initially open bodies (or all when not lazy).
    visible.forEach(function (s) {
      var rec = secEls[s.id];
      rec.el.querySelector('.ux-disc-head').addEventListener('click', function () { open(s.id); });
      if (!lazyAll || rec.el.classList.contains('open')) renderBody(s.id);
    });

    return {
      el: root,
      section: function (id) { return secEls[id] && secEls[id].el; },
      body: function (id) { return secEls[id] && secEls[id].body; },
      open: open,
      openIds: function () {
        return Object.keys(secEls).filter(function (k) { return secEls[k].el.classList.contains('open'); });
      },
      setScent: function (id, html) {
        var rec = secEls[id]; if (!rec) return;
        var s = rec.el.querySelector('[data-scent]'); if (s) s.innerHTML = (html == null ? '' : html);
      },
      setBadge: function (id, html) {
        var rec = secEls[id]; if (!rec) return;
        var b = rec.el.querySelector('[data-badge]');
        if (b) b.innerHTML = (html == null ? '' : html);
      }
    };
  };

  // Tiny local escapers (js_app's esc may not be loaded when this evaluates,
  // though in practice it is). Kept self-contained for safety.
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
  function escAttr(s) {
    return escHtml(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  window.UX = UX;
})();
</script>
