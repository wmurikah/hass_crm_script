<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hass Petroleum - Verify MFA</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'DM Sans', sans-serif; background: #0D1442; min-height: 100vh; margin: 0; padding: 60px 16px; }
  .card-mfa {
    max-width: 460px; margin: 0 auto; background: #fff; border-radius: 16px;
    padding: 32px 36px; box-shadow: 0 12px 48px rgba(13,20,66,0.18);
  }
  h1 { color: #1A237E; font-size: 22px; font-weight: 700; margin: 0 0 8px; }
  .lead-text { color: #475569; font-size: 14px; margin-bottom: 22px; }
  .code-input {
    width: 100%; font-size: 26px; letter-spacing: 10px; text-align: center;
    padding: 14px; border-radius: 10px; border: 1.5px solid #cbd5e1;
    font-family: Consolas, Menlo, monospace;
  }
  .code-input:focus { outline: none; border-color: #1A237E; box-shadow: 0 0 0 3px rgba(26,35,126,0.12); }
  .btn-primary {
    background: #1A237E; border: none; padding: 12px 20px; width: 100%;
    border-radius: 10px; font-weight: 600; font-size: 15px; margin-top: 14px;
  }
  .btn-primary:hover { background: #0D1442; }
  .err { color: #dc2626; font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }
  a.cancel { display: block; margin-top: 14px; font-size: 13px; color: #64748b; text-decoration: none; text-align: center; }
  a.cancel:hover { color: #1A237E; }
</style>
</head>
<body>
<div class="card-mfa">
  <h1>Two-factor verification</h1>
  <p class="lead-text">Enter the 6-digit code from your authenticator app to finish signing in.</p>

  <input id="codeInput" class="code-input" inputmode="numeric" maxlength="6" autocomplete="one-time-code" autofocus />
  <div class="err" id="errBox"></div>
  <button class="btn btn-primary" id="verifyBtn">Verify and sign in</button>

  <a href="<?= scriptUrl ?>" class="cancel">Cancel and return to sign-in</a>
</div>

<script>
  var CHALLENGE  = <?= JSON.stringify(challengeToken) ?>;
  var SCRIPT_URL = <?= JSON.stringify(scriptUrl) ?>;

  function setError(msg) { document.getElementById('errBox').textContent = msg || ''; }
  function setBusy(busy) {
    var btn = document.getElementById('verifyBtn');
    btn.disabled = !!busy;
    btn.textContent = busy ? 'Verifying...' : 'Verify and sign in';
  }

  function submitCode() {
    var code = (document.getElementById('codeInput').value || '').trim();
    if (!/^\d{6}$/.test(code)) { setError('Enter the 6-digit code from your app.'); return; }
    setError('');
    setBusy(true);
    google.script.run
      .withSuccessHandler(function(r) {
        setBusy(false);
        if (r && r.success && r.token && r.redirectUrl) {
          try { sessionStorage.setItem('hass_token', r.token); } catch(e) {}
          window.top.location.href = r.redirectUrl;
          return;
        }
        if (r && r.restart) { window.location.href = SCRIPT_URL; return; }
        setError((r && r.error) || 'Invalid code. Try again.');
        document.getElementById('codeInput').select();
      })
      .withFailureHandler(function() {
        setBusy(false);
        setError('Connection error. Please try again.');
      })
      .processRequest({
        service: 'auth',
        action:  'mfaVerify',
        challengeToken: CHALLENGE,
        code: code
      });
  }

  document.getElementById('verifyBtn').addEventListener('click', submitCode);
  document.getElementById('codeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitCode(); }
  });
</script>
</body>
</html>
