<script>
Router.register('orders', function (el, routeParams) {
  routeParams = routeParams || {};
  // Drill-down filters pre-applied when arriving from a dashboard chart "View all".
  var drill = {};
  ['month', 'country_code', 'currency_code', 'exclude_statuses'].forEach(function (k) {
    if (routeParams[k]) drill[k] = routeParams[k];
  });
  el.innerHTML =
    '<div class="filter-bar">' +
      '<select class="form-control" id="ordStatus"><option value="">All statuses</option>' +
        ['DRAFT','SUBMITTED','APPROVED','DISPATCHED','DELIVERED','REJECTED','CANCELLED'].map(function(s){return '<option>'+s+'</option>';}).join('') +
      '</select>' +
      '<input class="form-control" id="ordCust" placeholder="Customer ID…" style="width:200px">' +
      (can('order.create') ? '<button class="btn btn-primary btn-sm" id="ordNewBtn">+ New Order</button>' : '') +
      '<span id="ordDrill"></span>' +
    '</div>' +
    '<div class="card"><div class="table-wrapper"><table class="data-table">' +
      '<thead><tr><th>Order #</th><th>Customer</th><th>Country</th><th>Total</th><th>Status</th><th>Date</th><th></th></tr></thead>' +
      '<tbody id="ordBody"></tbody></table></div></div>';

  function load() {
    setHTML('ordBody', loadingRow(7));
    var params = { limit: 50 };
    var s = document.getElementById('ordStatus').value;
    var c = document.getElementById('ordCust').value.trim();
    if (s) params.status = s;
    if (c) params.customer_id = c;
    Object.keys(drill).forEach(function (k) { params[k] = drill[k]; });
    API.call('orders', 'list', params).then(function (rows) {
      if (!rows.length) { setHTML('ordBody', emptyRow(7, 'No orders.')); return; }
      setHTML('ordBody', rows.map(function (r) {
        var oid = esc(r.order_id);
        return '<tr style="cursor:pointer" onclick="viewOrder(\'' + oid + '\')"><td>' + esc(r.order_number) + '</td><td>' + esc(r.company_name || r.customer_id) + '</td>' +
               '<td>' + esc(r.country_code) + '</td><td>' + fmtMoney(r.total_amount, r.currency_code) + '</td>' +
               '<td>' + statusBadge(r.status) + '</td><td>' + fmtDate(r.created_at) + '</td>' +
               '<td class="actions"><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();viewOrder(\'' + oid + '\')">View</button></td></tr>';
      }).join(''));
    }).catch(function (e) { setHTML('ordBody', errorRow(7, e, load)); });
  }

  document.getElementById('ordCust').oninput = function () { clearTimeout(this._t); this._t = setTimeout(load, 400); };
  document.getElementById('ordStatus').onchange = load;
  var ordNewBtn = document.getElementById('ordNewBtn');
  if (ordNewBtn) ordNewBtn.onclick = newOrderModal.bind(null, load);
  // Render the drill-down filter chip (dismissible). The page's own controls still
  // layer on top; clearing the chip drops the pre-applied filter and reloads.
  if (Object.keys(drill).length) {
    setHTML('ordDrill',
      '<span class="badge badge-primary" style="gap:6px">' + esc(routeParams.drillLabel || 'Filtered') +
      ' <button type="button" id="ordDrillClear" title="Clear filter" ' +
      'style="background:none;border:none;cursor:pointer;color:inherit;font-size:14px;line-height:1;padding:0">&times;</button></span>');
    var _clr = document.getElementById('ordDrillClear');
    if (_clr) _clr.onclick = function () { drill = {}; setHTML('ordDrill', ''); load(); };
  }
  load();
});

function viewOrder(id) {
  var l = Loader.show();
  API.call('orders', 'get', { orderId: id }).then(function (o) {
    Loader.hide(l);
    var lines = (o.lines || []).map(function (ln) {
      return '<tr><td>' + esc(ln.product_name) + '</td><td>' + ln.quantity + '</td>' +
             '<td>' + fmtMoney(ln.unit_price) + '</td><td>' + fmtMoney(ln.line_subtotal) + '</td></tr>';
    }).join('');
    Modal.open({
      title: 'Order ' + o.order_number,
      body: '<p style="margin-bottom:8px">' + statusBadge(o.status) + ' &nbsp; ' + fmtDate(o.created_at) + '</p>' +
            '<table class="data-table" style="margin-bottom:14px"><thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Subtotal</th></tr></thead><tbody>' + (lines || '<tr><td colspan="4" style="color:#9ca3af">No lines</td></tr>') + '</tbody></table>' +
            '<div style="text-align:right;font-weight:600">Total: ' + fmtMoney(o.total_amount, o.currency_code) + '</div>' +
            (o.status === 'SUBMITTED' && can('order.approve_low')
              ? '<div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">' +
                '<button class="btn btn-danger btn-sm" onclick="orderAction(\'' + id + '\',\'reject\',\'Reason?\')">Reject</button>' +
                '<button class="btn btn-primary btn-sm" onclick="orderAction(\'' + id + '\',\'approve\',\'\')">Approve</button></div>'
              : ''),
    });
  }).catch(function (e) { Loader.hide(l); Toast.error(e.message); });
}

function orderAction(id, action, prompt) {
  var params = { orderId: id };
  if (prompt) { params.reason = window.prompt(prompt) || ''; }
  API.call('orders', action, params)
    .then(function (r) { Modal.close(); Toast.success('Order ' + r.status + '.'); Router.navigate('orders', {}); })
    .catch(function (e) { Toast.error(e.message); });
}

function newOrderModal(onSuccess) {
  Modal.open({
    title: 'New Order',
    body: '<div class="form-row">' +
          '<div class="form-group"><label class="form-label">Customer ID</label><input class="form-control" id="noCustomer"></div>' +
          '<div class="form-group"><label class="form-label">Country</label>' +
            '<select class="form-control" id="noCC"><option>KE</option><option>UG</option><option>TZ</option><option>RW</option><option>DRC</option><option>ZM</option><option>SS</option><option>MW</option></select></div></div>' +
          '<div id="noErr" style="color:#dc2626;font-size:12px"></div>',
    footer: '<button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>' +
            '<button class="btn btn-primary" id="noSave">Create Draft</button>',
    onOpen: function () {
      document.getElementById('noSave').onclick = function () {
        var cid = document.getElementById('noCustomer').value.trim();
        if (!cid) { document.getElementById('noErr').textContent = 'Customer ID required.'; return; }
        API.call('orders', 'create', { customer_id: cid, country_code: document.getElementById('noCC').value })
          .then(function () { Modal.close(); Toast.success('Draft order created.'); if (onSuccess) onSuccess(); })
          .catch(function (e) { document.getElementById('noErr').textContent = e.message; });
      };
    },
  });
}
</script>
