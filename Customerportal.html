<script>
(function () {
  'use strict';

  if (!API.loadPersistedToken()) {
    window.location.href = '?page=login';
    return;
  }

  API.call('auth', 'me', {})
    .then(function (me) {
      if (me.user_type !== 'CUSTOMER') {
        window.location.href = '?page=staff';
        return;
      }
      document.getElementById('authGuard').style.display  = 'none';
      document.getElementById('portalShell').style.display = 'flex';
      initPortal(me);
    })
    .catch(function () { window.location.href = '?page=login'; });

  function initPortal(me) {
    Router.init(document.getElementById('portalContent'), '.portal-nav-item');

    document.getElementById('portalLogout').onclick = function () {
      API.logout().catch(function () {}).finally(function () {
        window.location.href = '?page=login';
      });
    };

    document.querySelectorAll('.portal-nav-item').forEach(function (el) {
      el.addEventListener('click', function () {
        document.querySelectorAll('.portal-nav-item').forEach(function (x) { x.classList.remove('active'); });
        el.classList.add('active');
        Router.navigate(el.dataset.tab, { me: me });
      });
    });

    Router.navigate('portal-dashboard', { me: me });
  }
})();
</script>
</body>
