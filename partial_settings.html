<script>
// ── Settings (route 'settings') ───────────────────────────────────────────────
// A dense, many-section screen carried into the single-open disclosure pattern
// (the same UX.disclosure component the sidebar and RBAC use). Sections load
// lazily on open, each painting a layout-matched skeleton before its content.
// Presentation only: the same configAdmin / branding / system actions and the
// same order.manage gating as before.
Router.register('settings', function (el) {
  el.innerHTML = '<div id="cfgDisc"></div>';
  var mount = document.getElementById('cfgDisc');

  function renderConfig(body) {
    body.innerHTML = '<div class="card" style="margin:0"><div class="table-wrapper"><table class="data-table">' +
      '<thead><tr><th>Key</th><th>Value</th><th>Country</th><th>Updated</th><th></th></tr></thead>' +
      '<tbody>' + UX.skel.tableRows(5, 5) + '</tbody></table></div></div>';
    API.call('configAdmin', 'list', {}).then(function (rows) {
      body.innerHTML = '<div class="card" style="margin:0"><div class="table-wrapper"><table class="data-table">' +
        '<thead><tr><th>Key</th><th>Value</th><th>Country</th><th>Updated</th><th></th></tr></thead><tbody>' +
        (rows.length ? rows.map(function (r) {
          return '<tr><td>' + esc(r.config_key) + '</td><td>' + esc(r.config_value) + '</td>' +
                 '<td>' + esc(r.country_code || '-') + '</td><td>' + fmtDate(r.updated_at) + '</td>' +
                 '<td>' + (can('order.manage') ? '<button class="btn btn-secondary btn-sm" onclick="editConfig(\'' + esc(r.config_key) + '\',\'' + esc(r.config_value) + '\',\'' + esc(r.country_code || '') + '\')">Edit</button>' : '') + '</td></tr>';
        }).join('') : emptyRow(5, 'No config keys.')) +
        '</tbody></table></div>' +
        (can('order.manage') ? '<div style="padding:10px 16px"><button class="btn btn-primary btn-sm" onclick="newConfigKey()">+ Add Key</button></div>' : '') + '</div>';
    }).catch(function (e) { body.innerHTML = errorCard(e, function () { renderConfig(body); }); });
  }

  function renderBranding(body) {
    body.innerHTML = UX.skel.lines(4);
    API.call('branding', 'get', { scope_code: 'GLOBAL' }).then(function (b) {
      b = b || {};
      body.innerHTML = '<div class="card card-body" style="margin:0">' +
        '<div class="form-group"><label class="form-label">App Name</label><input class="form-control" id="brAppName" value="' + esc(b.app_name || '') + '"></div>' +
        '<div class="form-group"><label class="form-label">Support Email</label><input class="form-control" id="brEmail" value="' + esc(b.support_email || '') + '"></div>' +
        '<div class="form-group"><label class="form-label">Primary Color</label><input class="form-control" id="brColor" value="' + esc(b.primary_color || '#1F2A44') + '"></div>' +
        (can('order.manage') ? '<button class="btn btn-primary" onclick="saveBranding()">Save</button>' : '') +
        '</div>';
    }).catch(function (e) { body.innerHTML = errorCard(e, function () { renderBranding(body); }); });
  }

  function renderHealth(body) {
    body.innerHTML = UX.skel.lines(5);
    API.call('system', 'health', {}).then(function (h) {
      body.innerHTML = '<div class="card card-body" style="margin:0">' +
        '<p style="font-size:14px;font-weight:600;margin-bottom:10px">Status: ' + statusBadge(h.status) + '</p>' +
        '<table class="data-table"><thead><tr><th>Check</th><th>Result</th></tr></thead><tbody>' +
        Object.keys(h.checks || {}).map(function (k) {
          return '<tr><td>' + esc(k) + '</td><td>' + statusBadge(h.checks[k]) + '</td></tr>';
        }).join('') + '</tbody></table></div>';
    }).catch(function (e) { body.innerHTML = errorCard(e, function () { renderHealth(body); }); });
  }

  UX.disclosure(mount, [
    { id: 'config',   label: 'System Config', render: renderConfig },
    { id: 'branding', label: 'Branding',      render: renderBranding },
    { id: 'health',   label: 'Health',        render: renderHealth },
  ], { single: true, open: 'config', lazy: true });
});

function editConfig(key, value, cc) {
  var newVal = window.prompt('New value for ' + key + ':', value);
  if (newVal === null) return;
  API.call('configAdmin', 'set', { config_key: key, config_value: newVal, country_code: cc })
    .then(function () { Toast.success('Config updated.'); Router.navigate('settings', {}); })
    .catch(function (e) { Toast.error(e.message); });
}

function newConfigKey() {
  var key = window.prompt('Config key (e.g. SESSION.IDLE_TIMEOUT_MIN):');
  if (!key) return;
  var val = window.prompt('Value:');
  if (val === null) return;
  API.call('configAdmin', 'set', { config_key: key.trim(), config_value: val })
    .then(function () { Toast.success('Config key added.'); Router.navigate('settings', {}); })
    .catch(function (e) { Toast.error(e.message); });
}

function saveBranding() {
  API.call('branding', 'update', {
    scope_code:    'GLOBAL',
    app_name:      document.getElementById('brAppName').value.trim(),
    support_email: document.getElementById('brEmail').value.trim(),
    primary_color: document.getElementById('brColor').value.trim(),
  }).then(function () { Toast.success('Branding saved.'); })
    .catch(function (e) { Toast.error(e.message); });
}
</script>
