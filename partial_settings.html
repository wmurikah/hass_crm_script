<script>
Router.register('settings', function (el) {
  el.innerHTML =
    '<div style="display:flex;gap:14px;margin-bottom:14px">' +
      '<button class="btn btn-secondary btn-sm cfgTab active" data-t="config">System Config</button>' +
      '<button class="btn btn-secondary btn-sm cfgTab" data-t="branding">Branding</button>' +
      '<button class="btn btn-secondary btn-sm cfgTab" data-t="health">Health</button>' +
      (can('order.manage') ? '<button class="btn btn-secondary btn-sm cfgTab" data-t="oracle">Oracle integration</button>' : '') +
      (can('order.manage') ? '<button class="btn btn-secondary btn-sm cfgTab" data-t="emailIntake">Email intake</button>' : '') +
      (can('order.manage') ? '<button class="btn btn-secondary btn-sm cfgTab" data-t="whatsappIntake">WhatsApp intake</button>' : '') +
    '</div>' +
    '<div id="cfgPanel"></div>';

  var _tab = 'config';
  document.querySelectorAll('.cfgTab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.cfgTab').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      _tab = btn.dataset.t;
      loadTab();
    });
  });

  function loadTab() {
    setHTML('cfgPanel', (window.UX ? UX.panelLoading('lines', 6) : spinnerHTML(40)));
    if (_tab === 'config') {
      API.call('configAdmin', 'list', {}).then(function (rows) {
        setHTML('cfgPanel', '<div class="card"><div class="table-wrapper"><table class="data-table">' +
          '<thead><tr><th>Key</th><th>Value</th><th>Country</th><th>Updated</th><th></th></tr></thead><tbody>' +
          (rows.length ? rows.map(function (r) {
            return '<tr><td>' + esc(r.config_key) + '</td><td>' + esc(r.config_value) + '</td>' +
                   '<td>' + esc(r.country_code || '—') + '</td><td>' + fmtDate(r.updated_at) + '</td>' +
                   '<td>' + (can('order.manage') ? '<button class="btn btn-secondary btn-sm" onclick="editConfig(\'' + esc(r.config_key) + '\',\'' + esc(r.config_value) + '\',\'' + esc(r.country_code||'') + '\')">Edit</button>' : '') + '</td></tr>';
          }).join('') : emptyRow(5, 'No config keys.')) +
          '</tbody></table></div>' +
          (can('order.manage') ? '<div style="padding:10px 16px"><button class="btn btn-primary btn-sm" onclick="newConfigKey()">+ Add Key</button></div>' : '') + '</div>');
      }).catch(function (e) { setHTML('cfgPanel', errorCard(e, loadTab)); });
    } else if (_tab === 'branding') {
      API.call('branding', 'get', { scope_code: 'GLOBAL' }).then(function (b) {
        b = b || {};
        setHTML('cfgPanel', '<div class="card card-body">' +
          '<div class="form-group"><label class="form-label">App Name</label><input class="form-control" id="brAppName" value="' + esc(b.app_name || '') + '"></div>' +
          '<div class="form-group"><label class="form-label">Support Email</label><input class="form-control" id="brEmail" value="' + esc(b.support_email || '') + '"></div>' +
          '<div class="form-group"><label class="form-label">Primary Color</label><input class="form-control" id="brColor" value="' + esc(b.primary_color || '#1F2A44') + '"></div>' +
          (can('order.manage') ? '<button class="btn btn-primary" onclick="saveBranding()">Save</button>' : '') +
          '</div>');
      }).catch(function (e) { setHTML('cfgPanel', errorCard(e, loadTab)); });
    } else if (_tab === 'oracle') {
      renderOraclePanel();
    } else if (_tab === 'emailIntake') {
      renderEmailIntakePanel();
    } else if (_tab === 'whatsappIntake') {
      renderWhatsappIntakePanel();
    } else {
      API.call('system', 'health', {}).then(function (h) {
        setHTML('cfgPanel', '<div class="card card-body">' +
          '<p style="font-size:14px;font-weight:600;margin-bottom:10px">Status: ' + statusBadge(h.status) + '</p>' +
          '<table class="data-table"><thead><tr><th>Check</th><th>Result</th></tr></thead><tbody>' +
          Object.keys(h.checks || {}).map(function (k) {
            return '<tr><td>' + esc(k) + '</td><td>' + statusBadge(h.checks[k]) + '</td></tr>';
          }).join('') + '</tbody></table></div>');
      }).catch(function (e) { setHTML('cfgPanel', errorCard(e, loadTab)); });
    }
  }
  loadTab();
});

function editConfig(key, value, cc) {
  var newVal = window.prompt('New value for ' + key + ':', value);
  if (newVal === null) return;
  API.call('configAdmin', 'set', { config_key: key, config_value: newVal, country_code: cc })
    .then(function () { Toast.success('Config updated.'); Router.navigate('settings', {}); })
    .catch(function (e) { Toast.error(e.message); });
}

function newConfigKey() {
  var key = window.prompt('Config key (e.g. SESSION.IDLE_TIMEOUT_MIN):');
  if (!key) return;
  var val = window.prompt('Value:');
  if (val === null) return;
  API.call('configAdmin', 'set', { config_key: key.trim(), config_value: val })
    .then(function () { Toast.success('Config key added.'); Router.navigate('settings', {}); })
    .catch(function (e) { Toast.error(e.message); });
}

function saveBranding() {
  API.call('branding', 'update', {
    scope_code:    'GLOBAL',
    app_name:      document.getElementById('brAppName').value.trim(),
    support_email: document.getElementById('brEmail').value.trim(),
    primary_color: document.getElementById('brColor').value.trim(),
  }).then(function () { Toast.success('Branding saved.'); })
    .catch(function (e) { Toast.error(e.message); });
}

// ── Oracle integration panel ────────────────────────────────────────────────
// User-friendly connection + column mapping for pulling customer master from
// Oracle. Secrets are write-only (never returned); the form shows whether a
// secret is set and lets the admin replace it. No column name is hard-coded.
var _oracleSrcCols = [];   // columns discovered by Test connection, for the mapping pick lists

var ORC_FIELD_LABELS = {
  customer_id:    'Customer identifier',
  account_number: 'Account number (match key)',
  name:           'Customer name',
  credit_limit:   'Credit limit',
  balance:        'Current balance / exposure',
  on_hold:        'On-hold flag / status',
  currency_code:  'Currency code'
};
var ORC_FIELD_ORDER = ['customer_id', 'account_number', 'name', 'credit_limit', 'balance', 'on_hold', 'currency_code'];

function renderOraclePanel() {
  API.call('oracle', 'getConfig', {}).then(function (res) {
    setHTML('cfgPanel', _oraclePanelHtml((res && res.config) || {}, (res && res.status) || {}));
    _oracleWire();
  }).catch(function (e) { setHTML('cfgPanel', errorCard(e, renderOraclePanel)); });
}

function _orcColDatalist() {
  return '<datalist id="orcCols">' + (_oracleSrcCols || []).map(function (c) {
    return '<option value="' + esc(c) + '"></option>';
  }).join('') + '</datalist>';
}

function _oraclePanelHtml(c, st) {
  var cust = c.customers || {}; var f = cust.fields || {};
  var connected = !!st.connected;
  var statusBadgeHtml = connected
    ? '<span class="badge badge-success">Connected</span>'
    : '<span class="badge badge-neutral">Not connected</span>';
  var holdNote = st.last_sync_error ? ('<div style="color:var(--clr-danger);font-size:12px;margin-top:6px">Last error: ' + esc(st.last_sync_error) + '</div>') : '';
  var lastSync = st.last_sync_at
    ? (fmtDateTime(st.last_sync_at) + ' (' + (st.last_sync_status || '') + ', ' + (st.last_sync_count || 0) + ' rows)')
    : 'never';

  function inp(id, val, ph) { return '<input class="form-control" id="' + id + '" value="' + esc(val || '') + '"' + (ph ? ' placeholder="' + esc(ph) + '"' : '') + '>'; }
  function fieldRow(key) {
    return '<div class="form-group" style="margin:0">' +
      '<label class="form-label">' + esc(ORC_FIELD_LABELS[key]) + (key === 'customer_id' ? ' *' : '') + '</label>' +
      '<input class="form-control" id="orcF_' + key + '" list="orcCols" value="' + esc(f[key] || '') + '" placeholder="source column">' +
      '</div>';
  }
  function opt(v, cur, label) { return '<option value="' + v + '"' + (String(cur) === v ? ' selected' : '') + '>' + label + '</option>'; }

  return '<div class="card card-body">' +
    // Reachability note (honest).
    '<div class="rbac-note" style="margin-bottom:14px">Apps Script runs in Google\'s cloud, so it can only reach Oracle through a network-reachable endpoint (Oracle REST Data Services / ORDS, another REST gateway, or a small on-network bridge) with credentials. On-premise Oracle EBS behind a firewall is not reachable directly. The integration is read-only: it only reads from Oracle and writes to a local read-only mirror, never back to Oracle.</div>' +

    '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">' +
      statusBadgeHtml +
      '<span style="font-size:12.5px;color:var(--clr-text-light)">Last sync: ' + esc(lastSync) + ' · Mirror rows: ' + (st.mirror_count || 0) + '</span>' +
    '</div>' + holdNote +

    // Connection
    '<h3 style="font-size:13px;font-weight:700;margin:14px 0 8px">Connection</h3>' +
    '<label class="rbac-switch" style="margin-bottom:10px"><input type="checkbox" id="orcEnabled"' + (c.enabled ? ' checked' : '') + '><span class="rbac-sw"></span><span class="rbac-switch-txt">Integration enabled</span></label>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Endpoint type</label>' +
        '<select class="form-control" id="orcSourceType">' + opt('', c.source_type, '(unspecified)') + opt('ORDS', c.source_type, 'Oracle REST Data Services (ORDS)') + opt('REST', c.source_type, 'Other REST gateway') + opt('BRIDGE', c.source_type, 'On-network bridge') + '</select></div>' +
      '<div class="form-group"><label class="form-label">Base URL / endpoint</label>' + inp('orcBaseUrl', c.base_url, 'https://host/ords/schema/') + '</div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Auth</label>' +
        '<select class="form-control" id="orcAuthType">' + opt('none', c.auth_type, 'None') + opt('token', c.auth_type, 'Bearer token') + opt('basic', c.auth_type, 'Username and password') + opt('apikey', c.auth_type, 'API key header') + '</select></div>' +
      '<div class="form-group" id="orcUsernameRow"><label class="form-label">Username</label>' + inp('orcUsername', c.username, '') + '</div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group" id="orcApiKeyHeaderRow"><label class="form-label">API key header name</label>' + inp('orcApiKeyHeader', c.api_key_header || 'apikey', 'apikey') + '</div>' +
      '<div class="form-group" id="orcSecretRow"><label class="form-label">Secret ' + (st.has_secret ? '(set; leave blank to keep)' : '(token / password / API key)') + '</label>' +
        '<input class="form-control" type="password" id="orcSecret" autocomplete="new-password" placeholder="' + (st.has_secret ? '•••••• stored' : 'enter secret') + '"></div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;align-items:center;margin:6px 0 4px">' +
      '<button class="btn btn-secondary btn-sm" id="orcTestBtn">Test connection</button>' +
      '<span id="orcTestResult" style="font-size:12.5px"></span>' +
    '</div>' +

    // Source mapping (Customers)
    '<h3 style="font-size:13px;font-weight:700;margin:18px 0 8px">Source mapping: Customers</h3>' +
    '<div class="form-group"><label class="form-label">Oracle table or view (or endpoint path)</label>' + inp('orcObject', cust.object, 'e.g. AR_CUSTOMERS or customers') + '</div>' +
    '<p style="font-size:12px;color:var(--clr-text-light);margin:0 0 8px">Map each app field to a source column. Test connection first to pick from the discovered columns, or type a name. The identifier is required.</p>' +
    '<div class="form-row">' + ORC_FIELD_ORDER.map(fieldRow).join('') + '</div>' +
    _orcColDatalist() +
    '<div class="form-group" style="margin-top:8px"><label class="form-label">Values that mean "on hold" (comma separated)</label>' + inp('orcHoldTrue', cust.on_hold_true_values, 'Y,YES,TRUE,1,HOLD') + '</div>' +

    // Schedule + actions
    '<h3 style="font-size:13px;font-weight:700;margin:18px 0 8px">Schedule</h3>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Sync frequency</label>' +
        '<select class="form-control" id="orcSchedule">' + opt('manual', c.schedule, 'Manual only') + opt('hourly', c.schedule, 'Hourly') + opt('daily', c.schedule, 'Daily') + '</select></div>' +
      '<div class="form-group" style="display:flex;align-items:flex-end;gap:8px">' +
        '<button class="btn btn-secondary btn-sm" id="orcSyncBtn" style="margin-bottom:2px">Sync now</button>' +
        '<span id="orcSyncResult" style="font-size:12.5px"></span>' +
      '</div>' +
    '</div>' +

    '<div style="margin-top:14px"><button class="btn btn-primary" id="orcSaveBtn">Save settings</button></div>' +
  '</div>';
}

function _oracleWire() {
  var authSel = document.getElementById('orcAuthType');
  function applyAuthVisibility() {
    var t = authSel ? authSel.value : 'none';
    var uRow = document.getElementById('orcUsernameRow');
    var kRow = document.getElementById('orcApiKeyHeaderRow');
    var sRow = document.getElementById('orcSecretRow');
    if (uRow) uRow.style.display = (t === 'basic') ? '' : 'none';
    if (kRow) kRow.style.display = (t === 'apikey') ? '' : 'none';
    if (sRow) sRow.style.display = (t === 'none') ? 'none' : '';
  }
  if (authSel) authSel.addEventListener('change', applyAuthVisibility);
  applyAuthVisibility();

  var t = document.getElementById('orcTestBtn'); if (t) t.onclick = oracleTestConn;
  var s = document.getElementById('orcSaveBtn'); if (s) s.onclick = oracleSaveConfig;
  var y = document.getElementById('orcSyncBtn'); if (y) y.onclick = oracleSyncNow;
}

function _oracleReadForm() {
  function v(id) { var el = document.getElementById(id); return el ? String(el.value || '').trim() : ''; }
  function chk(id) { var el = document.getElementById(id); return el ? !!el.checked : false; }
  return {
    config: {
      enabled:        chk('orcEnabled'),
      source_type:    v('orcSourceType'),
      base_url:       v('orcBaseUrl'),
      auth_type:      v('orcAuthType'),
      username:       v('orcUsername'),
      api_key_header: v('orcApiKeyHeader'),
      schedule:       v('orcSchedule'),
      customers: {
        object: v('orcObject'),
        on_hold_true_values: v('orcHoldTrue'),
        fields: {
          customer_id:    v('orcF_customer_id'),
          account_number: v('orcF_account_number'),
          name:           v('orcF_name'),
          credit_limit:   v('orcF_credit_limit'),
          balance:        v('orcF_balance'),
          on_hold:        v('orcF_on_hold'),
          currency_code:  v('orcF_currency_code')
        }
      }
    },
    secret: v('orcSecret')   // '' leaves the stored secret unchanged
  };
}

function oracleTestConn() {
  var out = document.getElementById('orcTestResult');
  if (out) out.textContent = 'Testing...';
  API.call('oracle', 'testConnection', _oracleReadForm()).then(function (r) {
    if (r && r.ok) {
      _oracleSrcCols = r.columns || [];
      var dl = document.getElementById('orcCols');
      if (dl) dl.innerHTML = (_oracleSrcCols).map(function (col) { return '<option value="' + esc(col) + '"></option>'; }).join('');
      if (out) out.innerHTML = '<span style="color:#16a34a">Connected. ' + esc(r.message || '') + '</span>';
    } else if (out) {
      out.innerHTML = '<span style="color:var(--clr-danger)">Failed: ' + esc((r && r.message) || 'Unknown error') + '</span>';
    }
  }).catch(function (e) { if (out) out.innerHTML = '<span style="color:var(--clr-danger)">Failed: ' + esc(e.message) + '</span>'; });
}

function oracleSaveConfig() {
  API.call('oracle', 'saveConfig', _oracleReadForm())
    .then(function () { Toast.success('Oracle settings saved.'); renderOraclePanel(); })
    .catch(function (e) { Toast.error(e.message); });
}

function oracleSyncNow() {
  var out = document.getElementById('orcSyncResult');
  if (out) out.textContent = 'Syncing...';
  API.call('oracle', 'syncNow', {}).then(function (r) {
    if (out) out.textContent = '';
    if (r && r.connected) { Toast.success('Synced ' + (r.count || 0) + ' customers from Oracle.'); }
    else { Toast.warning((r && r.message) || 'Not connected.'); }
    renderOraclePanel();
  }).catch(function (e) { if (out) out.textContent = ''; Toast.error(e.message); });
}

// ── Email intake panel (Channel A) ───────────────────────────────────────────
// Connect the support mailbox (sign in / consent), pick a folder + frequency,
// optional keyword->priority rules, and scan on demand. Reuses Microsoft Graph.
function renderEmailIntakePanel() {
  API.call('emailIntake', 'getConfig', {}).then(function (res) {
    var c = (res && res.config) || {}, st = (res && res.status) || {}, consent = (res && res.consent_url) || '';
    setHTML('cfgPanel', _emailIntakeHtml(c, st, consent));
    var t = document.getElementById('eiConnect'); if (t) t.onclick = emailIntakeConnect;
    var s = document.getElementById('eiSave');    if (s) s.onclick = emailIntakeSave;
    var y = document.getElementById('eiScan');    if (y) y.onclick = emailIntakeScan;
  }).catch(function (e) { setHTML('cfgPanel', errorCard(e, renderEmailIntakePanel)); });
}
function _emailIntakeHtml(c, st, consent) {
  function inp(id, v, ph) { return '<input class="form-control" id="' + id + '" value="' + esc(v || '') + '"' + (ph ? ' placeholder="' + esc(ph) + '"' : '') + '>'; }
  var connBadge = st.connected ? '<span class="badge badge-success">Connected</span>' : '<span class="badge badge-neutral">Not connected</span>';
  var lastScan = st.last_scan_at ? (fmtDateTime(st.last_scan_at) + ' (' + (st.last_scan_status || '') + ', ' + (st.last_scan_count || 0) + ' new)') : 'never';
  var kr = (c.keyword_rules || []).map(function (r) { return r.keyword + '=' + r.priority; }).join(', ');
  return '<div class="card card-body">' +
    '<div class="rbac-note" style="margin-bottom:14px">Reads the support mailbox through the app\'s Microsoft Graph credentials. The one-time sign-in is the Microsoft admin consent that grants the app mailbox read; click Connect to get the consent link and verify access. New emails become tickets on the schedule below.</div>' +
    '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">' + connBadge +
      '<span style="font-size:12.5px;color:var(--clr-text-light)">Graph configured: ' + (st.graph_configured ? 'yes' : 'no') + ' · Last scan: ' + esc(lastScan) + '</span></div>' +
    (st.last_scan_error ? '<div style="color:var(--clr-danger);font-size:12px;margin-bottom:8px">Last error: ' + esc(st.last_scan_error) + '</div>' : '') +
    '<label class="rbac-switch" style="margin:6px 0 10px"><input type="checkbox" id="eiEnabled"' + (c.enabled ? ' checked' : '') + '><span class="rbac-sw"></span><span class="rbac-switch-txt">Email intake enabled</span></label>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Support mailbox</label>' + inp('eiMailbox', c.mailbox, 'support@yourdomain.com') + '</div>' +
      '<div class="form-group"><label class="form-label">Folder</label>' + inp('eiFolder', c.folder || 'inbox', 'inbox') + '</div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Scan every (minutes)</label>' + inp('eiFreq', c.frequency_minutes || 15, '15') + '</div>' +
      '<div class="form-group"><label class="form-label">Notify admin email</label>' + inp('eiNotify', c.notify_email, 'defaults to the Graph sender') + '</div>' +
    '</div>' +
    '<div class="form-group"><label class="form-label">Keyword to priority rules (comma separated, e.g. urgent=HIGH, outage=CRITICAL)</label>' + inp('eiRules', kr, 'urgent=HIGH, refund=HIGH') + '</div>' +
    '<div class="form-group"><label class="form-label">Default customer id for unmatched senders (optional)</label>' + inp('eiDefaultCust', c.default_customer_id, 'leave blank to use the intake bucket') + '</div>' +
    '<label class="rbac-switch" style="margin:2px 0 12px"><input type="checkbox" id="eiLlm"' + (c.use_llm ? ' checked' : '') + '><span class="rbac-sw"></span><span class="rbac-switch-txt">Use the LLM assistant to refine subject and priority (optional, fail-safe)</span></label>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
      '<button class="btn btn-secondary btn-sm" id="eiConnect">Connect (sign in) and test</button>' +
      '<button class="btn btn-secondary btn-sm" id="eiScan">Scan now</button>' +
      '<button class="btn btn-primary btn-sm" id="eiSave">Save settings</button>' +
    '</div>' +
    (consent ? '<p style="font-size:12px;margin-top:8px"><a href="' + esc(consent) + '" target="_blank" rel="noopener">Open Microsoft sign-in / admin consent</a></p>' : '') +
    '<div id="eiResult" style="font-size:12.5px;margin-top:8px"></div>' +
  '</div>';
}
function _emailIntakeForm() {
  function v(id) { var el = document.getElementById(id); return el ? String(el.value || '').trim() : ''; }
  function chk(id) { var el = document.getElementById(id); return el ? !!el.checked : false; }
  var rules = v('eiRules').split(',').map(function (p) {
    var kv = p.split('='); return { keyword: (kv[0] || '').trim(), priority: (kv[1] || '').trim().toUpperCase() };
  }).filter(function (r) { return r.keyword; });
  return { config: {
    enabled: chk('eiEnabled'), mailbox: v('eiMailbox'), folder: v('eiFolder') || 'inbox',
    frequency_minutes: parseInt(v('eiFreq'), 10) || 15, notify_email: v('eiNotify'),
    use_llm: chk('eiLlm'), keyword_rules: rules, default_customer_id: v('eiDefaultCust')
  } };
}
function emailIntakeSave() {
  API.call('emailIntake', 'saveConfig', _emailIntakeForm())
    .then(function () { Toast.success('Email intake settings saved.'); renderEmailIntakePanel(); })
    .catch(function (e) { Toast.error(e.message); });
}
function emailIntakeConnect() {
  var out = document.getElementById('eiResult'); if (out) out.textContent = 'Checking access...';
  API.call('emailIntake', 'connect', {}).then(function (r) {
    var t = r && r.test;
    if (out) out.innerHTML = (t && t.ok) ? '<span style="color:#16a34a">' + esc(t.message) + '</span>'
      : '<span style="color:var(--clr-danger)">' + esc((t && t.message) || 'Not connected') + '</span>';
  }).catch(function (e) { if (out) out.innerHTML = '<span style="color:var(--clr-danger)">' + esc(e.message) + '</span>'; });
}
function emailIntakeScan() {
  var out = document.getElementById('eiResult'); if (out) out.textContent = 'Scanning...';
  API.call('emailIntake', 'scanNow', {}).then(function (r) {
    var res = r && r.result;
    if (res && res.ran && res.connected !== false) Toast.success('Scan complete: ' + (res.count || 0) + ' new ticket(s).');
    else Toast.warning((res && res.message) || 'Scan did not run.');
    renderEmailIntakePanel();
  }).catch(function (e) { if (out) out.textContent = ''; Toast.error(e.message); });
}

// ── WhatsApp intake panel (Channel B) ────────────────────────────────────────
function renderWhatsappIntakePanel() {
  API.call('whatsappIntake', 'getConfig', {}).then(function (res) {
    setHTML('cfgPanel', _whatsappIntakeHtml((res && res.config) || {}, (res && res.status) || {}));
    var s = document.getElementById('wiSave'); if (s) s.onclick = whatsappIntakeSave;
    var t = document.getElementById('wiTest'); if (t) t.onclick = whatsappIntakeTest;
  }).catch(function (e) { setHTML('cfgPanel', errorCard(e, renderWhatsappIntakePanel)); });
}
function _whatsappIntakeHtml(c, st) {
  function inp(id, v, ph) { return '<input class="form-control" id="' + id + '" value="' + esc(v || '') + '"' + (ph ? ' placeholder="' + esc(ph) + '"' : '') + '>'; }
  function sec(id, has, ph) { return '<input class="form-control" type="password" id="' + id + '" autocomplete="new-password" placeholder="' + (has ? 'set; leave blank to keep' : esc(ph || 'enter value')) + '">'; }
  var connBadge = st.connected ? '<span class="badge badge-success">Configured</span>' : '<span class="badge badge-neutral">Not configured</span>';
  var kr = (c.keyword_rules || []).map(function (r) { return r.keyword + '=' + r.priority; }).join(', ');
  return '<div class="card card-body">' +
    '<div class="rbac-note" style="margin-bottom:14px">Inbound WhatsApp messages arrive at a webhook (an external callback, the one exception to the in-app request rule). Register the URL and verify token below with your provider (Meta WhatsApp Cloud API, or a BSP). Messages to the configured number become tickets. Tokens are stored as secrets, never shown back.</div>' +
    '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">' + connBadge +
      '<span style="font-size:12.5px;color:var(--clr-text-light)">Last inbound: ' + (st.last_event_at ? esc(fmtDateTime(st.last_event_at)) : 'never') + ' · Tickets: ' + (st.last_event_count || 0) + '</span></div>' +
    '<div class="form-group"><label class="form-label">Webhook callback URL (register this with your provider)</label>' +
      '<input class="form-control" id="wiUrl" readonly value="' + esc(st.webhook_url || '') + '"><p style="font-size:11.5px;color:var(--clr-text-light);margin:4px 0 0">Replace YOUR_WEBHOOK_SECRET with the webhook secret you set below.</p></div>' +
    '<label class="rbac-switch" style="margin:6px 0 10px"><input type="checkbox" id="wiEnabled"' + (c.enabled ? ' checked' : '') + '><span class="rbac-sw"></span><span class="rbac-switch-txt">WhatsApp intake enabled</span></label>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Provider</label><select class="form-control" id="wiProvider">' +
        '<option value="META"' + (c.provider === 'META' ? ' selected' : '') + '>Meta WhatsApp Cloud API</option>' +
        '<option value="TWILIO"' + (c.provider === 'TWILIO' ? ' selected' : '') + '>Twilio (BSP)</option></select></div>' +
      '<div class="form-group"><label class="form-label">WhatsApp business number</label>' + inp('wiNumber', c.business_number, '+254...') + '</div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Phone number id</label>' + inp('wiPhoneId', c.phone_number_id, 'Meta phone_number_id') + '</div>' +
      '<div class="form-group"><label class="form-label">Notify admin email</label>' + inp('wiNotify', c.notify_email, 'defaults to the Graph sender') + '</div>' +
    '</div>' +
    '<div class="form-row">' +
      '<div class="form-group"><label class="form-label">Verify token ' + (st.has_verify_token ? '(set)' : '') + '</label>' + sec('wiVerify', st.has_verify_token, 'hub.verify_token') + '</div>' +
      '<div class="form-group"><label class="form-label">Webhook secret ' + (st.has_webhook_secret ? '(set)' : '') + '</label>' + sec('wiSecret', st.has_webhook_secret, 'shared URL secret') + '</div>' +
    '</div>' +
    '<div class="form-group"><label class="form-label">Provider access token ' + (st.has_access_token ? '(set)' : '') + ' (optional)</label>' + sec('wiToken', st.has_access_token, 'Meta Cloud API token') + '</div>' +
    '<div class="form-group"><label class="form-label">Keyword to priority rules (comma separated)</label>' + inp('wiRules', kr, 'urgent=HIGH, complaint=HIGH') + '</div>' +
    '<div class="form-group"><label class="form-label">Default customer id for unmatched senders (optional)</label>' + inp('wiDefaultCust', c.default_customer_id, 'leave blank to use the intake bucket') + '</div>' +
    '<label class="rbac-switch" style="margin:2px 0 12px"><input type="checkbox" id="wiLlm"' + (c.use_llm ? ' checked' : '') + '><span class="rbac-sw"></span><span class="rbac-switch-txt">Use the LLM assistant to refine subject and priority (optional, fail-safe)</span></label>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
      '<button class="btn btn-secondary btn-sm" id="wiTest">Check status</button>' +
      '<button class="btn btn-primary btn-sm" id="wiSave">Save settings</button>' +
    '</div>' +
    '<div id="wiResult" style="font-size:12.5px;margin-top:8px"></div>' +
  '</div>';
}
function _whatsappIntakeForm() {
  function v(id) { var el = document.getElementById(id); return el ? String(el.value || '').trim() : ''; }
  function chk(id) { var el = document.getElementById(id); return el ? !!el.checked : false; }
  var rules = v('wiRules').split(',').map(function (p) {
    var kv = p.split('='); return { keyword: (kv[0] || '').trim(), priority: (kv[1] || '').trim().toUpperCase() };
  }).filter(function (r) { return r.keyword; });
  return {
    config: {
      enabled: chk('wiEnabled'), provider: v('wiProvider') || 'META', business_number: v('wiNumber'),
      phone_number_id: v('wiPhoneId'), notify_email: v('wiNotify'), use_llm: chk('wiLlm'),
      keyword_rules: rules, default_customer_id: v('wiDefaultCust')
    },
    verify_token: v('wiVerify'), webhook_secret: v('wiSecret'), access_token: v('wiToken')
  };
}
function whatsappIntakeSave() {
  API.call('whatsappIntake', 'saveConfig', _whatsappIntakeForm())
    .then(function () { Toast.success('WhatsApp intake settings saved.'); renderWhatsappIntakePanel(); })
    .catch(function (e) { Toast.error(e.message); });
}
function whatsappIntakeTest() {
  var out = document.getElementById('wiResult'); if (out) out.textContent = 'Checking...';
  API.call('whatsappIntake', 'testWebhook', {}).then(function (r) {
    if (out) out.innerHTML = (r && r.configured)
      ? '<span style="color:#16a34a">' + esc(r.message) + '</span>'
      : '<span style="color:var(--clr-warning,#b45309)">' + esc((r && r.message) || 'Not configured') + '</span>';
  }).catch(function (e) { if (out) out.innerHTML = '<span style="color:var(--clr-danger)">' + esc(e.message) + '</span>'; });
}
</script>
