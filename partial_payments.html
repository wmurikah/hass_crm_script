<script>
Router.register('payments', function (el) {
  el.innerHTML =
    '<div class="filter-bar">' +
      '<select class="form-control" id="payStatus"><option value="">All statuses</option><option>PENDING_REVIEW</option><option>APPROVED</option><option>REJECTED</option></select>' +
    '</div>' +
    '<div class="card"><div class="table-wrapper"><table class="data-table">' +
      '<thead><tr><th>Upload ID</th><th>Invoice</th><th>Amount</th><th>Method</th><th>Reference</th><th>Status</th><th>Uploaded</th><th></th></tr></thead>' +
      '<tbody id="payBody"></tbody></table></div></div>';

  function load() {
    setHTML('payBody', loadingRow(8));
    var s = document.getElementById('payStatus').value;
    // INV-5: read the real payment_uploads rows so the page shows the reference
    // (the list query resolves the real reference column) and does not error.
    var params = { limit: 50 };
    if (s) params.status = s;
    API.call('payments', 'list', params).then(function (rows) {
      if (!rows.length) { setHTML('payBody', emptyRow(8, 'No payment records.')); return; }
      setHTML('payBody', rows.map(function (r) {
        var canReview = can('invoice.generate') && r.status === 'PENDING_REVIEW';
        return '<tr><td style="font-size:11px">' + esc(r.upload_id) + '</td>' +
               '<td>' + esc(r.invoice_id || '-') + '</td>' +
               '<td>' + fmtMoney(r.amount) + '</td>' +
               '<td>' + esc(r.payment_method || '-') + '</td>' +
               '<td>' + esc(r.reference || '-') + '</td>' +
               '<td>' + statusBadge(r.status) + '</td>' +
               '<td>' + fmtDate(r.created_at) + '</td>' +
               '<td>' + (canReview ? '<button class="btn btn-primary btn-sm" onclick="reviewPayment(\'' + esc(r.upload_id) + '\')">Review</button>' : '') + '</td></tr>';
      }).join(''));
    }).catch(function (e) { setHTML('payBody', errorRow(8, e, load)); });
  }

  document.getElementById('payStatus').onchange = load;
  load();
});

function reviewPayment(uploadId) {
  Modal.open({
    title: 'Review Payment ' + uploadId,
    body: '<p style="font-size:13px;margin-bottom:12px">Approve or reject this payment upload.</p>' +
          '<div class="form-group"><label class="form-label">Reason (for rejection)</label>' +
            '<input class="form-control" id="payReason" placeholder="Optional for approval, required for rejection"></div>' +
          '<div id="payErr" style="color:#dc2626;font-size:12px"></div>',
    footer: '<button class="btn btn-secondary" onclick="Modal.close()">Cancel</button>' +
            '<button class="btn btn-danger btn-sm" onclick="paymentAction(\'' + uploadId + '\',\'reject\')">Reject</button>' +
            '<button class="btn btn-primary btn-sm" onclick="paymentAction(\'' + uploadId + '\',\'approve\')">Approve</button>',
  });
}

function paymentAction(uploadId, action) {
  var params = { uploadId: uploadId };
  if (action === 'reject') {
    params.reason = document.getElementById('payReason').value.trim();
    if (!params.reason) { document.getElementById('payErr').textContent = 'Reason required for rejection.'; return; }
  }
  API.call('payments', action, params)
    .then(function () { Modal.close(); Toast.success('Payment ' + action + 'd.'); Router.navigate('payments', {}); })
    .catch(function (e) { document.getElementById('payErr').textContent = e.message; });
}
</script>
