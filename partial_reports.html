<script>
Router.register('reports', function (el) {
  el.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<h2 style="font-size:16px;font-weight:600">Reports</h2>' +
    '</div>' +
    '<div class="stat-grid" id="repStats">' +
      '<div style="display:flex;justify-content:center;padding:40px;grid-column:1/-1">' +
        '<span class="spinner dark"></span></div>' +
    '</div>';

  function stat(label, val, cls) {
    return '<div class="stat-card ' + cls + '"><div class="stat-label">' + esc(label) +
           '</div><div class="stat-value">' + (val || 0) + '</div></div>';
  }

  API.call('reports', 'summary', {}).then(function (d) {
    document.getElementById('repStats').innerHTML =
      stat('Customers',         d.customers,         'success') +
      stat('Open Tickets',      d.open_tickets,      'warning') +
      stat('Pending Approvals', d.pending_approvals, 'warning') +
      stat('Unpaid Invoices',   d.unpaid_invoices,   'danger')  +
      stat('Pending Payments',  d.pending_payments,  'primary');
  }).catch(function (e) {
    document.getElementById('repStats').innerHTML =
      '<p style="color:#dc2626;grid-column:1/-1">' + esc(e.message) + '</p>';
  });
});
</script>
